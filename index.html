<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- Design System --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.08) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }

.hero { max-width: 1200px; margin: 0 auto 40px auto; background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }

/* ป้ายสถานะร้าน มุมซ้ายบน */
.shop-status-pill { position: absolute; top: 15px; left: 15px; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; color: white; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 20; }
.status-open { background: var(--success); }
.status-closed { background: var(--danger); }
.status-dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; user-select: none; }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.9); }

.tab-container { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border-radius: 30px; padding: 5px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-width: 280px; max-width: 90%; overflow-x: auto; scrollbar-width: none; }
.tab-container::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

.content { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.info-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto 20px auto; }
.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
.info-row:last-child { border-bottom: none; }
.sh { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: space-between; flex-wrap: wrap; }
.sh-left { display: flex; align-items: center; gap: 10px; }
.sh-line { width: 4px; height: 20px; background: var(--primary); border-radius: 2px; }

.media-cover { max-width: 800px; margin: 0 auto 20px auto; padding: 0; position: relative; }
.media-box { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.08); background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
.media-box img, .media-box video { width: 100%; height: auto; border: none; object-fit: cover; pointer-events: none !important; user-select: none; }
.media-box iframe { width: 100%; height: 100%; border: none; object-fit: cover; aspect-ratio: 16/9; }

.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; justify-content: center; }
.category-card { background: white; border-radius: 18px; padding: 20px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.2s; }
.category-card:active { transform: scale(0.95); }
.cat-icon-wrapper { width: 70px; height: 70px; margin: 0 auto 10px; border-radius: 15px; overflow: hidden; background: #f8f9fa; display: flex; align-items: center; justify-content: center; border: 1px solid #f0f0f0; }
.cat-icon-wrapper img, .cat-icon-wrapper a { width: 100%; height: 100%; object-fit: cover; pointer-events: none !important; user-select: none; cursor: default; }

/* โหมด Direct Card */
.direct-card { background: white; border-radius: 18px; padding: 15px 10px; text-align: center; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100%; }
.direct-card:active { transform: scale(0.98); }
.direct-card.selected { border-color: var(--primary); background: #faf5ff; }
.check-icon { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; background: var(--primary); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(176,38,255,0.4); z-index: 2; }
.direct-card.selected .check-icon { display: flex; }

.card-status-pill { position: absolute; top: 8px; right: 8px; padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 2; display: flex; align-items: center; gap: 4px; }
.status-dot-sm { width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1.5s infinite; }
.c-status-ready { background: var(--success); }
.c-status-empty { background: var(--danger); }

.sys-opts { display: flex; gap: 5px; justify-content: center; width: 100%; margin-top: 10px; flex-wrap: wrap; }
.sys-btn { flex: 1; min-width: 30%; padding: 5px 2px; font-size: 10px; border-radius: 6px; background: #f3f4f6; border: 1px solid #e5e7eb; color: #6b7280; cursor: pointer; transition: 0.2s; font-weight: 600; text-align: center; white-space: nowrap; }
.sys-btn:hover { background: #e5e7eb; }
.sys-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-color: transparent; box-shadow: 0 2px 6px rgba(176,38,255,0.3); }

.direct-card-icon { width: 70px; height: 70px; margin: 15px auto 10px; border-radius: 15px; overflow: hidden; background: #f8f9fa; display: flex; align-items: center; justify-content: center; border: 1px solid #f0f0f0; }
.direct-card-icon img { width: 100%; height: 100%; object-fit: cover; pointer-events: none !important; user-select: none; }
.direct-card-title { font-weight: 600; font-size: 14px; line-height: 1.2; margin-bottom: 5px; color: var(--text-dark); width: 100%; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.direct-card-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; width: 100%; min-height: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.direct-card-price { font-size: 15px; font-weight: 700; color: var(--primary); margin-top: auto; }

.variant-block { margin-bottom: 25px; }
.variant-label { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 10px; padding-left: 8px; border-left: 4px solid var(--primary); display: flex; align-items: center; }
.product-item { background: white; border-radius: 15px; padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
.product-item.selected { border-color: var(--primary); background: #faf5ff; }

.bottom-bar { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 1200px; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translate(-50%, 100%); transition: 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translate(-50%, 0); }

.fab-wrapper { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 1200px; pointer-events: none; z-index: 1001; }
.fab-btn { position: absolute; right: 20px; bottom: 0; width: 55px; height: 55px; background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); cursor: pointer; transition: 0.2s; pointer-events: auto; }
.fab-btn:active { transform: scale(0.9); }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
.modal-content { scroll-behavior: smooth; background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #999; cursor: pointer; background: none; border: none; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text-dark); }

.admin-modal-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.admin-modal-tabs::-webkit-scrollbar { display: none; }
.a-tab-btn { padding: 8px 15px; border: none; background: #f3f4f6; border-radius: 20px; font-family: inherit; font-size: 13px; font-weight: 600; color: #6b7280; cursor: pointer; white-space: nowrap; transition: 0.2s; }
.a-tab-btn.active { background: var(--primary); color: white; }
.a-tab-content { display: none; }
.a-tab-content.active { display: block; }

.admin-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fafafa; }
textarea.admin-input { resize: vertical; } 
.admin-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
.admin-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; }
.cart-list-scroll { max-height: 40vh; overflow-y: auto; margin-bottom: 15px; border-top: 1px dashed #eee; border-bottom: 1px dashed #eee; padding: 15px 0; }

.sort-select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Kanit', sans-serif; font-size: 13px; background: white; color: var(--text-dark); outline: none; cursor: pointer; }
.sort-select:focus { border-color: var(--primary); }
</style>
</head>
<body>
<div class="bg-glow-1"></div><div class="bg-glow-2"></div>

<div class="hero">
  <div id="statusPill" class="shop-status-pill status-open">
      <div class="status-dot"></div>
      <span id="statusLabel">OPEN</span>
  </div>

  <div class="logo"><img id="shopLogoImg" src=""></div>
  <div class="hero-title" onclick="handleAdminTap()">Wanderer Shop</div>
  <div class="hero-sub">ยินดีต้อนรับร้าน <span id="shopTitleText">Wanderer Shop</span> รับสินค้าอะไรดีคะ</div>
  
  <div class="tab-container" id="tabBar"></div>
</div>

<div class="content">
  <div id="tab-info" class="tab-content">
    <div class="info-card">
      <div class="info-row"><span style="font-weight:600; color:var(--primary);">Line</span><span id="info-line">-</span></div>
      <div class="info-row"><span style="font-weight:600; color:var(--primary);">Facebook</span><span id="info-fb">-</span></div>
      <div class="info-row"><span style="font-weight:600; color:var(--primary);">เวลาทำการ</span><span id="info-hours">-</span></div>
      <div class="info-row"><span style="font-weight:600; color:var(--primary);">การรับประกัน</span><span id="info-warranty">-</span></div>
    </div>
    <div class="media-cover" id="mediaCoverArea" style="display:none;">
        <div id="mediaBox" class="media-box"></div>
    </div>
  </div>

  <div id="tab-products" class="tab-content active">
    <div id="categoriesView">
      <div class="sh">
          <div class="sh-left"><div class="sh-line"></div><h2>รายการสินค้า</h2></div>
          <select id="sortSelectGrid" class="sort-select" onchange="changeSort(this.value)">
              <option value="default">เรียงตาม: ค่าเริ่มต้น</option>
              <option value="alpha">เรียงตาม: ตัวอักษร (A-Z)</option>
              <option value="priceAsc">เรียงตาม: ราคา (น้อยไปมาก)</option>
              <option value="priceDesc">เรียงตาม: ราคา (มากไปน้อย)</option>
          </select>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
    <div id="productsView" style="display:none; max-width:800px; margin:0 auto;">
      <button onclick="showCategories()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:15px; font-weight:600;">← กลับไปหน้าหมวดหมู่</button>
      
      <div class="sh" style="margin-bottom:20px;">
          <div class="sh-left" style="flex-direction: column; align-items: flex-start; gap: 8px;">
            <h2 id="currentCategoryTitle" style="line-height:1.2;">-</h2>
            <div id="currentCategoryDesc" style="font-size:13px; color:var(--text-muted); line-height:1.5;"></div>
          </div>
          <select id="sortSelectList" class="sort-select" onchange="changeSort(this.value)">
              <option value="default">เรียงตาม: ค่าเริ่มต้น</option>
              <option value="alpha">เรียงตาม: ตัวอักษร (A-Z)</option>
              <option value="priceAsc">เรียงตาม: ราคา (น้อยไปมาก)</option>
              <option value="priceDesc">เรียงตาม: ราคา (มากไปน้อย)</option>
          </select>
      </div>

      <div id="productGrid"></div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div>เลือก <span id="cartCount">0</span> รายการ | ฿<span id="cartTotal" style="color:var(--primary); font-weight:bold; font-size:18px;">0</span></div>
  <button onclick="openCartSummary()" style="padding:10px 25px; border-radius:25px; border:none; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; font-weight:700; box-shadow: 0 4px 10px var(--glow); cursor:pointer;">สั่งซื้อ</button>
</div>

<div id="cartSummaryModal" class="modal-overlay">
  <div class="modal-content" style="max-width: 400px;">
    <button class="close-btn" onclick="closeCartSummary()">&times;</button>
    <h3 class="modal-title" style="text-align: center; margin-bottom: 10px;">🛒 สรุปรายการสั่งซื้อ</h3>
    <div id="cartSummaryList" class="cart-list-scroll"></div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <span style="font-weight: 600; font-size: 16px;">ยอดรวมทั้งสิ้น:</span>
      <span style="color: var(--primary); font-weight: bold; font-size: 22px;">฿<span id="cartSummaryTotal">0</span></span>
    </div>
    <div style="display: flex; gap: 10px;">
      <button onclick="closeCartSummary()" class="admin-btn" style="background: #e5e7eb; color: #4b5563; flex: 1;">แก้ไขรายการ</button>
      <button onclick="confirmCheckout()" class="admin-btn" style="flex: 2; background: linear-gradient(135deg, #10b981, #059669);">คัดลอก & ทักไลน์</button>
    </div>
  </div>
</div>

<div id="passwordModal" class="modal-overlay">
  <div class="modal-content" style="max-width: 350px; text-align: center;">
    <button class="close-btn" onclick="closePasswordModal()">&times;</button>
    <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
    <h3 class="modal-title" style="margin-bottom: 20px;">ยืนยันตัวตนแอดมิน</h3>
    <input type="password" id="adminPasswordInput" class="admin-input" placeholder="ใส่รหัสผ่าน..." style="text-align: center; font-size: 20px; letter-spacing: 5px;">
    <button onclick="verifyAdmin()" class="admin-btn">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="fab-wrapper"><div id="adminFab" class="fab-btn" onclick="openAdminModal()">+</div></div>

<div id="adminModal" class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeAdminModal()">&times;</button>
    <h3 class="modal-title">⚙️ โหมดจัดการแอดมิน</h3>
    
    <div class="admin-modal-tabs">
      <button class="a-tab-btn active" onclick="switchAdminModalTab('product', this)">📦 สินค้า</button>
      <button class="a-tab-btn" onclick="switchAdminModalTab('shop', this)">🏬 ร้านค้า</button>
      <button class="a-tab-btn" onclick="switchAdminModalTab('tab', this)">📑 เมนูแท็บ</button>
    </div>

    <div id="a-tab-product" class="a-tab-content active">
      <form id="adminForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="editId">
        <label class="admin-label">เลือกแท็บ:</label>
        <select id="pTabTarget" class="admin-input" required onchange="toggleAdminFieldsByTab()"></select>

        <div id="statusFieldGroup">
            <label class="admin-label">สถานะสินค้า:</label>
            <select id="pStatus" class="admin-input">
                <option value="ready">🟢 พร้อมส่ง</option>
                <option value="empty">🔴 ไม่พร้อม/หมด</option>
            </select>
        </div>
        
        <label class="admin-label">ชื่อแอป / หมวดหมู่:</label>
        <input type="text" id="pCat" class="admin-input" placeholder="เช่น Netflix, Youtube Premium" required>
        
        <div id="standardProductFields">
            <label class="admin-label">รายละเอียดใต้ชื่อแอป:</label>
            <textarea id="pCatDesc" class="admin-input" rows="2" placeholder="เช่น ✅ เปลี่ยนเมลได้"></textarea>

            <label class="admin-label" style="color:#2563eb;">ตัวเลือกแพ็กเกจ (เพื่อจัดกลุ่ม เช่น ต่อเมลเดิม / สมัครใหม่):</label>
            <input type="text" id="pVariant" class="admin-input" placeholder="เว้นว่างได้ ถ้าไม่อยากแยกกลุ่ม">

            <label class="admin-label">ชื่อแพ็กเกจย่อย:</label>
            <input type="text" id="pName" class="admin-input" placeholder="เช่น 1 เดือน, ถาวร">

            <div id="packDescGroup" style="display:none;">
                <label class="admin-label">รายละเอียดย่อย (เว้นว่างได้):</label>
                <input type="text" id="pPackDesc" class="admin-input" placeholder="โปรโมชั่นเสริม">
            </div>
        </div>

        <div id="appGameProductFields" style="display:none;">
            <div style="border: 2px dashed #b026ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #faf5ff;">
                
                <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb;">
                    <label class="admin-label" style="display:inline-block; margin-right:15px; color:#4b5563;">ระบบที่รองรับ:</label>
                    <label style="margin-right: 20px; font-size: 15px; cursor:pointer; font-weight: 500;">
                        <input type="checkbox" id="pSysIos" checked onchange="toggleDescFields()" style="transform: scale(1.2); margin-right: 5px;"> 🍎 iOS
                    </label>
                    <label style="font-size: 15px; cursor:pointer; font-weight: 500;">
                        <input type="checkbox" id="pSysAndroid" checked onchange="toggleDescFields()" style="transform: scale(1.2); margin-right: 5px;"> 🤖 Android
                    </label>
                </div>

                <div id="iosDescGroup">
                    <label class="admin-label" style="color: #b026ff; font-size: 14px; font-weight: bold;">🍎 ข้อความ (iOS):</label>
                    <textarea id="pIosDesc" class="admin-input" rows="3" placeholder="- แบบให้ร้านโหลดให้..."></textarea>
                </div>
                
                <div id="androidDescGroup" style="margin-top:10px;">
                    <label class="admin-label" style="color: #10b981; font-size: 14px; font-weight: bold;">🤖 ข้อความ (Android):</label>
                    <textarea id="pAndroidDesc" class="admin-input" rows="3" placeholder="- โหลดผ่าน Play Store..."></textarea>
                </div>
            </div>
        </div>

        <label class="admin-label">ราคา (บาท):</label>
        <input type="number" id="pPrice" class="admin-input" placeholder="ราคา" required>
        
        <label class="admin-label">ลิงก์ภาพ / ไอคอนแอป (แนะนำใช้ GitHub Raw):</label>
        <div style="border: 1px dashed #ccc; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #f9fafb; text-align: center;">
            <input type="text" id="pIconUrl" class="admin-input" placeholder="วางลิงก์รูปภาพ (เช่น https://raw.githubusercontent...)" style="margin-bottom:8px;">

<script>
const BIN_ID = '69bf96fbc3097a1dd549f01f';
const MASTER_KEY = '$2a$10$PMIxGvNzIUreq6iY.zlLEuXPaMeYVDiDUIvrAnW2HcwdKhgQUU4da';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ลิงก์ Google Sheets อันใหม่ที่ลูกค้าให้มา
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzfG5EFrSyFUqc8Aor22ntf-taSf3qlRb4omqAmdwgB0V1NNp7H4o4ZSUxUPlIXA91EzQ/exec';

function saveLocalSafely() {
    try {
        localStorage.setItem('wandererShopInfo', JSON.stringify(shopInfo));
        localStorage.setItem('wandererTabs', JSON.stringify(tabs));
        localStorage.setItem('wandererProducts', JSON.stringify(products));
    } catch (e) { console.warn("Local storage full"); }
}

async function syncToServer() {
    try {
        const response = await fetch(BIN_URL, {
            method: 'PUT',
            headers: { 
                'Content-Type': 'application/json', 
                'X-Master-Key': MASTER_KEY,
                'X-Bin-Versioning': 'false' 
            },
            body: JSON.stringify({ shopInfo, tabs, products })
        });
        if (!response.ok) throw new Error('อัปเดตข้อมูลไม่สำเร็จ');
        return true;
    } catch (error) { 
        console.error(error);
        alert("❌ เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่อีกครั้ง");
        return false;
    }
}

async function fetchFromServer() {
    try {
        const response = await fetch(BIN_URL + '/latest?timestamp=' + new Date().getTime(), {
            method: 'GET',
            headers: { 'X-Master-Key': MASTER_KEY, 'Cache-Control': 'no-cache' },
            cache: 'no-store'
        });
        if (!response.ok) return;
        const data = await response.json();
        if (data && data.record) {
            if (data.record.shopInfo) shopInfo = data.record.shopInfo;
            if (data.record.tabs) tabs = data.record.tabs;
            if (data.record.products) products = data.record.products;
            saveLocalSafely();
        }
    } catch (error) { console.error('Fetch error:', error); }
}

const DEFAULT_LOGO = 'https://images.unsplash.com/photo-1557683316-973673baf926?w=400&q=80';
let shopInfo = JSON.parse(localStorage.getItem('wandererShopInfo')) || { line: '@997pfoig', facebook: 'Wanderer Shop', hours: '11:00 - 00:00 น.', warranty: 'ประกันตลอดชีพ', logo: DEFAULT_LOGO, status: 'OPEN', media: '' };
let tabs = JSON.parse(localStorage.getItem('wandererTabs')) || ["สินค้า"];
tabs = tabs.filter(t => t !== "จัดการ"); 
let products = JSON.parse(localStorage.getItem('wandererProducts')) || [];

let currentTab = "สินค้า"; 
let cart = []; 
let isAdminLoggedIn = false;
let selectedSystems = {}; 
let currentAdminCatTab = null; 
let currentSort = 'default'; // ตัวแปรเก็บสถานะการจัดเรียง (default, alpha, priceAsc, priceDesc)

window.onload = async () => {
    fetch(GOOGLE_SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ type: 'เข้าชมเว็บไซต์', items: '-', total: 0, viewCount: 1 })
    }).catch(e => console.log(e));

    await fetchFromServer(); 
    renderShopInfo(); renderTabs(); renderCategories(); updateAdminTabUI(); renderAdminList();
    
    document.getElementById('pIconUrl').addEventListener('input', function() {
        const url = this.value;
        if(url) { document.getElementById('pIconPreview').src = url; document.getElementById('pIconPreview').style.display = 'block'; }
        else { document.getElementById('pIconPreview').style.display = 'none'; }
    });
    document.getElementById('shopLogoUrl').addEventListener('input', function() {
        const url = this.value;
        if(url) { document.getElementById('shopLogoPreview').src = url; document.getElementById('shopLogoPreview').style.display = 'block'; }
        else { document.getElementById('shopLogoPreview').style.display = 'none'; }
    });
    document.getElementById('shopMediaUrl').addEventListener('input', function() {
        const url = this.value;
        const mPreview = document.getElementById('shopMediaPreview');
        if(url) { 
            mPreview.style.display = 'block';
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                mPreview.innerHTML = `<div style="padding:10px; background:#eee; border-radius:5px; font-size:12px;">✅ ลิงก์ YouTube</div>`;
            } else if (url.endsWith('.mp4') || url.includes('.mp4?')) {
                mPreview.innerHTML = `<div style="padding:10px; background:#eee; border-radius:5px; font-size:12px;">✅ ไฟล์วิดีโอ .mp4</div>`;
            } else {
                mPreview.innerHTML = `<img src="${url}" style="width:100%; height:auto; object-fit:cover; pointer-events:none;">`;
            }
        } else { mPreview.style.display = 'none'; }
    });
};

function isAppGameTab(tabName) {
    if (!tabName) return false;
    const name = tabName.toLowerCase();
    return name.includes('ios') || name.includes('androi');
}

// ควบคุมการแสดงผลฟอร์มแอดมินตามแท็บที่เลือก
function toggleAdminFieldsByTab() {
    const tabEl = document.getElementById('pTabTarget');
    if(!tabEl) return;
    const tabName = tabEl.value;
    const isAppTab = isAppGameTab(tabName);
    
    if(isAppTab) {
        document.getElementById('standardProductFields').style.display = 'none';
        document.getElementById('appGameProductFields').style.display = 'block';
        toggleDescFields(); // อัปเดตการแสดงผลกล่องข้อความตาม Checkbox
    } else {
        document.getElementById('standardProductFields').style.display = 'block';
        document.getElementById('appGameProductFields').style.display = 'none';
    }

    const packDescGroup = document.getElementById('packDescGroup');
    if (tabName.includes('พรีเมี่ยม') || tabName.toLowerCase().includes('premium')) {
        packDescGroup.style.display = 'block';
    } else {
        packDescGroup.style.display = 'none';
    }

    const statusGroup = document.getElementById('statusFieldGroup');
    if (tabName.includes('เติมเกม') || isAppTab) {
        statusGroup.style.display = 'block';
    } else {
        statusGroup.style.display = 'none';
        document.getElementById('pStatus').value = 'ready'; 
    }
}

// ควบคุมการซ่อนโชว์กล่องข้อความตาม Checkbox ระบบ
function toggleDescFields() {
    document.getElementById('iosDescGroup').style.display = document.getElementById('pSysIos').checked ? 'block' : 'none';
    document.getElementById('androidDescGroup').style.display = document.getElementById('pSysAndroid').checked ? 'block' : 'none';
}

function renderTabs() {
  const container = document.getElementById('tabBar');
  let html = `<button class="tab-btn ${currentTab === 'info' ? 'active' : ''}" onclick="switchTab('info')">ข้อมูลร้าน</button>`;
  tabs.forEach(t => { html += `<button class="tab-btn ${currentTab === t ? 'active' : ''}" onclick="switchTab('${t}')">${t}</button>`; });
  container.innerHTML = html;
}

function switchTab(id) {
  currentTab = id;
  // Reset sorting เมื่อเปลี่ยนแท็บ
  currentSort = 'default';
  document.getElementById('sortSelectGrid').value = 'default';
  document.getElementById('sortSelectList').value = 'default';

  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (id === 'info') { document.getElementById('tab-info').classList.add('active'); } 
  else {
    document.getElementById('tab-products').classList.add('active');
    showCategories(); renderCategories();
  }
  renderTabs();
}

async function addTab() {
  const name = document.getElementById('newTabInput').value.trim();
  if (name && !tabs.includes(name)) {
    tabs.push(name); saveLocalSafely(); 
    document.getElementById('newTabInput').value = "กำลังบันทึก...";
    await syncToServer(); 
    renderTabs(); updateAdminTabUI(); document.getElementById('newTabInput').value = "";
    if(!currentAdminCatTab) currentAdminCatTab = name;
    renderAdminList();
  }
}

function renderShopInfo() {
  const pill = document.getElementById('statusPill');
  if (shopInfo.status === 'OPEN') {
      pill.className = 'shop-status-pill status-open'; document.getElementById('statusLabel').innerText = 'OPEN';
  } else {
      pill.className = 'shop-status-pill status-closed'; document.getElementById('statusLabel').innerText = 'CLOSED';
  }

  document.getElementById('info-line').innerText = shopInfo.line || '-';
  document.getElementById('info-fb').innerText = shopInfo.facebook || '-';
  document.getElementById('info-hours').innerText = shopInfo.hours || '-';
  document.getElementById('info-warranty').innerText = shopInfo.warranty || '-';
  document.getElementById('shopTitleText').innerText = shopInfo.facebook || '-';
  
  const cleanLogo = shopInfo.logo ? shopInfo.logo.replace(/<[^>]*>?/gm, '') : DEFAULT_LOGO;
  document.getElementById('shopLogoImg').src = cleanLogo;
  
  const mediaArea = document.getElementById('mediaCoverArea');
  const mediaBox = document.getElementById('mediaBox');
  if (shopInfo.media) {
      mediaArea.style.display = 'block';
      const cleanMedia = shopInfo.media.replace(/<[^>]*>?/gm, '');
      if (cleanMedia.includes('youtube.com') || cleanMedia.includes('youtu.be')) {
          let vid = cleanMedia.split('v=')[1] || cleanMedia.split('/').pop();
          vid = vid.split('&')[0];
          mediaBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&loop=1&playlist=${vid}"></iframe>`;
      } else if (cleanMedia.match(/\.(mp4|webm|ogg)$/i) || cleanMedia.includes('.mp4?')) {
          mediaBox.innerHTML = `<video src="${cleanMedia}" autoplay loop muted playsinline controlsList="nodownload"></video>`;
      } else {
          mediaBox.innerHTML = `<img src="${cleanMedia}">`;
      }
  } else {
      mediaArea.style.display = 'none';
  }

  document.getElementById('shopStatusInput').value = shopInfo.status || 'OPEN';
  document.getElementById('shopLineInput').value = shopInfo.line || '';
  document.getElementById('shopFbInput').value = shopInfo.facebook || '';
  document.getElementById('shopHoursInput').value = shopInfo.hours || '';
  document.getElementById('shopWarrantyInput').value = shopInfo.warranty || '';
  
  document.getElementById('shopLogoUrl').value = shopInfo.logo || '';
  const logoPreview = document.getElementById('shopLogoPreview');
  if (shopInfo.logo) { logoPreview.src = shopInfo.logo.replace(/<[^>]*>?/gm, ''); logoPreview.style.display = 'block'; } else { logoPreview.style.display = 'none'; }
  
  document.getElementById('shopMediaUrl').value = shopInfo.media || '';
  const mPreview = document.getElementById('shopMediaPreview');
  if (shopInfo.media) { 
      mPreview.style.display = 'block';
      if (shopInfo.media.includes('youtube')) {
          mPreview.innerHTML = `<div style="padding:10px; background:#eee; border-radius:5px; font-size:12px;">✅ ลิงก์ YouTube</div>`;
      } else if (shopInfo.media.endsWith('.mp4') || shopInfo.media.includes('.mp4?')) {
          mPreview.innerHTML = `<div style="padding:10px; background:#eee; border-radius:5px; font-size:12px;">✅ ไฟล์วิดีโอ .mp4</div>`;
      } else {
          mPreview.innerHTML = `<img src="${shopInfo.media.replace(/<[^>]*>?/gm, '')}" style="width:100%; height:auto; object-fit:cover; pointer-events:none;">`;
      }
  } else { mPreview.style.display = 'none'; }
}

async function saveShopInfo(e) {
  e.preventDefault();
  const btn = document.getElementById('saveShopBtn'); btn.innerText = "กำลังบันทึกข้อมูลออนไลน์...";
  
  shopInfo.status = document.getElementById('shopStatusInput').value;
  shopInfo.logo = document.getElementById('shopLogoUrl').value.replace(/<[^>]*>?/gm, '').trim();
  shopInfo.media = document.getElementById('shopMediaUrl').value.replace(/<[^>]*>?/gm, '').trim();
  shopInfo.line = document.getElementById('shopLineInput').value.trim();
  shopInfo.facebook = document.getElementById('shopFbInput').value.trim();
  shopInfo.hours = document.getElementById('shopHoursInput').value.trim();
  shopInfo.warranty = document.getElementById('shopWarrantyInput').value.trim();
  
  saveLocalSafely();
  if(await syncToServer()) { renderShopInfo(); alert("✅ บันทึกข้อมูลร้านค้าเรียบร้อย!"); }
  btn.innerText = "💾 บันทึกข้อมูลร้าน";
}

let tapCount = 0; let tapTimer;
function handleAdminTap() {
  tapCount++; clearTimeout(tapTimer);
  if(tapCount >= 5) { tapCount = 0; if(!isAdminLoggedIn) { document.getElementById('passwordModal').style.display = 'flex'; document.getElementById('adminPasswordInput').value = ''; } else { openAdminModal(); } }
  tapTimer = setTimeout(() => { tapCount = 0; }, 1500); 
}
function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }
function verifyAdmin() {
  if(document.getElementById('adminPasswordInput').value === "170647") {  
    isAdminLoggedIn = true; closePasswordModal(); document.getElementById('adminFab').style.display = 'flex'; openAdminModal(); 
  } else { alert("รหัสผ่านไม่ถูกต้อง!"); document.getElementById('adminPasswordInput').value = ''; }
}
function openAdminModal() { document.getElementById('adminModal').style.display = 'flex'; }
function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
function switchAdminModalTab(tabId, btnElement) {
  document.querySelectorAll('.admin-modal-tabs > .a-tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.a-tab-content').forEach(content => content.classList.remove('active'));
  btnElement.classList.add('active'); document.getElementById('a-tab-' + tabId).classList.add('active');
}

function selectSystem(e, pId, sys) {
    e.stopPropagation(); 
    selectedSystems[pId] = sys;
    let cartItem = cart.find(c => c.id === pId);
    if (cartItem) { cartItem.chosenSystem = sys; }
    
    if(document.getElementById('productsView').style.display === 'block') {
        openCategory(document.getElementById('currentCategoryTitle').innerText);
    } else { renderCategories(); }
}

// ฟังก์ชันสำหรับเลือกการเรียงลำดับ
function changeSort(val) {
    currentSort = val;
    // ซิงค์ค่า dropdown ทั้ง 2 จุดให้ตรงกัน
    document.getElementById('sortSelectGrid').value = val;
    document.getElementById('sortSelectList').value = val;

    if (document.getElementById('productsView').style.display === 'block') {
        openCategory(document.getElementById('currentCategoryTitle').innerText);
    } else {
        renderCategories();
    }
}

// ฟังก์ชัน Sort ข้อมูล
function sortProductsArray(arr) {
    if (currentSort === 'alpha') {
        return arr.sort((a, b) => a.cat.localeCompare(b.cat));
    } else if (currentSort === 'priceAsc') {
        return arr.sort((a, b) => a.price - b.price);
    } else if (currentSort === 'priceDesc') {
        return arr.sort((a, b) => b.price - a.price);
    }
    return arr; // default
}

function renderCategories(tabName = currentTab) {
  const grid = document.getElementById('categoryGrid');
  let filtered = products.filter(p => p.tab === tabName);
  
  // จัดเรียงข้อมูลถ้ามีการเลือก
  filtered = sortProductsArray([...filtered]);

  const isDirectGrid = isAppGameTab(tabName);

  if (isDirectGrid) {
      grid.innerHTML = filtered.map(p => {
          const isSel = cart.find(c => c.id === p.id) ? 'selected' : '';
          const icon = p.icon || '📦';
          const iconHtml = icon.startsWith('http') || icon.startsWith('data') ? `<img src="${icon}">` : `<span style="font-size:30px;">${icon}</span>`;
          
          const appName = p.cat; 
          
          const statusClass = (p.status === 'empty') ? 'c-status-empty' : 'c-status-ready';
          const statusText = (p.status === 'empty') ? 'ไม่พร้อม' : 'พร้อม';
          const statusHtml = `<div class="card-status-pill ${statusClass}"><div class="status-dot-sm"></div>${statusText}</div>`;

          let sysHtml = '';
          let activeSys = null; 
          if (p.systems && p.systems.length > 0) {
              activeSys = selectedSystems[p.id] || (cart.find(c => c.id === p.id && c.chosenSystem) ? cart.find(c => c.id === p.id).chosenSystem : null) || p.systems[0];
              sysHtml = `<div class="sys-opts">` + p.systems.map(sys => {
                  const isActive = (activeSys === sys) ? 'active' : '';
                  return `<div class="sys-btn ${isActive}" onclick="selectSystem(event, '${p.id}', '${sys}')">${sys}</div>`;
              }).join('') + `</div>`;
          }

          let dynamicDesc = '';
          if (activeSys === 'iOS') dynamicDesc = p.iosDesc || '';
          else if (activeSys === 'Android') dynamicDesc = p.androidDesc || '';
          
          const appDesc = dynamicDesc ? dynamicDesc.replace(/\n/g, '<br>') : '<span style="color:#ccc;">-</span>';

          return `
          <div class="direct-card ${isSel}" onclick="toggleItem('${p.id}')">
              <div class="check-icon">✓</div>
              ${statusHtml}
              <div class="direct-card-icon">${iconHtml}</div>
              <div class="direct-card-title">${appName}</div>
              <div class="direct-card-desc">${appDesc}</div>
              <div class="direct-card-price">฿${p.price}</div>
              ${sysHtml}
          </div>`;
      }).join('') || '<p style="grid-column:span 2; text-align:center; padding:40px; color:#999;">ยังไม่มีสินค้าในหมวดหมู่นี้</p>';
  } else {
      // สร้างหมวดหมู่ (ไม่ซ้ำกัน)
      const uniqueCats = [...new Set(filtered.map(p => p.cat))];
      
      grid.innerHTML = uniqueCats.map(cat => {
        const p = filtered.find(x => x.cat === cat);
        const icon = p.icon || '📦';
        const iconHtml = icon.startsWith('http') || icon.startsWith('data') ? `<img src="${icon}">` : `<span style="font-size:30px;">${icon}</span>`;
        const catDesc = p.catDesc ? `<div style="font-size:11px; color:var(--text-muted); margin-top:6px; line-height:1.4;">${p.catDesc.replace(/\n/g, '<br>')}</div>` : '';
        return `<div class="category-card" onclick="openCategory('${cat}')"><div class="cat-icon-wrapper">${iconHtml}</div><div style="font-weight:600; font-size:15px; line-height:1.2;">${cat}</div>${catDesc}</div>`;
      }).join('') || '<p style="grid-column:span 2; text-align:center; padding:40px; color:#999;">ยังไม่มีสินค้า</p>';
  }
}

function openCategory(catName) {
  document.getElementById('categoriesView').style.display = 'none'; document.getElementById('productsView').style.display = 'block';
  let items = products.filter(p => p.cat === catName && p.tab === currentTab);
  
  // จัดเรียงข้อมูลในหน้ารายละเอียดย่อย
  items = sortProductsArray([...items]);

  document.getElementById('currentCategoryTitle').innerText = catName;
  document.getElementById('currentCategoryDesc').innerHTML = items[0] && items[0].catDesc ? items[0].catDesc.replace(/\n/g, '<br>') : '';
  
  const grouped = {};
  items.forEach(p => { const v = p.variant || "แพ็กเกจทั่วไป"; if (!grouped[v]) grouped[v] = []; grouped[v].push(p); });
  
  let html = '';
  for (const v in grouped) {
      html += `<div class="variant-block"><div class="variant-label">${v}</div>`;
      html += grouped[v].map(p => {
        const isSel = cart.find(c => c.id === p.id) ? 'selected' : '';
        const statusDot = p.status === 'empty' ? '<span style="color:var(--danger); font-size:10px; margin-left:5px;">🔴 หมด</span>' : '<span style="color:var(--success); font-size:10px; margin-left:5px;">🟢 พร้อม</span>';
        
        const showStatus = (p.tab.includes('เติมเกม') || isAppGameTab(p.tab)) ? statusDot : '';

        return `<div class="product-item ${isSel}" onclick="toggleItem('${p.id}')">
          <div style="flex:2;">
            <div style="font-weight:600; font-size:15px; display:flex; align-items:center;">${p.name} ${showStatus}</div>
          </div>
          ${p.packDesc ? `<div style="flex:1.5; font-size:12px; color:var(--text-muted); text-align:center; padding-left:10px;">${p.packDesc}</div>` : '<div style="flex:1.5;"></div>'}
          <div style="flex:1; text-align:right; color:var(--primary); font-weight:bold; font-size:16px;">฿${p.price}</div>
        </div>`;
      }).join(''); html += `</div>`;
  }
  document.getElementById('productGrid').innerHTML = html;
}

async function saveProduct(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn'); btn.innerText = "กำลังบันทึกออนไลน์...";
  const id = document.getElementById('editId').value;
  
  const cleanIcon = document.getElementById('pIconUrl').value.replace(/<[^>]*>?/gm, '').trim();
  const tabName = document.getElementById('pTabTarget').value;
  const isAppTab = isAppGameTab(tabName);
  const isPremiumTab = tabName.includes('พรีเมี่ยม') || tabName.toLowerCase().includes('premium');

  // ดึงค่าระบบจาก Checkbox
  let selectedSysArr = [];
  if (isAppTab) {
      if (document.getElementById('pSysIos').checked) selectedSysArr.push('iOS');
      if (document.getElementById('pSysAndroid').checked) selectedSysArr.push('Android');
      
      if (selectedSysArr.length === 0) {
          alert("กรุณาเลือกระบบที่รองรับอย่างน้อย 1 ระบบ (iOS หรือ Android)");
          btn.innerText = id ? "อัปเดตสินค้า" : "บันทึกข้อมูลสินค้า";
          return;
      }
  }

  const newP = {
    id: id || 'p' + Date.now(),
    tab: tabName,
    status: (tabName.includes('เติมเกม') || isAppTab) ? document.getElementById('pStatus').value : 'ready',
    cat: document.getElementById('pCat').value.trim(),
    price: parseInt(document.getElementById('pPrice').value),
    icon: cleanIcon,
    catDesc: isAppTab ? '' : document.getElementById('pCatDesc').value.trim(), 
    variant: isAppTab ? '' : document.getElementById('pVariant').value.trim(), 
    name: isAppTab ? '-' : (document.getElementById('pName').value.trim() || '-'),
    packDesc: (isAppTab || !isPremiumTab) ? '' : document.getElementById('pPackDesc').value.trim(),
    systems: selectedSysArr, 
    iosDesc: isAppTab ? document.getElementById('pIosDesc').value.trim() : '',
    androidDesc: isAppTab ? document.getElementById('pAndroidDesc').value.trim() : ''
  };

  if(id) { products[products.findIndex(p => p.id === id)] = newP; } else { products.push(newP); }

  saveLocalSafely();
  const isSuccess = await syncToServer(); 
  
  if(isSuccess) {
      cancelEdit(); 
      if(!currentAdminCatTab) currentAdminCatTab = newP.tab;
      renderAdminList(); renderCategories();
      if(document.getElementById('productsView').style.display === 'block'){ openCategory(document.getElementById('currentCategoryTitle').innerText); }
      alert("✅ บันทึกสินค้าเรียบร้อย!");
  } else { btn.innerText = id ? "อัปเดตสินค้า" : "บันทึกข้อมูลสินค้า"; }
}

function editProduct(id) {
  const p = products.find(item => item.id === id);
  if(p) {
    document.getElementById('editId').value = p.id;
    document.getElementById('pTabTarget').value = p.tab;
    
    // ตั้งค่า Checkbox ระบบ
    if (p.systems) {
        document.getElementById('pSysIos').checked = p.systems.includes('iOS');
        document.getElementById('pSysAndroid').checked = p.systems.includes('Android');
    } else {
        document.getElementById('pSysIos').checked = true;
        document.getElementById('pSysAndroid').checked = true;
    }

    toggleAdminFieldsByTab();

    document.getElementById('pStatus').value = p.status || 'ready';
    document.getElementById('pCat').value = p.cat;
    document.getElementById('pCatDesc').value = p.catDesc || '';
    document.getElementById('pVariant').value = p.variant || ''; 
    document.getElementById('pName').value = p.name !== '-' ? p.name : '';
    document.getElementById('pPackDesc').value = p.packDesc || '';
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pIconUrl').value = p.icon || '';
    
    document.getElementById('pIosDesc').value = p.iosDesc || '';
    document.getElementById('pAndroidDesc').value = p.androidDesc || '';

    const preview = document.getElementById('pIconPreview');
    if (p.icon) { preview.src = p.icon; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
    
    document.getElementById('saveBtn').innerText = "อัปเดตสินค้า"; document.getElementById('saveBtn').style.background = "#059669";
    document.getElementById('cancelBtn').style.display = "block";
    document.querySelector('.modal-content').scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function cancelEdit() {
  document.getElementById('adminForm').reset();
  document.getElementById('editId').value = ""; 
  document.getElementById('pIconUrl').value = "";
  document.getElementById('pIosDesc').value = "";
  document.getElementById('pAndroidDesc').value = "";
  document.getElementById('pPackDesc').value = "";
  
  document.getElementById('pSysIos').checked = true;
  document.getElementById('pSysAndroid').checked = true;

  document.getElementById('pIconPreview').style.display = 'none';
  document.getElementById('saveBtn').innerText = "บันทึกข้อมูลสินค้า"; document.getElementById('saveBtn').style.background = "var(--primary)";
  document.getElementById('cancelBtn').style.display = "none";
  toggleAdminFieldsByTab();
}

function switchAdminCatTab(tabName) {
    currentAdminCatTab = tabName;
    renderAdminList();
}

function renderAdminList() {
  if (!currentAdminCatTab && tabs.length > 0) currentAdminCatTab = tabs[0];
  if (tabs.length > 0 && !tabs.includes(currentAdminCatTab)) currentAdminCatTab = tabs[0];

  document.getElementById('adminCategoryTabs').innerHTML = tabs.map(t => 
    `<button type="button" class="a-tab-btn ${currentAdminCatTab === t ? 'active' : ''}" onclick="switchAdminCatTab('${t}')">${t}</button>`
  ).join('');

  const filteredProducts = products.filter(p => p.tab === currentAdminCatTab);
  const sortedProducts = [...filteredProducts].sort((a, b) => a.cat.localeCompare(b.cat));
  
  const grouped = {}; 
  sortedProducts.forEach(p => { if (!grouped[p.cat]) grouped[p.cat] = []; grouped[p.cat].push(p); });

  let html = '';
  for (const cat in grouped) {
    html += `<div style="background:#f0f2f5; padding:8px 12px; margin-top:15px; border-radius:8px 8px 0 0; font-weight:bold; display:flex; align-items:center; gap:8px;">📱 ${cat}</div><div style="border:1px solid #e5e7eb; border-radius:0 0 8px 8px; margin-bottom:10px; background:#fff; padding:0 10px;">`;
    html += grouped[cat].map(p => {
        const showStatusInList = (p.tab.includes('เติมเกม') || isAppGameTab(p.tab));
        const sDot = showStatusInList ? (p.status === 'empty' ? '🔴' : '🟢') : '';

        const dispName = (p.name && p.name !== '-') ? p.name : 'สินค้าทั่วไป';

        return `<div style="font-size:13px; border-bottom:1px solid #f3f4f6; padding:12px 5px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            ${sDot} <span style="font-weight:600; color:var(--primary);">${dispName}</span> 
            ${p.variant ? `<span style="font-size:11px; color:#ef4444; font-weight:bold;">[${p.variant}]</span>` : ''} 
            ${p.packDesc ? `<span style="font-size:11px; color:#6b7280;">(${p.packDesc})</span>` : ''} 
            <br><small style="color:#374151; font-weight:600;">฿${p.price}</small>
          </div>
          <div>
            <button type="button" onclick="editProduct('${p.id}')" style="color:#2563eb; border:none; background:none; font-weight:600; cursor:pointer; margin-right:10px;">แก้ไข</button>
            <button type="button" onclick="deleteProduct('${p.id}')" style="color:#ef4444; border:none; background:none; font-weight:600; cursor:pointer;">ลบ</button>
          </div>
        </div>`
    }).join('');
    html += `</div>`;
  }
  document.getElementById('adminProductList').innerHTML = html || '<div style="text-align:center; padding:30px; color:#9ca3af;">ยังไม่มีสินค้าในแท็บนี้</div>';
}

function updateAdminTabUI() {
  document.getElementById('adminTabList').innerHTML = tabs.map((t, i) => `<div style="display:flex; justify-content:space-between; background:#f8f9fa; padding:10px 15px; border-radius:8px; margin-top:5px; border:1px solid #eee;"><span style="font-weight:500;">${t}</span><button onclick="deleteTab(${i})" style="color:#ef4444; border:none; background:none; font-weight:bold; cursor:pointer;">ลบ</button></div>`).join('');
  document.getElementById('pTabTarget').innerHTML = tabs.map(t => `<option value="${t}">${t}</option>`).join('');
  toggleAdminFieldsByTab(); 
}

async function resetData() {
  if(confirm("⚠️ ล้างระบบทั้งหมด ยืนยันหรือไม่?")) {
    localStorage.clear();
    await fetch(BIN_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify({ shopInfo: {}, tabs: ["สินค้า"], products: [] }) });
    location.reload();
  }
}

async function deleteTab(i) {
  if(confirm("ลบแท็บนี้สินค้าด้านในจะหายทั้งหมด ยืนยันไหม?")) {
    const name = tabs[i]; products = products.filter(p => p.tab !== name); tabs.splice(i, 1);
    if(currentAdminCatTab === name) currentAdminCatTab = tabs[0] || null;
    saveLocalSafely(); await syncToServer(); location.reload();
  }
}

async function deleteProduct(id) {
  if(confirm("ยืนยันการลบสินค้านี้?")) {
    products = products.filter(p => p.id !== id);
    saveLocalSafely(); await syncToServer(); renderAdminList(); renderCategories();
    if(document.getElementById('productsView').style.display === 'block'){
      const currentCat = document.getElementById('currentCategoryTitle').innerText;
      if (products.some(p => p.cat === currentCat && p.tab === currentTab)) openCategory(currentCat); else showCategories();
    }
  }
}

function showCategories() { document.getElementById('categoriesView').style.display='block'; document.getElementById('productsView').style.display='none'; }

function getCalculatedCart() {
    let appItems = []; let otherItems = [];
    cart.forEach(i => { if(isAppGameTab(i.tab)) appItems.push({...i}); else otherItems.push({...i}); });

    let isBulkAll = false;
    if (appItems.length >= 164) { isBulkAll = true; }

    let processedCart = []; let total = 0; let activePromos = []; 

    otherItems.forEach(item => { processedCart.push({...item, effectivePrice: item.price, isPromo: false}); total += item.price; });

    if (isBulkAll) {
        appItems.forEach(item => { processedCart.push({...item, effectivePrice: 0, isPromo: true, promoLabel: "รวมในโปรเหมา"}); });
        total += 3000; activePromos.push("เหมาทุกแอพ 164 แอพ 3,000฿");
    } else {
        let appsPromo = []; let ineligibleApps = [];
        appItems.forEach(item => { if (item.price >= 20 && item.price <= 25) { appsPromo.push(item); } else { ineligibleApps.push(item); } });

        ineligibleApps.forEach(item => { processedCart.push({...item, effectivePrice: item.price, isPromo: false}); total += item.price; });

        appsPromo.sort((a, b) => b.price - a.price);

        let count = appsPromo.length; let idx = 0;
        let b30 = 0, b15 = 0, b8 = 0, b3 = 0, b2_25 = 0;

        while(idx + 30 <= count) { b30++; for(let i=0; i<30; i++) processedCart.push({...appsPromo[idx++], effectivePrice: 360/30, isPromo: true, promoLabel: "โปร 30 แอพ"}); total += 360; }
        while(idx + 15 <= count) { b15++; for(let i=0; i<15; i++) processedCart.push({...appsPromo[idx++], effectivePrice: 210/15, isPromo: true, promoLabel: "โปร 15 แอพ"}); total += 210; }
        while(idx + 8 <= count) { b8++; for(let i=0; i<8; i++) processedCart.push({...appsPromo[idx++], effectivePrice: 80/8, isPromo: true, promoLabel: "โปร 8 แอพ"}); total += 80; }
        while(idx + 3 <= count) { b3++; for(let i=0; i<3; i++) processedCart.push({...appsPromo[idx++], effectivePrice: 45/3, isPromo: true, promoLabel: "โปร 3 แอพ"}); total += 45; }
        
        let remaining = count - idx;
        if (remaining === 2 && appsPromo[idx].price === 25 && appsPromo[idx+1].price === 25) {
            b2_25++;
            processedCart.push({...appsPromo[idx++], effectivePrice: 45/2, isPromo: true, promoLabel: "โปรคู่ 25฿"});
            processedCart.push({...appsPromo[idx++], effectivePrice: 45/2, isPromo: true, promoLabel: "โปรคู่ 25฿"});
            total += 45;
        } else {
            while(idx < count) { processedCart.push({...appsPromo[idx], effectivePrice: appsPromo[idx].price, isPromo: false}); total += appsPromo[idx].price; idx++; }
        }

        if (b30 > 0) activePromos.push(`โปร 30 แอพ 360฿ (${b30} ชุด)`);
        if (b15 > 0) activePromos.push(`โปร 15 แอพ 210฿ (${b15} ชุด)`);
        if (b8 > 0) activePromos.push(`โปร 8 แอพ 80฿ (${b8} ชุด)`);
        if (b3 > 0) activePromos.push(`โปร 3 แอพ 45฿ (${b3} ชุด)`);
        if (b2_25 > 0) activePromos.push(`โปรคู่แอพ 25฿ (${b2_25} ชุด)`);
    }

    let finalSorted = [];
    cart.forEach(originalItem => {
        let foundIdx = processedCart.findIndex(p => p.id === originalItem.id);
        if(foundIdx > -1) { finalSorted.push(processedCart[foundIdx]); processedCart.splice(foundIdx, 1); }
    });

    return { items: finalSorted, total, isBulkAll, activePromos };
}

function toggleItem(id) {
  let p = products.find(x => x.id === id);
  const idx = cart.findIndex(c => c.id === id);

  if(idx > -1) {
      cart.splice(idx, 1); 
  } else {
      if (p.status === 'empty' && (p.tab.includes('เติมเกม') || isAppGameTab(p.tab))) {
          alert("สินค้านี้ยังไม่พร้อมให้บริการ หรือ หมดชั่วคราวค่ะ");
          return;
      }
      let chosenSys = selectedSystems[id] || (p.systems && p.systems.length > 0 ? p.systems[0] : null);
      if (chosenSys) selectedSystems[id] = chosenSys;

      cart.push({...p, chosenSystem: chosenSys});
  }
  
  const calcInfo = getCalculatedCart();
  
  document.getElementById('cartCount').innerText = cart.length; 
  document.getElementById('cartTotal').innerText = calcInfo.total;
  document.getElementById('bottomBar').classList.toggle('active', cart.length > 0);
  
  if(document.getElementById('productsView').style.display === 'block') { openCategory(document.getElementById('currentCategoryTitle').innerText); } 
  else { renderCategories(); }
}

function openCartSummary() {
  if(cart.length === 0) return;
  let calcInfo = getCalculatedCart();
  let html = ''; 
  
  calcInfo.items.forEach((item, index) => {
    let priceDisplay = `฿${item.price}`;
    
    if (calcInfo.isBulkAll && isAppGameTab(item.tab)) {
         priceDisplay = `<span style="color:var(--primary); font-weight:bold; font-size:12px;">รวมในเหมา</span>`;
    } else if (item.isPromo) {
         priceDisplay = `<span style="text-decoration:line-through; color:#999; font-size:12px;">฿${item.price}</span> <span style="color:var(--success); font-weight:bold;">${item.promoLabel}</span>`;
    }

    let sysText = item.chosenSystem ? `<span style="background:var(--primary); color:white; padding:1px 5px; border-radius:4px; font-size:10px;">${item.chosenSystem}</span>` : '';
    let dispName = (item.name && item.name !== '-') ? item.name : '';
    
    html += `<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; border-bottom: 1px dashed #eee; padding-bottom: 8px;">
       <div style="flex: 1;">
         <span style="font-weight: 600;">${index + 1}. ${item.cat}</span> ${sysText}<br>
         <span style="font-size: 12px; color: var(--text-muted);">${item.variant ? `[${item.variant}] ` : ''}${dispName} ${item.packDesc ? `(${item.packDesc})` : ''}</span>
       </div>
       <div style="font-weight: bold; text-align:right;">${priceDisplay}</div>
    </div>`; 
  });

  if (calcInfo.isBulkAll) {
      html += `<div style="text-align:center; padding: 10px; background:#fdf4ff; color:var(--primary); border-radius:8px; margin-bottom:10px; font-weight:bold; font-size:14px;">🎉 เปิดใช้ราคาโปรเหมา 3,000฿ สำเร็จ!</div>`;
  } else if (calcInfo.activePromos.length > 0) {
      let pText = calcInfo.activePromos.join(' และ ');
      html += `<div style="text-align:center; padding: 10px; background:#f0fdf4; color:var(--success); border-radius:8px; margin-bottom:10px; font-weight:bold; font-size:13px;">🎉 ยินดีด้วย! คุณได้รับ ${pText}</div>`;
  }

  document.getElementById('cartSummaryList').innerHTML = html; 
  document.getElementById('cartSummaryTotal').innerText = calcInfo.total;
  document.getElementById('cartSummaryModal').style.display = 'flex';
}

function closeCartSummary() { document.getElementById('cartSummaryModal').style.display = 'none'; }

function confirmCheckout() {
  if(cart.length === 0) return;
  let calcInfo = getCalculatedCart();
  let text = ""; 
  
  let appItems = calcInfo.items.filter(i => isAppGameTab(i.tab));
  let otherItems = calcInfo.items.filter(i => !isAppGameTab(i.tab));

  let itemsBought = calcInfo.items.map(i => {
      let name = i.cat;
      if (i.name && i.name !== '-') name += ` ${i.name}`;
      if (i.chosenSystem) name += ` [${i.chosenSystem}]`;
      if (i.variant) name += ` (${i.variant})`;
      return name;
  }).join(', ');
  
  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ type: 'คำสั่งซื้อใหม่', items: itemsBought, total: calcInfo.total, viewCount: 0 })
  }).catch(e => console.log('Sheet Error:', e));

  if (appItems.length > 0 && otherItems.length === 0) {
      let appLines = appItems.map(i => {
          let appNameStr = (i.name && i.name !== i.cat && i.name !== '-') ? `${i.cat} ${i.name}` : i.cat;
          let sysStr = i.chosenSystem ? ` [${i.chosenSystem}]` : '';
          return `🍃 ݂  ${appNameStr}${sysStr} 𓈒`;
      }).join('\n'); 

      text = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*\n---------------------------\n✿  𓈒  รวมยอด    ꒰  ${calcInfo.total}฿  ꒱   ݂🎐♡\n${appLines}\n---------------------------\nรบกวนแม่ค้าสรุปยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ 🙏`;
  } else {
      text = "🛒 *รายการสั่งซื้อ (Wanderer Shop)*\n---------------------------\n"; 
      let isGameTopup = false; 
      calcInfo.items.forEach((item, index) => { 
         let priceStr = `${item.price} บาท`;
         if (calcInfo.isBulkAll && isAppGameTab(item.tab)) priceStr = "รวมในโปรเหมา";
         else if (item.isPromo) priceStr = `ลดเหลือ (${item.promoLabel})`;

         let sysStr = item.chosenSystem ? `\n   ระบบที่เลือก: ${item.chosenSystem}` : '';
         let dispName = (item.name && item.name !== '-') ? item.name : '';

         text += `${index + 1}. ${item.cat}\n   แพ็กเกจ: ${item.variant ? `[${item.variant}] ` : ''}${dispName} ${item.packDesc ? `(${item.packDesc})` : ''}${sysStr}\n   ราคา: ${priceStr}\n`; 
         if (item.tab === "เติมเกม") isGameTopup = true; 
      });
      text += `---------------------------\n💰 *ยอดรวมทั้งสิ้น: ${calcInfo.total} บาท*\n---------------------------\n`;
      
      if (calcInfo.isBulkAll) text += `🎉 *ได้รับโปรเหมาแอพสุดคุ้ม 3,000 บาท*\n`;
      else if (calcInfo.activePromos.length > 0) text += `🎉 *ได้รับส่วนลดโปรโมชั่นแอพ*\n`;

      if (isGameTopup) { text += "📌 *แจ้งไอดี / รหัสผ่าน ได้เลยค่ะ*\n"; } else { text += "รบกวนแม่ค้าสรุปยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ 🙏"; }
  }

  navigator.clipboard.writeText(text).then(() => {
    alert("✅ คัดลอกรายการสั่งซื้อเรียบร้อยแล้ว!\nระบบกำลังพาคุณไปที่ LINE ของร้าน...");
    cart = []; document.getElementById('cartCount').innerText = "0"; document.getElementById('cartTotal').innerText = "0"; document.getElementById('bottomBar').classList.remove('active');
    
    if(document.getElementById('productsView').style.display === 'block') { openCategory(document.getElementById('currentCategoryTitle').innerText); } 
    else { renderCategories(); }
    
    closeCartSummary(); window.open(`https://line.me/R/ti/p/~${shopInfo.line.replace('@', '%40')}`, '_blank');
  }).catch(err => { alert("❌ ไม่สามารถคัดลอกได้ รบกวนแคปหน้าจอส่งแม่ค้า"); });
}
