<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- Design System --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f39c12; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

.bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; }
.shape1 { width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; }
.shape2 { width: 250px; height: 250px; background: var(--secondary); bottom: 100px; right: -50px; }

header { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-bottom: 1px solid rgba(255,255,255,0.5); }
.logo { font-family: 'Mitr', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.admin-btn { background: rgba(176,38,255,0.1); color: var(--primary); border: none; padding: 6px 12px; border-radius: 20px; font-family: 'Kanit'; font-weight: 600; font-size: 13px; cursor: pointer; }

.search-container { padding: 15px 20px; }
.search-box { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #e5e7eb; font-family: 'Kanit'; font-size: 15px; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); transition: 0.3s; }
.search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(176,38,255,0.1); }

.category-scroll { display: flex; overflow-x: auto; padding: 0 20px 10px; gap: 10px; scrollbar-width: none; }
.category-scroll::-webkit-scrollbar { display: none; }
.cat-btn { white-space: nowrap; padding: 8px 18px; border-radius: 20px; background: var(--bg-card); border: 1px solid #e5e7eb; color: var(--text-muted); font-family: 'Kanit'; font-size: 14px; cursor: pointer; font-weight: 500; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
.cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px var(--glow); }

.container { padding: 10px 20px; }
.section-title { font-family: 'Mitr'; font-size: 18px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }

.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

/* --- ส่วนของ Product Card (แก้ไขเพื่อรองรับกรอบสีม่วง) --- */
.product-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 2px solid transparent; position: relative; }
.product-card:active { transform: scale(0.98); }
.product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px 12px 0 0; }
.product-info { padding: 12px; }
.product-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--text-dark); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
.product-price { color: var(--primary); font-weight: 700; font-size: 15px; }

/* 🌟 เงื่อนไข 2.1: กรอบสีม่วง + ติ๊กถูกสีขาวบนวงกลมม่วง */
.product-card.selected { border-color: var(--primary); background-color: #fcf8ff; }
.check-badge { position: absolute; top: 8px; left: 8px; width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; z-index: 10; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
.product-card.selected .check-badge { display: flex; }

/* 🌟 เงื่อนไข 2.2: ปุ่มเลือกระบบใต้ชื่อแอพ */
.os-selector { display: flex; gap: 5px; margin-top: 8px; }
.os-btn { flex: 1; padding: 6px 0; font-size: 11px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer; font-weight: bold; color: #4b5563; transition: 0.2s; }
.os-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.os-btn:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; border: none; }

/* Sub-package View */
#subProductView { display: none; padding: 20px; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.back-btn { background: none; border: none; font-family: 'Kanit'; font-size: 15px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 15px; }
.product-list-item { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; border: 1px solid #f3f4f6; transition: 0.2s; }
.product-list-item.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(176,38,255,0.2); }
.product-list-item.disabled { opacity: 0.5; filter: grayscale(1); pointer-events: none; }

.status-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; margin-bottom: 5px; display: inline-block; }
.status-ready { background: #d1fae5; color: #065f46; }
.status-empty { background: #fee2e2; color: #991b1b; }
.status-wait { background: #fef3c7; color: #92400e; }

/* Cart Bottom Bar */
.cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--white); padding: 15px 20px 25px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-radius: 20px 20px 0 0; z-index: 90; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.cart-bar.active { transform: translateY(0); }
.cart-total { font-size: 14px; color: var(--text-muted); }
.cart-total-price { font-size: 20px; font-weight: 700; color: var(--primary); font-family: 'Mitr'; }
.checkout-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-family: 'Kanit'; font-weight: 600; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px var(--glow); }

/* Modals */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
.modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
.modal-close { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--text-muted); cursor: pointer; line-height: 1; }
.form-control { width: 100%; padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 10px; font-family: 'Kanit'; font-size: 14px; margin-bottom: 15px; outline: none; }
.form-control:focus { border-color: var(--primary); }
.form-select { width: 100%; padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 10px; font-family: 'Kanit'; font-size: 14px; margin-bottom: 15px; outline: none; background: white; }
.btn-primary { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-family: 'Kanit'; font-weight: 600; font-size: 16px; cursor: pointer; }

/* Loader */
#loader { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-main); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(176,38,255,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Cart Modal Items */
.cart-item { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f3f4f6; }
.cart-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
.cart-item-info { flex: 1; }
.cart-item-title { font-weight: 600; font-size: 14px; line-height: 1.2; }
.cart-item-variant { font-size: 12px; color: var(--text-muted); }
.cart-item-price { color: var(--primary); font-weight: 600; font-size: 14px; }
.cart-item-remove { color: var(--danger); background: #fee2e2; border: none; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; }
</style>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top: 15px; font-weight: 600; color: var(--primary);">กำลังโหลดข้อมูล...</div>
</div>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<header>
  <div class="logo">Wanderer Shop</div>
  <button class="admin-btn" onclick="openAdminLogin()">ผู้ดูแลระบบ</button>
</header>

<div id="mainView">
  <div class="search-container">
      <input type="text" id="searchInput" class="search-box" placeholder="ค้นหาแอปพลิเคชัน, เกม...">
  </div>

  <div class="category-scroll" id="categoryScroll">
      <div class="cat-btn active" onclick="filterCategory('ทั้งหมด', this)">หน้าแรก</div>
      <div class="cat-btn" onclick="filterCategory('แอพพรีเมี่ยม', this)">แอพพรีเมี่ยม</div>
      <div class="cat-btn" onclick="filterCategory('เติมเกม', this)">เติมเกม</div>
      <div class="cat-btn" onclick="filterCategory('แอพ/เกม IOS-ANDROID', this)">แอพ/เกม IOS-ANDROID</div>
      <div class="cat-btn" onclick="filterCategory('อื่นๆ', this)">อื่นๆ</div>
  </div>

  <div class="container">
      <div class="section-title" id="sectionTitle">สินค้าแนะนำ</div>
      <div class="product-grid" id="productContainer">
          </div>
  </div>
</div>

<div id="subProductView">
  <button class="back-btn" onclick="goBackToMain()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      กลับหน้าหลัก
  </button>
  
  <div style="text-align: left; margin-bottom: 20px; padding: 0 0px;">
      <h2 id="currentCategoryTitle" style="line-height:1.2; margin-bottom: 8px; color: var(--text-dark);">-</h2>
      <div id="currentCategoryDesc" style="font-size: 13.5px; color: var(--text-muted); white-space: pre-line; line-height: 1.5; display: none;"></div>
  </div>

  <div id="subProductList">
      </div>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-total" onclick="openCartModal()" style="cursor: pointer;">
      <div style="font-weight: 600; color: var(--text-dark); margin-bottom: 2px;">ตะกร้าสินค้า (<span id="cartCount">0</span>)</div>
      <div class="cart-total-price">฿<span id="cartTotal">0</span></div>
  </div>
  <button class="checkout-btn" onclick="openCartModal()">ชำระเงิน</button>
</div>

<div class="modal-overlay" id="cartModal">
  <div class="modal-content">
      <div class="modal-close" onclick="closeCartModal()">&times;</div>
      <h3 style="margin-bottom: 20px; font-family: 'Mitr';">🛒 ตะกร้าของคุณ</h3>
      <div id="cartItemsContainer" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
          </div>
      <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; margin-bottom: 20px; border-top: 2px dashed #e5e7eb; padding-top: 15px;">
          <span>ยอดรวมทั้งสิ้น:</span>
          <span style="color: var(--primary);">฿<span id="cartModalTotal">0</span></span>
      </div>
      <button class="btn-primary" onclick="proceedToCheckout()">ยืนยันการสั่งซื้อ</button>
  </div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal-content">
      <div class="modal-close" onclick="closeModal('loginModal')">&times;</div>
      <h3 style="margin-bottom: 20px; font-family: 'Mitr'; text-align: center;">เข้าสู่ระบบแอดมิน</h3>
      <input type="password" id="adminPin" class="form-control" placeholder="รหัสผ่าน PIN" style="text-align: center; letter-spacing: 5px; font-size: 18px;">
      <button class="btn-primary" onclick="verifyAdmin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div class="modal-overlay" id="adminDashboardModal">
  <div class="modal-content" style="max-width: 500px;">
      <div class="modal-close" onclick="closeModal('adminDashboardModal')">&times;</div>
      <h3 style="margin-bottom: 15px; font-family: 'Mitr'; display: flex; justify-content: space-between; align-items: center;">
          จัดการสินค้า
          <button onclick="openAddProductModal()" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer;">+ เพิ่มสินค้า</button>
      </h3>
      <div id="adminProductList" style="max-height: 60vh; overflow-y: auto;">
          </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-content">
      <div class="modal-close" onclick="closeModal('adminModal')">&times;</div>
      <h3 id="adminModalTitle" style="margin-bottom: 20px; font-family: 'Mitr';">เพิ่มสินค้าใหม่</h3>
      
      <input type="hidden" id="productId">
      
      <div style="margin-bottom:15px;">
          <label style="display:block; margin-bottom:5px; font-weight:500;">ชื่อแอป / เกมหลัก</label>
          <input type="text" id="name" class="form-control" placeholder="เช่น Netflix, RoV" required>
      </div>
      
      <div style="margin-bottom:15px;">
          <label style="display:block; margin-bottom:5px; font-weight:500;">หมวดหมู่</label>
          <select id="category" class="form-select" required onchange="checkCategoryForOSGroup()">
              <option value="">-- เลือกหมวดหมู่ --</option>
              <option value="แอพพรีเมี่ยม">แอพพรีเมี่ยม</option>
              <option value="เติมเกม">เติมเกม</option>
              <option value="แอพ/เกม IOS-ANDROID">แอพ/เกม IOS-ANDROID</option>
              <option value="อื่นๆ">อื่นๆ</option>
          </select>
      </div>

      <div id="osAppGroup" style="border: 1px dashed var(--primary); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: none; background-color: #fcf8ff;">
          <div style="margin-bottom: 12px; font-weight: 600; color: #333; font-size: 14px;">
              เลือกระบบที่รองรับ: 
              <label style="margin: 0 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;">
                  <input type="checkbox" id="supportIOS" onchange="toggleOSFields()"> 🍎 iOS
              </label>
              <label style="cursor: pointer; display: inline-flex; align-items: center; gap: 5px;">
                  <input type="checkbox" id="supportAndroid" onchange="toggleOSFields()"> 🤖 Android
              </label>
          </div>
          <div id="boxTextIOS" style="display: none; margin-bottom: 15px;">
              <label style="color: #333; font-weight: 600; font-size: 13px; margin-bottom: 5px; display: block;">ข้อความแจ้งลูกค้า (iOS):</label>
              <textarea id="textIOS" class="form-control" rows="2" placeholder="เช่น: แบบให้ร้านโหลดให้ ใช้ Apple ID ร้าน..." style="font-size: 13px; border-radius: 6px; margin-bottom:0;"></textarea>
          </div>
          <div id="boxTextAndroid" style="display: none;">
              <label style="color: #333; font-weight: 600; font-size: 13px; margin-bottom: 5px; display: block;">ข้อความแจ้งลูกค้า (Android):</label>
              <textarea id="textAndroid" class="form-control" rows="2" placeholder="เช่น: โหลดผ่าน Play Store เท่านั้น..." style="font-size: 13px; border-radius: 6px; margin-bottom:0;"></textarea>
          </div>
      </div>

      <div style="margin-bottom:15px;">
          <label style="display:block; margin-bottom:5px; font-weight:500;">คำอธิบาย / กติกา (แสดงหน้าเลือกแพ็กเกจ)</label>
          <textarea id="desc" class="form-control" rows="3" placeholder="เช่น ห้ามเปลี่ยนรหัสผ่าน..."></textarea>
      </div>

      <div style="margin-bottom:15px;">
          <label style="display:block; margin-bottom:5px; font-weight:500;">ลิงก์รูปภาพปก (Square)</label>
          <input type="url" id="imageUrl" class="form-control" placeholder="https://..." required>
      </div>

      <div style="margin-bottom:15px;">
          <label style="display:block; margin-bottom:5px; font-weight:500;">ลิงก์ภาพ / ไอคอนแอป (ใส่หรือไม่ใส่ก็ได้)</label>
          <input type="url" id="iconUrl" class="form-control" placeholder="https://...">
      </div>

      <div style="border-top: 2px dashed #e5e7eb; margin: 20px 0; padding-top: 15px;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:var(--primary);">เพิ่มแพ็กเกจย่อย</label>
          <small style="color:gray; display:block; margin-bottom:10px;">กรอกข้อมูลด้านล่างนี้เพื่อสร้าง 1 แพ็กเกจของแอปด้านบน</small>
          
          <input type="text" id="variant" class="form-control" placeholder="ชื่อแพ็กเกจ เช่น จอส่วนตัว 30 วัน" required>
          <input type="text" id="subDesc" class="form-control" placeholder="รายละเอียดเสริม เช่น (รับประกันตลอดจอ)">
          <input type="number" id="price" class="form-control" placeholder="ราคา (บาท)" required>
          
          <select id="status" class="form-select">
              <option value="ready">🟢 สินค้าพร้อมส่ง</option>
              <option value="empty">🔴 สินค้าหมด</option>
              <option value="wait">🟠 รอของเข้า</option>
          </select>
      </div>

      <button class="btn-primary" onclick="saveProduct()" id="saveBtn">บันทึกข้อมูล</button>
  </div>
</div>

<script>
// --- Configuration ---
const APP_URL = 'https://script.google.com/macros/s/AKfycbx1ijbDV6ugE-bo2hcx2-SsdBNtoyxOvZOt-v27lF9l6TVMiJ-URXyBdMZzLAOJIGVpBw/exec';
const ADMIN_PIN = '170647'; 

let allProducts = [];
let currentCategory = 'ทั้งหมด';
let cart = [];

window.onload = () => {
  loadProducts();
  loadCart();
};

function execAppsScript(action, data = {}) {
  return new Promise((resolve, reject) => {
      let form = new FormData();
      form.append('action', action);
      if(data) form.append('data', JSON.stringify(data));

      fetch(APP_URL, { method: 'POST', body: form })
          .then(res => res.json())
          .then(res => {
              if(res.status === 'success') resolve(res);
              else reject(res.message);
          })
          .catch(err => reject(err));
  });
}

function loadProducts() {
  document.getElementById('loader').style.display = 'flex';
  execAppsScript('getProducts')
      .then(res => {
          allProducts = res.data;
          renderProductsByCategory();
          document.getElementById('loader').style.display = 'none';
      })
      .catch(err => {
          console.error(err);
          Swal.fire('ข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลได้', 'error');
          document.getElementById('loader').style.display = 'none';
      });
}

// 🌟 แก้ปัญหาข้อมูลทะลุแท็บ (ใช้ currentCategory กรอง)
function filterCategory(cat, element) {
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
  element.classList.add('active');
  currentCategory = cat;
  
  let sectionTitle = document.getElementById('sectionTitle');
  sectionTitle.innerText = cat === 'ทั้งหมด' ? 'สินค้าแนะนำ' : `หมวดหมู่: ${cat}`;
  
  renderProductsByCategory();
}

function renderProductsByCategory() {
  let filtered = currentCategory === 'ทั้งหมด' 
      ? allProducts 
      : allProducts.filter(p => p.category === currentCategory);

  let grouped = [];
  let map = new Map();
  for (const item of filtered) {
      if(!map.has(item.name)){
          map.set(item.name, true);
          let minPriceItem = filtered.filter(x => x.name === item.name).reduce((prev, curr) => (parseFloat(prev.price) < parseFloat(curr.price) ? prev : curr));
          let pCopy = {...item};
          pCopy.price = minPriceItem.price; 
          grouped.push(pCopy);
      }
  }

  renderProducts(grouped);
}

function renderProducts(productsToRender) {
  const container = document.getElementById('productContainer');
  if(productsToRender.length === 0) {
      container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px 0; color: var(--text-muted);">ไม่มีสินค้าในหมวดหมู่นี้</div>';
      return;
  }
  let html = '';
  productsToRender.forEach(p => {
      
      // 🌟 เงื่อนไข 2: หมวดหมู่ IOS-ANDROID ไม่ต้องมี Pop-up ยืนยัน
      if (p.category === 'แอพ/เกม IOS-ANDROID' || p.category.includes('IOS-ANDROID')) {
          
          let iosInCart = cart.find(c => c.id === p.id && c.osType === 'iOS');
          let andInCart = cart.find(c => c.id === p.id && c.osType === 'Android');
          let isSelected = iosInCart || andInCart;

          let supportIOSBool = p.supportIOS === true || p.supportIOS === 'TRUE' || p.supportIOS === 'true';
          let supportAndroidBool = p.supportAndroid === true || p.supportAndroid === 'TRUE' || p.supportAndroid === 'true';

          let btnIOS = supportIOSBool 
              ? `<button class="os-btn ${iosInCart?'active':''}" onclick="toggleDirectCart('${p.id}', 'iOS', event)">🍎 iOS</button>` 
              : `<button class="os-btn" disabled>🍎 iOS</button>`;
              
          let btnAndroid = supportAndroidBool 
              ? `<button class="os-btn ${andInCart?'active':''}" onclick="toggleDirectCart('${p.id}', 'Android', event)">🤖 Android</button>`
              : `<button class="os-btn" disabled>🤖 Android</button>`;

          html += `
          <div class="product-card ${isSelected ? 'selected' : ''}" style="cursor: default;">
              
              <div style="position: relative;">
                  <div class="check-badge">✓</div>
                  <img src="${p.imageUrl}" alt="${p.name}" style="border-bottom: 1px solid #f3f4f6; border-radius: 12px 12px 0 0;">
              </div>
              
              <div class="product-info" style="padding: 12px;">
                  <div class="product-title" style="font-size: 13px;">${p.name}</div>
                  <div class="product-price">฿${p.price}</div>
                  
                  <div class="os-selector">
                      ${btnIOS}
                      ${btnAndroid}
                  </div>
              </div>
              
          </div>`;

      } else {
          // โหมดปกติ (แอพพรีเมี่ยม ฯลฯ)
          html += `
          <div class="product-card" onclick="showProductDetails('${p.name}')">
              <img src="${p.imageUrl}" alt="${p.name}" style="border-radius: 12px 12px 0 0;">
              <div class="product-info">
                  <div class="product-title">${p.name}</div>
                  <div class="product-price">เริ่มต้น ฿${p.price}</div>
              </div>
          </div>`;
      }
  });
  container.innerHTML = html;
}

// 🌟 ฟังก์ชันจัดการปุ่ม iOS/Android ลงตะกร้า (ไม่ต้อง Pop-up)
function toggleDirectCart(productId, osType, event) {
    event.stopPropagation(); // กันไม่ให้คลิกทะลุไปการ์ดหลัก
    const product = allProducts.find(p => p.id === productId); 
    if (!product) return;

    let uid = product.id + '_' + osType;
    let existingIdx = cart.findIndex(item => item.uid === uid);

    if (existingIdx > -1) {
        // เอาออกจากตะกร้า
        cart.splice(existingIdx, 1);
    } else {
        // เอาเข้าตะกร้า
        cart.push({
            id: product.id,
            name: product.name,
            price: parseFloat(product.price),
            variant: `${osType}`, // เก็บเพื่อโชว์ในฟอร์ม
            image: product.imageUrl,
            uid: uid,
            category: product.category,
            osType: osType
        });
    }
    
    saveCart();
    renderCart();
    renderProductsByCategory(); // บังคับให้การ์ดอัปเดตสีม่วง
}

// 🌟 ฟังก์ชันคำนวณราคา (สำหรับเงื่อนไข 3 ถึง 30 แอพ)
function calculateTotal() {
    let appCount = cart.length;
    let sum = cart.reduce((s, item) => s + item.price, 0);

    if (appCount >= 3 && appCount <= 30) {
        // [แก้ไขสูตรโปรโมชั่นของคุณตรงนี้ได้เลยครับ]
        // ตัวอย่าง 1: ลดเหลือแอพละ 50 บาท -> return appCount * 50;
        // ตัวอย่าง 2: ลด 10% -> return sum * 0.9;
        
        return sum; // ตอนนี้เป็นราคาสะสมปกติ
    }
    
    return sum; // นอกเหนือ 3-30 แอพ คิดปกติ
}

// Search
document.getElementById('searchInput').addEventListener('input', function(e) {
  let text = e.target.value.toLowerCase();
  if(text === '') { renderProductsByCategory(); return; }

  let filtered = allProducts.filter(p => p.name.toLowerCase().includes(text));
  let grouped = [];
  let map = new Map();
  for (const item of filtered) {
      if(!map.has(item.name)){
          map.set(item.name, true);
          grouped.push(item);
      }
  }
  renderProducts(grouped);
});

// --- Sub Product Details View (สำหรับโหมดปกติ) ---
function showProductDetails(productName) {
  let subProducts = allProducts.filter(p => p.name === productName);
  if(subProducts.length === 0) return;

  document.getElementById('mainView').style.display = 'none';
  document.getElementById('subProductView').style.display = 'block';
  document.getElementById('currentCategoryTitle').innerText = subProducts[0].name;
  
  let descEl = document.getElementById('currentCategoryDesc');
  if(subProducts[0].desc) {
      descEl.innerText = subProducts[0].desc;
      descEl.style.display = 'block';
  } else {
      descEl.style.display = 'none';
  }

  renderProductList(subProducts);
  window.scrollTo(0,0);
}

function goBackToMain() {
  document.getElementById('subProductView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
}

function renderProductList(subProducts) {
  const container = document.getElementById('subProductList');
  let html = '';

  subProducts.forEach(p => {
      let isSel = cart.find(item => item.uid === p.id);
      let statBadge = '';
      let disClass = '';
      
      if(p.status === 'ready') statBadge = '<span class="status-badge status-ready">พร้อมส่ง</span>';
      else if(p.status === 'empty') { statBadge = '<span class="status-badge status-empty">สินค้าหมด</span>'; disClass = 'disabled'; }
      else if(p.status === 'wait') { statBadge = '<span class="status-badge status-wait">รอของเข้า</span>'; disClass = 'disabled'; }

      let v = p.variant ? p.variant : p.name;
      let nameHtml = `<div class="variant-label" style="font-size: 15px; font-weight: 700; color: var(--primary); margin: 0 0 10px 0; text-align: left;">${v}</div>${statBadge}`;
      let subDescHtml = p.subDesc ? `<div style="font-size: 12px; color: #6b7280; line-height: 1.2;">${p.subDesc}</div>` : '';

      html += `<div class="product-list-item ${isSel?'selected':''} ${disClass}" ${p.status === 'ready' ? `onclick="toggleCart('${p.id}')"` : ''} id="item-${p.id}">
          <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
              ${p.iconUrl ? `<img src="${p.iconUrl}" style="width: 40px; height: 40px; border-radius: 8px; margin-right: 12px; object-fit: cover; flex-shrink: 0; border: 1px solid #f3f4f6;">` : ''}
              <div style="flex: 1; text-align: left; padding-right: 10px;">${nameHtml}</div>
              ${p.subDesc ? `<div style="flex: 1.2; text-align: center; border-left: 1px solid #f3f4f6; border-right: 1px solid #f3f4f6; padding: 0 10px; min-height: 20px; display: flex; align-items: center; justify-content: center;">${subDescHtml}</div>` : `<div style="flex: 1.2;"></div>`}
              <div style="flex: 1; text-align: right; font-weight: 700; color: var(--primary); font-size: 16px; padding-left: 10px;">฿${p.price}</div>
          </div>
      </div>`;
  });
  container.innerHTML = html;
}

// --- Cart System ---
function loadCart() {
  let saved = localStorage.getItem('wanderer_cart');
  if(saved) {
      cart = JSON.parse(saved);
      renderCart();
  }
}

function saveCart() {
  localStorage.setItem('wanderer_cart', JSON.stringify(cart));
}

function toggleCart(id) {
  let p = allProducts.find(x => x.id === id);
  if(!p) return;

  let existingIdx = cart.findIndex(item => item.uid === id);
  let el = document.getElementById(`item-${id}`);

  if(existingIdx > -1) {
      cart.splice(existingIdx, 1);
      if(el) el.classList.remove('selected');
  } else {
      cart.push({
          id: p.id,
          name: p.name,
          price: parseFloat(p.price),
          variant: p.variant,
          image: p.imageUrl,
          uid: p.id,
          category: p.category
      });
      if(el) el.classList.add('selected');
      
      Swal.fire({ icon: 'success', title: 'เพิ่มลงตะกร้าแล้ว', showConfirmButton: false, timer: 800, toast: true, position: 'top' });
  }
  
  saveCart();
  renderCart();
}

function removeFromCart(uid) {
  cart = cart.filter(item => item.uid !== uid);
  saveCart();
  renderCart();
  renderProductsByCategory();
}

function renderCart() {
  let count = cart.length;
  let total = calculateTotal(); // ใช้งานโปรโมชั่น

  document.getElementById('cartCount').innerText = count;
  document.getElementById('cartTotal').innerText = total;
  document.getElementById('cartModalTotal').innerText = total;

  let bar = document.getElementById('cartBar');
  if(count > 0) bar.classList.add('active');
  else bar.classList.remove('active');

  let html = '';
  if(count === 0) {
      html = '<div style="text-align:center; color:gray; padding:20px 0;">ตะกร้าว่างเปล่า</div>';
  } else {
      cart.forEach(item => {
          let vName = item.osType ? `[${item.osType}]` : (item.variant || '');
          html += `
          <div class="cart-item">
              <img src="${item.image}">
              <div class="cart-item-info">
                  <div class="cart-item-title">${item.name}</div>
                  <div class="cart-item-variant" style="color:var(--primary); font-weight:600;">${vName}</div>
                  <div class="cart-item-price">฿${item.price}</div>
              </div>
              <button class="cart-item-remove" onclick="removeFromCart('${item.uid}')">&times;</button>
          </div>`;
      });
  }
  document.getElementById('cartItemsContainer').innerHTML = html;
}

// 🌟 เงื่อนไข 3: ฟอร์มสั่งซื้อแบบใหม่ มินิมอล
function proceedToCheckout() {
  if(cart.length === 0) return;
  
  let total = calculateTotal();
  // จัดเรียงรายการแอปและระบบที่เลือก (เช่น Minecraft [iOS])
  let itemsText = cart.map(item => {
      let vLabel = item.osType ? `[${item.osType}]` : (item.variant ? `[${item.variant}]` : '');
      return `🍃 ݂  ${item.name} ${vLabel} 𓈒`;
  }).join('\n');

  let orderText = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*
---------------------------
✿  𓈒  รวมยอด    ꒰  ${total}฿  ꒱   ݂🎐♡
${itemsText}
---------------------------
รบกวนแม่ค้าสรุปยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ 🙏`;

  let encodedMsg = encodeURIComponent(orderText);
  let lineUrl = `https://line.me/ti/p/~@997pfoig?text=${encodedMsg}`; // แทนที่ด้วย LINE ID จริง
  
  closeCartModal();
  
  Swal.fire({
      title: 'กำลังพาท่านไปที่ LINE',
      text: 'ระบบได้คัดลอกรายการสั่งซื้อไว้แล้ว ให้กดวาง(Paste) ในแชทได้เลย',
      icon: 'success',
      confirmButtonText: 'ตกลง',
      confirmButtonColor: 'var(--primary)'
  }).then(() => {
      cart = [];
      saveCart();
      renderCart();
      renderProductsByCategory();
      window.location.href = lineUrl;
  });
}

// --- Admin System ---
function openAdminLogin() { document.getElementById('loginModal').style.display = 'flex'; }
function verifyAdmin() {
  let pin = document.getElementById('adminPin').value;
  if(pin === ADMIN_PIN) {
      closeModal('loginModal');
      document.getElementById('adminPin').value = '';
      openAdminDashboard();
  } else {
      Swal.fire('ผิดพลาด', 'รหัส PIN ไม่ถูกต้อง', 'error');
  }
}

function openAdminDashboard() {
  document.getElementById('adminDashboardModal').style.display = 'flex';
  renderAdminProducts();
}

function renderAdminProducts() {
  let container = document.getElementById('adminProductList');
  if(allProducts.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:20px;">ไม่มีข้อมูลสินค้า</div>';
      return;
  }

  let groupedAdmin = {};
  allProducts.forEach(p => {
      if (!groupedAdmin[p.category]) groupedAdmin[p.category] = [];
      groupedAdmin[p.category].push(p);
  });

  let html = '';
  for(let cat in groupedAdmin) {
      html += `<div style="background:#f9fafb; padding:8px 10px; font-weight:bold; color:var(--primary); border-radius:6px; margin-top:10px; border-left:3px solid var(--primary);">📦 ${cat}</div>`;
      groupedAdmin[cat].forEach(p => {
          let sDot = p.status === 'ready' ? '🟢' : (p.status === 'empty' ? '🔴' : '🟠');
          html += `<div style="font-size:13px; border-bottom:1px solid #f3f4f6; padding:12px 5px 12px 15px; display:flex; justify-content:space-between; align-items:center;">
              <div>${sDot} ${p.name || '-'}<br><small style="color:gray;">${p.variant ? `[${p.variant}]` : ''} - ฿${p.price}</small></div>
              <div>
                  <button type="button" onclick="editProduct('${p.id}')" style="color:#2563eb; border:none; background:none; font-weight:600; cursor:pointer; margin-right:10px;">แก้ไข</button>
                  <button type="button" onclick="deleteProduct('${p.id}')" style="color:#ef4444; border:none; background:none; font-weight:600; cursor:pointer;">ลบ</button>
              </div>
          </div>`;
      });
  }
  container.innerHTML = html;
}

function openAddProductModal() {
  resetAdminForm();
  document.getElementById('adminModal').style.display = 'flex';
}

function editProduct(id) {
  let p = allProducts.find(x => x.id === id);
  if(!p) return;
  
  document.getElementById('productId').value = p.id;
  document.getElementById('name').value = p.name;
  document.getElementById('category').value = p.category;
  document.getElementById('desc').value = p.desc || '';
  document.getElementById('price').value = p.price;
  document.getElementById('imageUrl').value = p.imageUrl;
  document.getElementById('variant').value = p.variant || '';
  document.getElementById('subDesc').value = p.subDesc || '';
  document.getElementById('status').value = p.status || 'ready';
  document.getElementById('iconUrl').value = p.iconUrl || '';
  
  document.getElementById('supportIOS').checked = (p.supportIOS === true || p.supportIOS === 'TRUE' || p.supportIOS === 'true');
  document.getElementById('supportAndroid').checked = (p.supportAndroid === true || p.supportAndroid === 'TRUE' || p.supportAndroid === 'true');
  document.getElementById('textIOS').value = p.textIOS || '';
  document.getElementById('textAndroid').value = p.textAndroid || '';
  
  checkCategoryForOSGroup();
  
  document.getElementById('adminModalTitle').innerText = 'แก้ไขสินค้า';
  document.getElementById('adminModal').style.display = 'flex';
}

function checkCategoryForOSGroup() {
  const categorySelect = document.getElementById('category');
  if (!categorySelect) return;
  const osGroup = document.getElementById('osAppGroup');
  if (categorySelect.value === 'แอพ/เกม IOS-ANDROID') { osGroup.style.display = 'block'; } 
  else {
      osGroup.style.display = 'none';
      document.getElementById('supportIOS').checked = false;
      document.getElementById('supportAndroid').checked = false;
      document.getElementById('textIOS').value = '';
      document.getElementById('textAndroid').value = '';
      toggleOSFields();
  }
}

function toggleOSFields() {
  document.getElementById('boxTextIOS').style.display = document.getElementById('supportIOS').checked ? 'block' : 'none';
  document.getElementById('boxTextAndroid').style.display = document.getElementById('supportAndroid').checked ? 'block' : 'none';
}

function saveProduct() {
  let btn = document.getElementById('saveBtn');
  let name = document.getElementById('name').value;
  let price = document.getElementById('price').value;
  let category = document.getElementById('category').value;
  
  if(!name || !price || !category) { Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลที่จำเป็นให้ครบ', 'warning'); return; }

  btn.innerText = 'กำลังบันทึก...'; btn.disabled = true;

  let productData = {
      id: document.getElementById('productId').value || generateId(),
      name: name, category: category, desc: document.getElementById('desc').value,
      price: price, imageUrl: document.getElementById('imageUrl').value,
      variant: document.getElementById('variant').value, subDesc: document.getElementById('subDesc').value,
      status: document.getElementById('status').value, iconUrl: document.getElementById('iconUrl').value,
      supportIOS: document.getElementById('supportIOS').checked,
      supportAndroid: document.getElementById('supportAndroid').checked,
      textIOS: document.getElementById('textIOS').value,
      textAndroid: document.getElementById('textAndroid').value
  };

  execAppsScript('saveProduct', productData)
      .then(res => { Swal.fire('สำเร็จ', 'บันทึกข้อมูลแล้ว', 'success'); closeModal('adminModal'); loadProducts(); })
      .catch(err => { Swal.fire('ผิดพลาด', 'ไม่สามารถบันทึกได้: ' + err, 'error'); })
      .finally(() => { btn.innerText = 'บันทึกข้อมูล'; btn.disabled = false; });
}

function deleteProduct(id) {
  Swal.fire({
      title: 'ยืนยันการลบ?', text: "คุณจะไม่สามารถกู้คืนข้อมูลนี้ได้!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'ใช่, ลบเลย!'
  }).then((result) => {
      if (result.isConfirmed) {
          document.getElementById('loader').style.display = 'flex';
          execAppsScript('deleteProduct', { id: id })
              .then(res => { Swal.fire('ลบแล้ว!', 'ข้อมูลถูกลบเรียบร้อย', 'success'); loadProducts(); })
              .catch(err => Swal.fire('ผิดพลาด', err, 'error'))
              .finally(() => document.getElementById('loader').style.display = 'none');
      }
  });
}

function resetAdminForm() {
  document.getElementById('productId').value = ''; document.getElementById('name').value = '';
  document.getElementById('category').value = ''; document.getElementById('desc').value = '';
  document.getElementById('price').value = ''; document.getElementById('imageUrl').value = '';
  document.getElementById('variant').value = ''; document.getElementById('subDesc').value = '';
  document.getElementById('status').value = 'ready'; document.getElementById('iconUrl').value = '';
  document.getElementById('supportIOS').checked = false; document.getElementById('supportAndroid').checked = false;
  document.getElementById('textIOS').value = ''; document.getElementById('textAndroid').value = '';
  checkCategoryForOSGroup(); document.getElementById('adminModalTitle').innerText = 'เพิ่มสินค้าใหม่';
}

function generateId() { return 'prod_' + Math.random().toString(36).substr(2, 9); }
function openCartModal() { document.getElementById('cartModal').style.display = 'flex'; }
function closeCartModal() { document.getElementById('cartModal').style.display = 'none'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
