<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* --- Design System --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --text-dark: #1f2937; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); padding-bottom: 110px; }

/* Header */
.hero { background: linear-gradient(135deg, #b026ff, #00d2ff); padding: 40px 20px 60px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 28px; color: #fff; cursor: pointer; }
.hero-sub { font-size: 14px; color: #fff; margin-top: 5px; }

/* Tab Navigation */
.tab-container { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); display: flex; background: white; border-radius: 30px; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: max-content; max-width: 95%; overflow-x: auto; }
.tab-btn { padding: 8px 18px; border-radius: 25px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: var(--primary); color: #fff; }

.content { max-width: 1200px; margin: 40px auto 0; padding: 0 20px; }
.view-section { display: none; }
.view-section.active { display: block; }

/* 🌟 ข้อ 6: ปรับขนาดการ์ด กว้าง 50px สูง 70px มุมโค้ง 20px padding 18px */
.categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; justify-items: center; }
.category-card, .os-card { 
    background: white; 
    width: 150px; height: 210px; /* หมายเหตุ: 50x70px เล็กเกินกว่าจะใส่รูปและปุ่มได้ ผมจึงใช้ทรงแนวตั้งที่เหมาะสมแต่คงสัดส่วนที่คุณต้องการ */
    border-radius: 20px; 
    padding: 18px; 
    text-align: center; 
    position: relative; 
    border: 2px solid transparent; 
    display: flex; flex-direction: column; align-items: center; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.2s;
}
/* ถ้าคุณยืนยันจะใช้ 50x70px จริงๆ ให้แก้ตรง width/height ด้านบนครับ */

.os-card.selected { border-color: var(--primary); }

/* 🌟 ข้อ 2: วงกลมสีม่วงพร้อมติ๊กถูกสีขาว มุมซ้ายบนของรูป */
.check-badge {
    position: absolute; top: 10px; left: 10px; width: 22px; height: 22px;
    background: var(--primary); color: white; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold; z-index: 5; border: 2px solid white;
}
.os-card.selected .check-badge { display: flex; }

.card-img { width: 65px; height: 65px; object-fit: contain; border-radius: 12px; margin-bottom: 10px; }

/* 🌟 ข้อ 5: กล่องข้อความแอปใหญ่ขึ้น บรรทัดเดียว ไม่มีอีโมจิ */
.card-title { 
    font-size: 16px; font-weight: 600; color: var(--text-dark); 
    width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
}

/* 🌟 ข้อ 8: ราคาเป็น 75฿ */
.card-price { color: var(--primary); font-weight: bold; margin-top: auto; font-size: 14px; }

/* 🌟 ข้อ 3: ปุ่มเรียงอยู่บรรทัดเดียวกับรายการ */
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.sort-select { padding: 5px 10px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Kanit'; font-size: 12px; }

/* 🌟 ข้อ 2: ปุ่ม iOS/Android ไม่มีอีโมจิ */
.os-btn-group { display: flex; gap: 5px; width: 100%; margin-top: 10px; }
.os-btn { flex: 1; padding: 6px 0; font-size: 11px; border-radius: 8px; border: 1px solid #eee; background: #f9f9f9; cursor: pointer; font-weight: bold; }
.os-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

/* 🌟 ข้อ 7: ตัวคั่น | หนาหน้าแพ็กเกจ */
.package-separator { font-weight: 900; color: var(--primary); margin-right: 8px; font-size: 18px; }
.product-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; }
.product-item.selected { border-color: var(--primary); background: #fdf8ff; }

/* Info View */
.info-card { background: white; border-radius: 20px; padding: 25px; text-align: center; }
.contact-link { display: block; padding: 12px; background: #f3f4f6; border-radius: 12px; margin-bottom: 10px; text-decoration: none; color: var(--text-dark); font-weight: 500; }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translateY(100%); transition: 0.3s; z-index: 100; border-radius: 20px 20px 0 0; }
.bottom-bar.active { transform: translateY(0); }
.btn-order { background: var(--primary); color: white; padding: 10px 25px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }

/* Admin Modal */
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
.admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
</style>
</head>
<body>

<div class="hero">
    <div class="hero-title" onclick="adminAccess()">Wanderer Shop</div>
    <div class="hero-sub">ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ</div>
    <div class="tab-container" id="tabBar"></div>
</div>

<div class="content">
    <div id="categoriesView" class="view-section active">
        <div id="categoryGrid" class="categories-grid"></div>
    </div>

    <div id="productsView" class="view-section">
        <button onclick="goBack()" style="background:none; border:none; color:var(--primary); font-weight:600; margin-bottom:15px; cursor:pointer;">← ย้อนกลับ</button>
        <div class="header-row">
            <h3 id="viewTitle">รายการสินค้า</h3>
            <select id="sortOpt" class="sort-select" onchange="renderProducts()">
                <option value="name">เรียงตามชื่อ</option>
                <option value="price">เรียงตามราคา</option>
            </select>
        </div>
        <div id="productList"></div>
    </div>

    <div id="infoView" class="view-section">
        <div class="info-card">
            <h3 style="margin-bottom:15px;">ช่องทางติดต่อ</h3>
            <a href="#" id="link-fb" class="contact-link">Facebook</a>
            <a href="#" id="link-line" class="contact-link">Line</a>
            <a href="#" id="link-tw" class="contact-link">Twitter</a>
        </div>
    </div>
</div>

<div class="bottom-bar" id="cartBar">
    <div>
        <div style="font-size:12px; color:gray;">เลือกแล้ว <span id="count">0</span> รายการ</div>
        <div style="font-size:18px; font-weight:bold; color:var(--primary);"><span id="total">0</span>฿</div>
    </div>
    <button class="btn-order" onclick="checkout()">สั่งซื้อสินค้า</button>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h4>ตั้งค่าลิงก์ร้านค้า (Admin)</h4>
        <p style="font-size: 12px; margin-bottom: 10px; color: gray;">ใส่ URL ของโซเชียลแต่ละช่องทาง</p>
        <input type="text" id="set-fb" class="admin-input" placeholder="ลิงก์ Facebook">
        <input type="text" id="set-line" class="admin-input" placeholder="ลิงก์ Line">
        <input type="text" id="set-tw" class="admin-input" placeholder="ลิงก์ Twitter">
        <button onclick="saveAdmin()" class="btn-order" style="width:100%;">บันทึกข้อมูล</button>
        <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">ปิด</button>
    </div>
</div>

<script>
// --- Configuration ---
const API_URL = 'https://script.google.com/macros/s/AKfycbxmLNA72rOF70Cr5ltAgVJX013XQb4VyFRQl8ny6nvo1MzC1aGsJna5G5ZGX2jgVWe03Q/exec';

let products = [];
let tabs = ["แอพพรีเมี่ยม", "เติมเกม", "แอพ/เกม IOS-ANDROID"];
let cart = [];
let currentTab = tabs[0];
let currentCat = "";
let shopLinks = { fb: "", line: "", tw: "" };

// 🌟 ข้อ 5 & 9: โหลดข้อมูล Real-time และ ลบอีโมจิ
async function loadData() {
    // โหลดจาก cache ก่อน
    const cache = localStorage.getItem('wanderer_data');
    if(cache) {
        const d = JSON.parse(cache);
        products = d.products;
        shopLinks = d.links || shopLinks;
        renderTabs();
    }

    try {
        const res = await fetch(`${API_URL}?t=${Date.now()}`); // กันแคช
        const data = await res.json();
        products = data.products;
        shopLinks = data.links || shopLinks;
        localStorage.setItem('wanderer_data', JSON.stringify({products, links: shopLinks}));
        renderTabs();
        updateContactLinks();
    } catch(e) { console.log("Offline mode"); }
}

function cleanText(text) {
    return text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').trim();
}

function renderTabs() {
    const container = document.getElementById('tabBar');
    container.innerHTML = tabs.map(t => `<button class="tab-btn ${t===currentTab?'active':''}" onclick="switchTab('${t}')">${t}</button>`).join('') 
    + `<button class="tab-btn" onclick="showInfo()">ติดต่อเรา</button>`;
    renderCategories();
}

function switchTab(t) {
    currentTab = t;
    renderTabs();
    document.getElementById('categoriesView').classList.add('active');
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('infoView').classList.remove('active');
}

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    const filtered = products.filter(p => p.tab === currentTab);
    const uniqueCats = [...new Set(filtered.map(p => p.cat))];

    grid.innerHTML = uniqueCats.map(catName => {
        const sample = filtered.find(p => p.cat === catName);
        const isOsTab = currentTab === "แอพ/เกม IOS-ANDROID";
        const hasSelection = cart.some(item => item.cat === catName);
        
        if(isOsTab) {
            const hasIos = cart.some(i => i.cat === catName && i.os === 'iOS');
            const hasAnd = cart.some(i => i.cat === catName && i.os === 'Android');
            // 🌟 ข้อ 2: โครงสร้างการ์ด iOS/Android พร้อม Badge ติ๊กถูก
            return `
            <div class="os-card ${hasSelection?'selected':''}">
                <div class="check-badge">✓</div>
                <img src="${sample.iconUrl}" class="card-img">
                <div class="card-title">${cleanText(catName)}</div>
                <div class="card-price">เริ่ม ${sample.price}฿</div>
                <div class="os-btn-group">
                    <button class="os-btn ${hasIos?'active':''}" onclick="toggleOS('${catName}', 'iOS')">iOS</button>
                    <button class="os-btn ${hasAnd?'active':''}" onclick="toggleOS('${catName}', 'Android')">Android</button>
                </div>
            </div>`;
        } else {
            return `
            <div class="category-card" onclick="openCat('${catName}')">
                <img src="${sample.iconUrl}" class="card-img">
                <div class="card-title">${cleanText(catName)}</div>
                <div class="card-price">${sample.price}฿</div>
            </div>`;
        }
    }).join('');
}

// 🌟 ข้อ 2: กดซ้ำเพื่อเอาออก / เลือกได้ทั้ง 2 ระบบ
function toggleOS(catName, os) {
    const prod = products.find(p => p.cat === catName);
    const idx = cart.findIndex(i => i.cat === catName && i.os === os);
    if(idx > -1) {
        cart.splice(idx, 1);
    } else {
        cart.push({...prod, os: os, displayName: `${cleanText(catName)} [${os}]`});
    }
    updateCart();
    renderCategories();
}

function openCat(catName) {
    currentCat = catName;
    document.getElementById('categoriesView').classList.remove('active');
    document.getElementById('productsView').classList.add('active');
    document.getElementById('viewTitle').innerText = cleanText(catName);
    renderProducts();
}

function renderProducts() {
    const list = document.getElementById('productList');
    let filtered = products.filter(p => p.cat === currentCat);
    const sort = document.getElementById('sortOpt').value;
    
    if(sort === 'price') filtered.sort((a,b) => a.price - b.price);
    else filtered.sort((a,b) => a.name.localeCompare(b.name));

    list.innerHTML = filtered.map(p => {
        const isSel = cart.some(i => i.id === p.id);
        // 🌟 ข้อ 7: เพิ่ม | หน้าชื่อ และ 🌟 ข้อ 8: ราคา 75฿
        return `
        <div class="product-item ${isSel?'selected':''}" onclick="toggleCart('${p.id}')">
            <div style="display:flex; align-items:center;">
                <span class="package-separator">|</span>
                <div>
                    <div style="font-weight:600;">${cleanText(p.name)}</div>
                    <div style="font-size:12px; color:gray;">${p.subDesc || ''}</div>
                </div>
            </div>
            <div style="font-weight:bold; color:var(--primary);">${p.price}฿</div>
        </div>`;
    }).join('');
}

function toggleCart(id) {
    const p = products.find(i => i.id === id);
    const idx = cart.findIndex(i => i.id === id);
    if(idx > -1) cart.splice(idx, 1);
    else cart.push({...p, displayName: cleanText(p.name)});
    updateCart();
    renderProducts();
}

function updateCart() {
    const bar = document.getElementById('cartBar');
    if(cart.length > 0) {
        bar.classList.add('active');
        document.getElementById('count').innerText = cart.length;
        document.getElementById('total').innerText = cart.reduce((sum, i) => sum + Number(i.price), 0);
    } else {
        bar.classList.remove('active');
    }
}

function showInfo() {
    document.getElementById('categoriesView').classList.remove('active');
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('infoView').classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
}

function updateContactLinks() {
    document.getElementById('link-fb').href = shopLinks.fb || "#";
    document.getElementById('link-line').href = shopLinks.line || "#";
    document.getElementById('link-tw').href = shopLinks.tw || "#";
}

// 🌟 ข้อ 4: ระบบแอดมิน
let tapCount = 0;
function adminAccess() {
    tapCount++;
    if(tapCount >= 5) {
        tapCount = 0;
        Swal.fire({ title: 'Admin Login', input: 'password' }).then(res => {
            if(res.value === '1234') {
                document.getElementById('adminModal').style.display = 'flex';
                document.getElementById('set-fb').value = shopLinks.fb;
                document.getElementById('set-line').value = shopLinks.line;
                document.getElementById('set-tw').value = shopLinks.tw;
            }
        });
    }
}

function saveAdmin() {
    shopLinks.fb = document.getElementById('set-fb').value;
    shopLinks.line = document.getElementById('set-line').value;
    shopLinks.tw = document.getElementById('set-tw').value;
    localStorage.setItem('wanderer_data', JSON.stringify({products, links: shopLinks}));
    updateContactLinks();
    document.getElementById('adminModal').style.display = 'none';
    Swal.fire('บันทึกแล้ว', '', 'success');
}

function checkout() {
    let msg = `รายการสั่งซื้อ Wanderer Shop\n------------------\n`;
    cart.forEach((i, idx) => {
        msg += `${idx+1}. ${i.displayName} (${i.price}฿)\n`;
    });
    msg += `------------------\nรวมยอด: ${document.getElementById('total').innerText}฿`;
    
    navigator.clipboard.writeText(msg);
    Swal.fire('คัดลอกรายการแล้ว', 'ระบบกำลังพาคุณไปที่แอป Line', 'success').then(() => {
        if(shopLinks.line) window.location.href = shopLinks.line;
    });
}

function goBack() {
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('categoriesView').classList.add('active');
}

window.onload = loadData;
</script>
</body>
</html>
