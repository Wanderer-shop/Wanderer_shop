<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer_Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #b026ff;      
  --secondary: #00d2ff;    
  --bg-main: #e0f7fa;      
  --bg-card: #ffffff;      /* พื้นหลังการ์ดสีขาว */
  --header-bg: #e9d5ff;    
  --border-color: rgba(176,38,255,0.2); 
  --text-muted: #64748b; 
  --text-dark: #1e293b;    
}
html { scroll-behavior: smooth; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

/* Shop Status Pill */
.shop-status { position: absolute; top: 15px; left: 15px; display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; background: #ffffff; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 100; transition: 0.3s; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulseG 1.5s infinite; }
.status-open { color: #10b981; } .status-open .status-dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
.status-closed { color: #ef4444; } .status-closed .status-dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
.status-pause { color: #f97316; } .status-pause .status-dot { background: #f97316; box-shadow: 0 0 8px #f97316; }
.status-slow { color: #eab308; } .status-slow .status-dot { background: #eab308; box-shadow: 0 0 8px #eab308; }
@keyframes pulseG { 0% { transform: scale(0.95); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

/* Hero & Tabs */
.hero { background: var(--header-bg); padding: 50px 20px 55px; text-align: center; position: relative; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; box-shadow: 0 4px 20px rgba(176,38,255,0.1); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
.hero-logo { width: 180px; height: 190px; object-fit: cover; border-radius: 20px; margin: 0 auto 15px; display: block; border: 3px solid #fff; box-shadow: 0 4px 15px rgba(176,38,255,0.2); background: #fff; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; cursor: pointer; user-select: none; }
.hero-sub { font-size: 14px; color: var(--text-dark); font-weight: 500; opacity: 0.9; }
.tab-container { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); display: flex; background: #ffffff; border: 1px solid var(--border-color); border-radius: 30px; padding: 4px; width: 95%; max-width: 500px; overflow-x: auto; white-space: nowrap; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); scroll-behavior: smooth;}
.tab-container::-webkit-scrollbar { display: none; }
.tab-btn { flex: 0 0 auto; padding: 8px 16px; border-radius: 25px; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; box-shadow: 0 2px 10px rgba(176,38,255,0.3); }

/* Content & Views */
.content { max-width: 600px; margin: 0 auto; padding: 0 20px 50px; position: relative; z-index: 5; }
.view-section { display: none; animation: fadeIn 0.3s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Info Card */
.info-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px dashed rgba(0,0,0,0.1); font-size: 14px; cursor: pointer; }
.info-row span:first-child { color: var(--primary); font-weight: 600; }
.info-row span:last-child { font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-dark); text-align: right; word-break: break-word; justify-content: flex-end;}
.copy-btn { background: #fff; border: 1px solid var(--primary); color: var(--primary); font-size: 10px; padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; flex-shrink: 0; }

/* Banner Card (อยู่ใต้ข้อมูลร้าน) */
.banner-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border-color); display: none; margin-bottom: 15px; }
.banner-media-holder { width: 100%; display: flex; justify-content: center; background: #000; }
.banner-media-holder iframe, .banner-media-holder img { width: 100%; max-height: 250px; object-fit: cover; border: none; }
.banner-text { padding: 15px; font-size: 13px; color: var(--text-dark); text-align: center; white-space: pre-wrap; background: #fff; }

/* Grid & Section Headers */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.sort-select { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border-color); background: #fff; color: var(--text-dark); font-family: inherit; font-size: 12px; outline: none; }
.grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }

/* Category Card (Premium/Game) 160x180px */
.cat-card { background: var(--bg-card); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 2px solid transparent; width: 160px; height: 180px; transition: 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center;}
.cat-card:active { transform: scale(0.96); }
.cat-icon { width: 55px; height: 55px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.05); background:#fff; }
.cat-name { font-size: 14px; font-weight: 700; color: var(--text-dark); width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* OS Card 190x200px */
.os-card { background: var(--bg-card); border: 2px solid transparent; border-radius: 16px; padding: 15px 12px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 190px; height: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
.os-card.selected { border-color: var(--primary); background: #fdf8ff; }
.check-circle { position: absolute; top: 8px; left: 8px; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; background: #fff; display: flex; justify-content: center; align-items: center; transition: 0.2s; z-index: 5; }
.os-card.selected .check-circle { background: var(--primary); border-color: var(--primary); }
.check-circle::after { content: '✓'; color: #fff; font-size: 12px; font-weight: bold; opacity: 0; transform: scale(0.5); transition: 0.2s; }
.os-card.selected .check-circle::after { opacity: 1; transform: scale(1); }
.os-btn-group { display: flex; gap: 4px; width: 100%; margin: 10px 0; }
.os-btn { flex: 1; font-size: 11px; padding: 6px 0; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; color: var(--text-muted); font-weight: 600; font-family: inherit; transition: 0.2s; }
.os-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Package View */
.pkg-header { text-align: center; margin-bottom: 20px; }
.pkg-header-name { font-size: 20px; font-weight: 700; color: var(--primary); }
.pkg-header-desc { font-size: 13px; color: var(--text-muted); white-space: pre-wrap; line-height: 1.5; margin-top: 5px; }
.pkg-group-title { font-size: 14px; font-weight: 700; color: var(--text-dark); margin: 15px 0 8px; display: flex; align-items: center; gap: 8px; }
.pkg-group-title::before { content: ''; width: 4px; height: 16px; background: var(--primary); border-radius: 4px; }
.pkg-item { background: #fff; border: 2px solid transparent; border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; transition: 0.2s; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
.pkg-item.selected { border-color: var(--primary); background: #fdf8ff; box-shadow: 0 0 10px rgba(176,38,255,0.15); }
.pkg-item.selected::before { content: '✓'; position: absolute; top: -8px; left: -8px; background: var(--primary); color: #fff; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 5; }
.pkg-info { flex: 1; text-align:left; }
.pkg-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
.pkg-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pkg-price { font-size: 16px; font-weight: 700; color: var(--primary); }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-top: 2px solid var(--primary); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: 0.3s; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: var(--primary); }
.bb-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; box-shadow: 0 4px 15px rgba(176,38,255,0.3); transition: 0.2s; }

/* Admin Floating Button & Modal */
.admin-fab { display: none; position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; border-radius: 50%; background: #d8b4fe; color: #ffffff; font-size: 32px; font-weight: 300; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(216, 180, 254, 0.6); cursor: pointer; z-index: 999; border: 2px solid #fff; transition: 0.2s; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box { background: #fff; border: 2px solid var(--primary); border-radius: 20px; width: 95%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 24px; transform: scale(0.9); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.modal-overlay.show .modal-box { transform: scale(1); }
.modal-btn { background: var(--primary); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; font-family: inherit; transition: 0.2s; }

.admin-section { display: none; } .admin-section.active { display: block; }
.admin-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
.admin-tab-btn { padding: 6px 12px; border-radius: 15px; border: 1px solid #ddd; background: #f8fafc; color: var(--text-muted); font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: 0.2s; }
.admin-tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.admin-input-group { margin-bottom: 12px; text-align: left; }
.admin-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-dark); }
.admin-input, .admin-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 13px; outline: none; background: #fff; color: var(--text-dark); }
textarea.admin-input { resize: vertical; min-height: 65px; line-height: 1.4; }

/* Admin Lists */
.adm-list-item { display:flex; justify-content:space-between; align-items:center; padding:12px; background:#fff; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:10px; }
.adm-list-info { font-size:12px; color: var(--text-dark); flex: 1; }
.adm-list-actions { display: flex; gap: 6px; flex-shrink: 0; }
.adm-list-actions button { padding:6px 10px; border:none; border-radius:6px; font-size:11px; font-weight: 600; cursor:pointer; color:#fff; font-family: inherit; }
.btn-edit { background: #eab308; } .btn-delete { background: #ef4444; }
.checkbox-group { display: flex; gap: 15px; align-items: center; font-size: 13px; color: var(--text-dark); background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
</style>
</head>
<body>

<div class="shop-status status-open" id="shopStatusPill">
  <span class="status-dot"></span> <span id="shopStatusText">OPEN</span>
</div>

<div class="hero">
  <img id="mainShopLogo" src="https://via.placeholder.com/180x190" class="hero-logo" alt="Shop Logo">
  <div class="hero-title" onclick="checkAdminLogin()">Wanderer_Shop</div>
  <div class="hero-sub">ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ</div>
  
  <div class="tab-container" id="mainTabs">
    </div>
</div>

<div class="content">
  <div id="view-info" class="view-section active">
    <div class="info-card">
      <div class="info-row" onclick="window.open('https://facebook.com', '_blank')">
        <span>ช่องทางติดต่อ</span> 
        <span id="infoFb">Wanderer Shop <button class="copy-btn" onclick="copyText(event, 'Wanderer Shop')">Copy</button></span>
      </div>
      <div class="info-row" onclick="window.open('https://line.me', '_blank')">
        <span>Line</span> 
        <span id="infoLine">@wanderer <button class="copy-btn" onclick="copyText(event, '@wanderer')">Copy</button></span>
      </div>
      <div class="info-row"><span>เวลาทำการ</span> <span id="infoTime">11:00 - 00:00 น.</span></div>
      <div class="info-row" style="flex-direction: column; align-items: flex-start; gap: 8px; border-bottom: none;">
        <span>การรับประกัน</span> 
        <span id="infoWarranty" style="text-align: left; width: 100%; white-space: pre-wrap; color: var(--text-muted); font-size: 13px; line-height: 1.5; justify-content: flex-start;">เคลมไว 24 ชม.</span>
      </div>
    </div>

    <div class="banner-card" id="infoBannerCard">
      <div class="banner-media-holder" id="infoBannerMedia"></div>
      <div class="banner-text" id="infoBannerText"></div>
    </div>
  </div>

  <div id="view-categories" class="view-section">
    <div class="section-header">
      <h3 style="font-size:16px; border-left:4px solid var(--primary); padding-left:8px;">รายการสินค้า</h3>
      <select class="sort-select" id="catSort" onchange="renderCategories()">
        <option value="name">เรียงตามชื่อ</option>
        <option value="price">เรียงตามราคาเริ่มต้น</option>
      </select>
    </div>
    <div class="grid-container" id="categoryGrid"></div>
  </div>

  <div id="view-packages" class="view-section">
    <button onclick="backToCategories()" style="background:none; border:none; color:var(--primary); font-weight:600; cursor:pointer; margin-bottom:15px; font-size:15px;">← กลับหน้ารายการ</button>
    <div class="pkg-header">
      <img id="pkgAppIcon" src="" style="width:60px; height:60px; border-radius:12px; margin-bottom:10px; object-fit:cover; border:1px solid #ddd; background:#fff;">
      <div class="pkg-header-name" id="pkgAppName">ชื่อแอป</div>
      <div class="pkg-header-desc" id="pkgAppDesc">รายละเอียดแอป</div>
    </div>
    <div id="packageListStandard"></div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div>
    <div style="font-size: 12px; color: var(--text-muted);" id="cartCount">เลือก 0 รายการ</div>
    <div class="bb-total"><span id="cartTotal">0</span><span style="font-size:16px;">฿</span></div>
  </div>
  <button class="bb-btn" onclick="checkout()">สั่งซื้อสินค้า ✨</button>
</div>

<div class="admin-fab" id="adminFab" onclick="openAdminModal()">+</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #ddd; padding-bottom:10px;">
      <h3 style="color:var(--primary); margin:0;">⚙️ จัดการร้านค้า</h3>
      <span onclick="document.getElementById('adminModal').classList.remove('show')" style="cursor:pointer; font-size:24px; color:#888;">×</span>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab-btn active" onclick="switchAdminTab('info')">ข้อมูลร้าน</button>
      <button class="admin-tab-btn" onclick="switchAdminTab('tabs')">จัดการแท็บ</button>
      <button class="admin-tab-btn" onclick="switchAdminTab('product')">สินค้า (เพิ่ม/แก้ไข)</button>
    </div>

    <div id="admin-info" class="admin-section active">
      <div class="admin-input-group"><label class="admin-label">สถานะร้าน:</label><select class="admin-select" id="admStatus" onchange="previewShopInfo()"><option value="open">เปิดร้าน (OPEN)</option><option value="closed">ปิดร้าน (CLOSED)</option><option value="pause">พักส่ง</option><option value="slow">ตอบช้า</option></select></div>
      <div class="admin-input-group"><label class="admin-label">ลิงก์โลโก้ร้าน:</label><input type="text" class="admin-input" id="admLogo" onchange="previewShopInfo()"></div>
      <div style="border: 1px dashed #cbd5e1; padding: 12px; border-radius: 12px; margin-bottom: 12px; background: #f8fafc;">
        <div class="admin-input-group" style="margin-bottom:8px;"><label class="admin-label">กรอบใส่รูป/วิดีโอใต้ร้าน (URL หรือ Iframe):</label><input type="text" class="admin-input" id="admBanner" placeholder="URL หรือ <iframe>" onchange="previewShopInfo()"></div>
        <div class="admin-input-group" style="margin-bottom:0;"><label class="admin-label">กล่องข้อความใต้การ์ดรูป/วิดีโอ (เว้นว่างได้):</label><textarea class="admin-input" id="admBannerText" placeholder="พิมพ์ข้อความโปรโมชั่น..." onchange="previewShopInfo()"></textarea></div>
      </div>
      <div class="admin-input-group"><label class="admin-label">ช่องทางติดต่อ (ชื่อเพจ/เฟสบุ๊ค/Twitter):</label><input type="text" class="admin-input" id="admFb" onchange="previewShopInfo()"></div>
      <div class="admin-input-group"><label class="admin-label">ไอดี Line (ใส่ @ ด้วย):</label><input type="text" class="admin-input" id="admLine" onchange="previewShopInfo()"></div>
      <div class="admin-input-group"><label class="admin-label">เวลาทำการ:</label><input type="text" class="admin-input" id="admTime" onchange="previewShopInfo()"></div>
      <div class="admin-input-group"><label class="admin-label">การรับประกัน:</label><textarea class="admin-input" id="admWarranty" onchange="previewShopInfo()"></textarea></div>
      <button class="modal-btn" onclick="saveShopInfo()">💾 บันทึกข้อมูลและเซฟลงชีต</button>
    </div>

    <div id="admin-tabs" class="admin-section">
      <div style="background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px;">
        <div class="admin-input-group"><label class="admin-label">ชื่อแท็บใหม่:</label><input type="text" id="admNewTabName" class="admin-input" placeholder="เช่น บริการเพิ่มผู้ติดตาม"></div>
        <div class="admin-input-group">
          <label class="admin-label">รูปแบบการแสดงผล:</label>
          <select id="admNewTabType" class="admin-select">
            <option value="standard">แบบปกติ (มีหน้าให้เลือกแพ็กเกจย่อย)</option>
            <option value="os">แบบแอป (เลือกระบบ OS ในหน้าแรกเลย)</option>
          </select>
        </div>
        <button class="modal-btn" onclick="addNewTab()">➕ สร้างแท็บใหม่</button>
      </div>
      <h4 style="font-size:14px; margin-bottom:10px; color:var(--text-dark);">📋 แท็บทั้งหมดที่มี</h4>
      <div id="adminTabListArea"></div>
    </div>

    <div id="admin-product" class="admin-section">
      <div style="background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px;">
        <div class="admin-input-group"><label class="admin-label">เลือกแท็บ (หมวดหมู่):</label><select class="admin-select" id="admTabProd" onchange="toggleAdmProdFields()"></select></div>
        <div class="admin-input-group"><label class="admin-label">ชื่อแอป / หมวดหมู่:</label><input type="text" id="admAppName" class="admin-input"></div>
        <div class="admin-input-group" id="f-appDesc"><label class="admin-label">รายละเอียดใต้ชื่อแอป:</label><textarea id="admAppDesc" class="admin-input"></textarea></div>

        <div id="adm-fields-standard">
          <div class="admin-input-group"><label class="admin-label">ตัวเลือกแพ็กเกจ:</label><input type="text" id="admPkgOpt" class="admin-input" placeholder="เช่น จอส่วนตัว"></div>
          <div class="admin-input-group"><label class="admin-label">ชื่อแพ็กเกจย่อย:</label><input type="text" id="admSubPkg" class="admin-input" placeholder="เช่น 30 วัน"></div>
          <div class="admin-input-group"><label class="admin-label">รายละเอียดย่อย:</label><input type="text" id="admSubDesc" class="admin-input"></div>
        </div>

        <div id="adm-fields-os" style="display:none;">
          <div class="admin-input-group">
            <label class="admin-label">ระบบ IOS-ANDROID (ติ๊กเลือกได้ทั้งคู่ หรืออันใดอันหนึ่ง):</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="admOS_ios" value="iOS"> 🍎 iOS</label>
              <label><input type="checkbox" id="admOS_android" value="Android"> 🤖 Android</label>
            </div>
          </div>
        </div>

        <div class="admin-input-group"><label class="admin-label">ราคา (บาท):</label><input type="number" id="admPrice" class="admin-input" placeholder="0"></div>
        <div class="admin-input-group"><label class="admin-label">ลิงก์รูปภาพแอป:</label><input type="text" id="admIcon" class="admin-input"></div>

        <button class="modal-btn" id="btnSubmitProduct" onclick="saveProduct()">➕ บันทึกข้อมูลสินค้า</button>
      </div>

      <div style="border-top:2px dashed #ddd; padding-top:15px;">
        <h4 style="font-size:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">📋 รายการสินค้า <button style="font-size:11px; padding:4px 8px; border-radius:6px; border:1px solid var(--primary); color:var(--primary); background:#fff; cursor:pointer;" onclick="clearProductForm()">+ เพิ่มใหม่</button></h4>
        <div id="adminProductList" style="max-height: 400px; overflow-y: auto;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // API URL ใหม่ล่าสุดที่ให้มา
  let GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycby6cEk5IyfFnSwTKmI3DjXJGu7O46vU-6gV0VRs8X1wamiO3lh9EnpuSbYVNbMKWOqqjw/exec";
  
  let currentMainTab = 'info';
  let selectedAppCategory = null;
  let cart = [];
  
  let shopInfo = {};
  let customTabs = [
    { id: 'premium', name: '📱 แอพพรีเมี่ยม', type: 'standard' },
    { id: 'game', name: '🎮 เติมเกม', type: 'standard' },
    { id: 'os', name: '🍎/🤖 แอพ/เกม IOS-ANDROID', type: 'os' }
  ];
  let products = [];
  
  let isAdminAuthed = false;
  let editingProductId = null;

  // --- 1. ระบบดึงและบันทึกข้อมูล ---
  async function fetchGoogleSheetsData() {
    try {
      let res = await fetch(`${GOOGLE_SHEET_API_URL}?t=${Date.now()}`);
      let data = await res.json();
      if(data.products) products = data.products;
      if(data.customTabs && data.customTabs.length > 0) customTabs = data.customTabs;
      if(data.shopInfo && Object.keys(data.shopInfo).length > 0) shopInfo = data.shopInfo;
      
      applyShopInfoData();
    } catch(err) { console.log("โหลดข้อมูลชีตไม่สำเร็จ จะใช้ค่าเริ่มต้นแทน"); }
    renderAllTabs();
  }
  fetchGoogleSheetsData();

  async function syncDataToSheet() {
    try {
      await fetch(GOOGLE_SHEET_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'sync_data', 
          shopInfo: shopInfo,
          customTabs: customTabs,
          products: products
        })
      });
      console.log('✅ เซฟข้อมูลลง Sheet สำเร็จ!');
    } catch(err) {
      console.error('❌ เซฟข้อมูลล้มเหลว:', err);
    }
  }

  // --- 2. ระบบจัดการหน้าและแท็บ ---
  function renderAllTabs() {
    const mainTabs = document.getElementById('mainTabs');
    mainTabs.innerHTML = `<button class="tab-btn ${currentMainTab === 'info' ? 'active' : ''}" onclick="switchMainTab('info')">ข้อมูลร้าน</button>`;
    customTabs.forEach(t => {
      mainTabs.innerHTML += `<button class="tab-btn ${currentMainTab === t.id ? 'active' : ''}" onclick="switchMainTab('${t.id}')">${t.name}</button>`;
    });

    const admSel = document.getElementById('admTabProd');
    admSel.innerHTML = '';
    customTabs.forEach(t => { admSel.innerHTML += `<option value="${t.id}" data-type="${t.type}">${t.name}</option>`; });

    const admTabList = document.getElementById('adminTabListArea');
    admTabList.innerHTML = '';
    customTabs.forEach(t => {
      admTabList.innerHTML += `
        <div class="adm-list-item">
          <div class="adm-list-info">
            <strong style="color:var(--primary);">${t.name}</strong> <br>
            <span style="color:#888;">ชนิด: ${t.type === 'os' ? 'แบบ OS เลือกระบบ' : 'แบบปกติ (มีหน้าแพ็กเกจ)'}</span>
          </div>
          <div class="adm-list-actions"><button class="btn-delete" onclick="deleteTab('${t.id}')">ลบ</button></div>
        </div>
      `;
    });

    if(currentMainTab !== 'info') renderCategories();
    renderAdminProductList();
  }

  function switchMainTab(tabId) {
    currentMainTab = tabId;
    renderAllTabs(); 
    
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    if(tabId === 'info') {
      document.getElementById('view-info').classList.add('active');
    } else {
      document.getElementById('view-categories').classList.add('active');
      renderCategories();
    }
  }

  // --- 3. ระบบแสดงสินค้าลูกค้า ---
  function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    let tabProducts = products.filter(p => p.tab === currentMainTab);
    const currentTabObj = customTabs.find(t => t.id === currentMainTab);
    if(!currentTabObj) return;

    if (currentTabObj.type === 'os') {
      let uniqueApps = {};
      tabProducts.forEach(p => {
        if (!uniqueApps[p.appCategory]) uniqueApps[p.appCategory] = [];
        uniqueApps[p.appCategory].push(p);
      });

      for (let appName in uniqueApps) {
        let variants = uniqueApps[appName];
        let iosPkg = variants.find(p => p.os === 'iOS');
        let andPkg = variants.find(p => p.os === 'Android');
        let basePkg = variants[0];

        const isIosSel = iosPkg && cart.find(c => c.id === iosPkg.id);
        const isAndSel = andPkg && cart.find(c => c.id === andPkg.id);
        
        let priceText = '';
        if(iosPkg && andPkg && iosPkg.price !== andPkg.price) {
            priceText = `เริ่มต้น ${Math.min(iosPkg.price, andPkg.price)}฿`;
        } else {
            priceText = `${basePkg.price}฿`;
        }

        grid.innerHTML += `
          <div class="os-card ${isIosSel || isAndSel ? 'selected' : ''}">
            <div class="check-circle"></div>
            <img src="${basePkg.icon}" style="width:65px; height:65px; border-radius:12px; margin-bottom:12px; background:#fff; object-fit:cover;">
            <div style="font-size:15px; font-weight:700; width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-dark);">${appName}</div>
            <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">เลือกระบบ</div>
            <div class="os-btn-group">
              ${iosPkg ? `<button class="os-btn ${isIosSel ? 'active' : ''}" onclick="toggleOSCard(event, '${iosPkg.id}')">iOS</button>` : ''}
              ${andPkg ? `<button class="os-btn ${isAndSel ? 'active' : ''}" onclick="toggleOSCard(event, '${andPkg.id}')">Android</button>` : ''}
            </div>
            <div style="color:var(--primary); font-weight:700; font-size:16px; margin-top:auto;">${priceText}</div>
          </div>
        `;
      }
    } else {
      let uniqueMap = {};
      tabProducts.forEach(p => {
        if(!uniqueMap[p.appCategory]) uniqueMap[p.appCategory] = { ...p, minPrice: p.price };
        else if (p.price < uniqueMap[p.appCategory].minPrice) uniqueMap[p.appCategory].minPrice = p.price;
      });
      let uniqueArr = Object.values(uniqueMap);
      
      const sortMode = document.getElementById('catSort').value;
      if(sortMode === 'price') uniqueArr.sort((a, b) => a.minPrice - b.minPrice);
      else uniqueArr.sort((a, b) => a.appCategory.localeCompare(b.appCategory));

      uniqueArr.forEach(app => {
        grid.innerHTML += `
          <div class="cat-card" onclick="openApp('${app.appCategory}')">
            <img src="${app.icon}" class="cat-icon">
            <div class="cat-name">${app.appCategory}</div>
            <div class="cat-desc">${app.appDetails || ''}</div>
          </div>
        `;
      });
    }
  }

  function toggleOSCard(e, productId) {
    e.stopPropagation();
    const index = cart.findIndex(c => c.id === productId);
    if(index > -1) { cart.splice(index, 1); } 
    else { cart.push(products.find(p => p.id === productId)); }
    updateBottomBar(); renderCategories();
  }

  function openApp(appName) {
    selectedAppCategory = appName;
    document.getElementById('view-categories').classList.remove('active');
    document.getElementById('view-packages').classList.add('active');
    const appData = products.find(p => p.appCategory === appName);
    document.getElementById('pkgAppName').innerText = appName;
    document.getElementById('pkgAppDesc').innerText = appData.appDetails || '';
    document.getElementById('pkgAppIcon').src = appData.icon;
    renderPackages();
  }

  function backToCategories() {
    document.getElementById('view-packages').classList.remove('active');
    document.getElementById('view-categories').classList.add('active');
  }

  function renderPackages() {
    const listStandard = document.getElementById('packageListStandard');
    listStandard.innerHTML = '';
    let appProducts = products.filter(p => p.appCategory === selectedAppCategory && p.tab === currentMainTab);

    const grouped = {};
    appProducts.forEach(p => {
      if(!grouped[p.packageOption]) grouped[p.packageOption] = [];
      grouped[p.packageOption].push(p);
    });

    for (let group in grouped) {
      listStandard.innerHTML += `<div class="pkg-group-title">${group}</div>`;
      grouped[group].forEach(p => {
        const isSelected = cart.find(c => c.id === p.id) ? 'selected' : '';
        listStandard.innerHTML += `
          <div class="pkg-item ${isSelected}" onclick="toggleCart('${p.id}')" id="pkg-${p.id}">
            <div class="pkg-info">
              <div class="pkg-name">${p.subPackage}</div>
              <div class="pkg-sub">${p.subDetails || ''}</div>
            </div>
            <div class="pkg-price">${p.price}฿</div>
          </div>
        `;
      });
    }
  }

  function toggleCart(id) {
    const index = cart.findIndex(c => c.id === id);
    if(index > -1) { cart.splice(index, 1); document.getElementById(`pkg-${id}`).classList.remove('selected'); } 
    else { cart.push(products.find(p => p.id === id)); document.getElementById(`pkg-${id}`).classList.add('selected'); }
    updateBottomBar();
  }

  function updateBottomBar() {
    const bar = document.getElementById('bottomBar');
    if(cart.length > 0) {
      bar.classList.add('active');
      document.getElementById('cartCount').innerText = `เลือก ${cart.length} รายการ`;
      document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.price, 0);
    } else { bar.classList.remove('active'); }
  }

  function checkout() {
    let text = "🛒 สรุปรายการสั่งซื้อ\n\n";
    cart.forEach(item => {
      text += `สินค้า: ${item.appCategory}\n`;
      text += item.os ? `ระบบ: ${item.os}\n` : `แพ็กเกจ: ${item.packageOption} - ${item.subPackage}\n`;
      text += `ราคา: ${item.price} บาท\n\n`;
    });
    text += `--------------------\nยอดชำระทั้งหมด: ${document.getElementById('cartTotal').innerText} บาท\n`;
    copyText(null, text);
    window.location.href = "https://line.me"; 
  }

  function copyText(e, text) {
    if(e) e.stopPropagation();
    const temp = document.createElement("textarea"); temp.value = text;
    document.body.appendChild(temp); temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
    if(e) alert('คัดลอกลงในคลิปบอร์ดแล้ว');
  }

  // --- 4. ระบบแอดมิน ---
  let adminClickCount = 0, adminTimer;
  function checkAdminLogin() {
    adminClickCount++; clearTimeout(adminTimer); adminTimer = setTimeout(() => { adminClickCount = 0; }, 2000); 
    if (adminClickCount >= 5) {
      if (!isAdminAuthed && prompt("🔒 รหัสแอดมิน (170647):") === "170647") { isAdminAuthed = true; }
      if (isAdminAuthed) { document.getElementById('adminFab').style.display = 'flex'; openAdminModal(); }
      adminClickCount = 0;
    }
  }

  function openAdminModal() { document.getElementById('adminModal').classList.add('show'); toggleAdmProdFields(); }
  function switchAdminTab(tab) {
    document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.getElementById(`admin-${tab}`).classList.add('active');
  }

  function addNewTab() {
    const name = document.getElementById('admNewTabName').value.trim();
    const type = document.getElementById('admNewTabType').value;
    if(!name) return alert('กรุณากรอกชื่อแท็บ');
    customTabs.push({ id: 't_' + Date.now(), name: name, type: type });
    document.getElementById('admNewTabName').value = '';
    renderAllTabs(); syncDataToSheet(); alert('เพิ่มแท็บเรียบร้อย');
  }

  function deleteTab(id) {
    if(!confirm('🚨 สินค้าในหมวดหมู่นี้จะหายไปทั้งหมด แน่ใจหรือไม่?')) return;
    customTabs = customTabs.filter(t => t.id !== id);
    products = products.filter(p => p.tab !== id);
    renderAllTabs(); syncDataToSheet();
  }

  function toggleAdmProdFields() {
    const sel = document.getElementById('admTabProd');
    if(!sel.options[sel.selectedIndex]) return;
    const type = sel.options[sel.selectedIndex].dataset.type;
    
    document.getElementById('adm-fields-standard').style.display = type === 'standard' ? 'block' : 'none';
    document.getElementById('f-appDesc').style.display = type === 'standard' ? 'block' : 'none';
    document.getElementById('adm-fields-os').style.display = type === 'os' ? 'block' : 'none';
  }

  function saveShopInfo() {
    shopInfo = {
      status: document.getElementById('admStatus').value,
      logo: document.getElementById('admLogo').value,
      banner: document.getElementById('admBanner').value,
      bannerText: document.getElementById('admBannerText').value,
      fb: document.getElementById('admFb').value,
      line: document.getElementById('admLine').value,
      time: document.getElementById('admTime').value,
      warranty: document.getElementById('admWarranty').value
    };
    applyShopInfoData(); syncDataToSheet(); alert('บันทึกข้อมูลร้านเรียบร้อย');
  }

  function applyShopInfoData() {
    if(!shopInfo.status) return; 
    document.getElementById('admStatus').value = shopInfo.status || 'open';
    document.getElementById('admLogo').value = shopInfo.logo || '';
    document.getElementById('admBanner').value = shopInfo.banner || '';
    document.getElementById('admBannerText').value = shopInfo.bannerText || '';
    document.getElementById('admFb').value = shopInfo.fb || '';
    document.getElementById('admLine').value = shopInfo.line || '';
    document.getElementById('admTime').value = shopInfo.time || '';
    document.getElementById('admWarranty').value = shopInfo.warranty || '';
    previewShopInfo();
  }

  function previewShopInfo() {
    const statusMap = { open: ['status-open', 'OPEN'], closed: ['status-closed', 'CLOSED'], pause: ['status-pause', 'พักส่ง'], slow: ['status-slow', 'ตอบช้า'] };
    const st = document.getElementById('admStatus').value || 'open';
    document.getElementById('shopStatusPill').className = `shop-status ${statusMap[st][0]}`;
    document.getElementById('shopStatusText').innerText = statusMap[st][1];

    document.getElementById('mainShopLogo').src = document.getElementById('admLogo').value || 'https://via.placeholder.com/180x190';
    if(document.getElementById('admFb').value) document.getElementById('infoFb').innerHTML = `${document.getElementById('admFb').value} <button class="copy-btn" onclick="copyText(event, '${document.getElementById('admFb').value}')">Copy</button>`;
    if(document.getElementById('admLine').value) document.getElementById('infoLine').innerHTML = `${document.getElementById('admLine').value} <button class="copy-btn" onclick="copyText(event, '${document.getElementById('admLine').value}')">Copy</button>`;
    document.getElementById('infoTime').innerText = document.getElementById('admTime').value || '-';
    document.getElementById('infoWarranty').innerText = document.getElementById('admWarranty').value || '-';

    const bUrl = document.getElementById('admBanner').value;
    const bText = document.getElementById('admBannerText').value;
    const bCard = document.getElementById('infoBannerCard');
    if(bUrl || bText) {
      bCard.style.display = 'block';
      document.getElementById('infoBannerMedia').innerHTML = bUrl.includes('<iframe') ? bUrl : (bUrl ? `<img src="${bUrl}">` : '');
      document.getElementById('infoBannerText').style.display = bText ? 'block' : 'none';
      document.getElementById('infoBannerText').innerText = bText;
    } else { bCard.style.display = 'none'; }
  }

  function saveProduct() {
    const sel = document.getElementById('admTabProd');
    const tab = sel.value;
    const type = sel.options[sel.selectedIndex].dataset.type;
    const name = document.getElementById('admAppName').value.trim();
    if(!name) return alert('กรุณากรอกชื่อ');

    const baseObj = {
      tab: tab, appCategory: name,
      price: Number(document.getElementById('admPrice').value) || 0,
      icon: document.getElementById('admIcon').value || 'https://via.placeholder.com/60'
    };

    if(type === 'os') {
      const isIos = document.getElementById('admOS_ios').checked;
      const isAnd = document.getElementById('admOS_android').checked;
      if(!isIos && !isAnd) return alert('กรุณาติ๊กระบบ iOS หรือ Android อย่างน้อย 1 อัน');

      if(editingProductId) { products = products.filter(p => p.id !== editingProductId); }

      if(isIos) products.push({...baseObj, id: 'p_'+Date.now()+'_ios', os: 'iOS'});
      if(isAnd) products.push({...baseObj, id: 'p_'+Date.now()+'_and', os: 'Android'});
    } else {
      const obj = { ...baseObj, 
        id: editingProductId || 'p_'+Date.now(),
        appDetails: document.getElementById('admAppDesc').value,
        packageOption: document.getElementById('admPkgOpt').value,
        subPackage: document.getElementById('admSubPkg').value,
        subDetails: document.getElementById('admSubDesc').value
      };
      if (editingProductId) { const idx = products.findIndex(p => p.id === editingProductId); products[idx] = obj; } 
      else { products.push(obj); }
    }

    syncDataToSheet(); // ส่งข้อมูลไปเซฟที่ชีต
    clearProductForm(); renderAdminProductList(); renderCategories();
    if (document.getElementById('view-packages').classList.contains('active') && selectedAppCategory === name) renderPackages();
    alert('✅ บันทึกสินค้าและอัปเดตลง Sheet เรียบร้อย!');
  }

  function editProduct(id) {
    const p = products.find(x => x.id === id); if(!p) return;
    editingProductId = p.id;
    document.getElementById('admTabProd').value = p.tab; toggleAdmProdFields();
    
    document.getElementById('admAppName').value = p.appCategory;
    document.getElementById('admPrice').value = p.price;
    document.getElementById('admIcon').value = p.icon;

    if(p.os) {
      document.getElementById('admOS_ios').checked = (p.os === 'iOS');
      document.getElementById('admOS_android').checked = (p.os === 'Android');
    } else {
      document.getElementById('admAppDesc').value = p.appDetails;
      document.getElementById('admPkgOpt').value = p.packageOption;
      document.getElementById('admSubPkg').value = p.subPackage;
      document.getElementById('admSubDesc').value = p.subDetails;
    }
    document.getElementById('btnSubmitProduct').innerHTML = '💾 อัปเดตสินค้า';
    document.querySelector('.modal-box').scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteProduct(id) {
    if(confirm('ลบสินค้านี้?')) {
      products = products.filter(p => p.id !== id);
      cart = cart.filter(c => c.id !== id);
      syncDataToSheet(); // ส่งข้อมูลไปเซฟที่ชีต
      updateBottomBar(); renderAdminProductList(); renderCategories();
    }
  }

  function clearProductForm() {
    editingProductId = null;
    document.getElementById('btnSubmitProduct').innerHTML = '➕ บันทึกข้อมูลสินค้า';
    document.querySelectorAll('#admin-product .admin-input').forEach(i => i.value = '');
    document.getElementById('admOS_ios').checked = false;
    document.getElementById('admOS_android').checked = false;
  }

  function renderAdminProductList() {
    const list = document.getElementById('adminProductList'); list.innerHTML = '';
    customTabs.forEach(tab => {
      const gProd = products.filter(p => p.tab === tab.id);
      let html = `<div style="background:#f8fafc; border:1px solid #e2e8f0; padding:10px; border-radius:10px; margin-bottom:10px;"><div style="font-size:13px; font-weight:700; color:var(--primary); margin-bottom:8px;">${tab.name}</div>`;
      if(gProd.length === 0) html += `<div style="font-size:12px;color:#888;">ไม่มีสินค้า</div>`;
      gProd.forEach(p => {
        let det = p.os ? `ระบบ: ${p.os}` : `${p.packageOption} - ${p.subPackage}`;
        html += `<div class="adm-list-item"><div class="adm-list-info"><b>${p.appCategory}</b><br><span style="color:#888">${det} | ฿${p.price}</span></div><div class="adm-list-actions"><button class="btn-edit" onclick="editProduct('${p.id}')">แก้ไข</button><button class="btn-delete" onclick="deleteProduct('${p.id}')">ลบ</button></div></div>`;
      });
      list.innerHTML += html + `</div>`;
    });
  }
</script>
</body>
</html>
