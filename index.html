<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* --- Design System (อ้างอิงจากโครงเดิม) --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f39c12; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

/* Background Glow */
.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.08) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }

/* Hero Section */
.hero { max-width: 1200px; margin: 0 auto 40px auto; background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; overflow: hidden; }
#heroMedia { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.3; }
.hero > div:not(#heroMedia) { position: relative; z-index: 2; }

/* Logo & Title */
.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; user-select: none; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

/* Tab Container */
.tab-container { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; align-items: center; background: var(--bg-card); border-radius: 30px; padding: 6px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: max-content; max-width: 95%; overflow-x: auto; scrollbar-width: none; z-index: 10; white-space: nowrap; }
.tab-container::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; box-shadow: 0 2px 10px var(--glow); }

/* Category Cards (เงื่อนไข 2.1) */
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; justify-content: center; margin-top: 15px; }
.category-card { background: white; border-radius: 18px; padding: 20px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.2s; position: relative; border: 2.5px solid transparent; }
.category-card.selected { border-color: var(--primary); background: #fdf8ff; }

/* วงกลมม่วง+ติ๊กถูกขาว (เงื่อนไข 2.1) */
.check-badge { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; background: var(--primary); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; z-index: 10; border: 2px solid white; }
.category-card.selected .check-badge { display: flex; }

.cat-icon-wrapper { width: 70px; height: 70px; margin: 0 auto 10px; border-radius: 15px; overflow: hidden; background: #f3f4f6; display: flex; align-items: center; justify-content: center; }
.cat-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

/* OS Selector Buttons (เงื่อนไข 2.2) */
.os-selector { display: flex; gap: 5px; margin-top: 12px; justify-content: center; }
.os-btn { padding: 6px 4px; font-size: 10px; border: 1.5px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-weight: 800; flex: 1; color: #666; transition: 0.2s; }
.os-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.bottom-bar { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 1200px; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translate(-50%, 100%); transition: 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translate(-50%, 0); }

.floating-admin-btn { display: none; position: fixed; bottom: 85px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: #A0C4FF; color: white; font-size: 32px; border: none; box-shadow: 0 4px 15px rgba(160,196,255,0.6); z-index: 1500; align-items: center; justify-content: center; cursor: pointer; }
</style>
</head>
<body>
<div class="bg-glow-1"></div><div class="bg-glow-2"></div>

<div class="hero">
  <div id="heroMedia"></div> 
  <div class="logo"><img id="shopLogoImg" src="https://via.placeholder.com/150"></div>
  <div class="hero-title" onclick="handleAdminTap()">Wanderer Shop</div>
  <div class="hero-sub">ยินดีต้อนรับสู่ร้าน <span id="shopTitleText">Wanderer Shop</span> รับสินค้าอะไรดีคะ</div>
  <div class="tab-container" id="tabBar"></div>
</div>

<div class="content">
  <div id="tab-info" class="tab-content">
      </div>

  <div id="tab-products" class="tab-content active">
    <div id="categoriesView">
      <h3 style="border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px;">รายการสินค้า</h3>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
    
    <div id="productsView" style="display:none; max-width:800px; margin:0 auto;">
      <button onclick="showCategories()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:600; font-size:16px; margin-bottom:15px;">← กลับหน้าหมวดหมู่</button>
      <h2 id="currentCategoryTitle" style="margin-bottom: 20px;">-</h2>
      <div id="productGrid"></div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div>ยอดรวม: ฿<span id="cartTotal" style="color:var(--primary); font-weight:bold; font-size:18px;">0</span></div>
  <button onclick="confirmCheckout()" style="padding:10px 25px; border-radius:25px; border:none; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; font-weight:700; cursor:pointer;">สั่งซื้อเลย</button>
</div>

<button id="floatingAdminBtn" class="floating-admin-btn" onclick="openAdminModal()">+</button>

<script>
let products = JSON.parse(localStorage.getItem('wandererProducts')) || [];
let tabs = JSON.parse(localStorage.getItem('wandererTabs')) || ["แอพพรีเมี่ยม", "แอพ/เกม IOS-ANDROID"];
let currentTab = tabs[0];
let cart = [];

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    // กรองสินค้าตามแท็บที่เลือกเท่านั้น (แก้ปัญหาข้อมูลทะลุแท็บ)
    const filtered = products.filter(p => p.tab === currentTab);
    
    const grouped = filtered.reduce((acc, p) => {
        if (!acc[p.cat]) acc[p.cat] = { ...p };
        return acc;
    }, {});

    let html = '';
    for (let catName in grouped) {
        let p = grouped[catName];
        let isIOSAnd = currentTab.includes("IOS-ANDROID");
        
        if (isIOSAnd) {
            let iosItem = cart.find(c => c.cat === catName && c.os === 'iOS');
            let andItem = cart.find(c => c.cat === catName && c.os === 'Android');
            let isSelected = iosItem || andItem;

            html += `
            <div class="category-card ${isSelected ? 'selected' : ''}">
                <div class="check-badge">✓</div>
                <div class="cat-icon-wrapper"><img src="${p.iconUrl || ''}"></div>
                <div style="font-size:13px; font-weight:bold;">${catName}</div>
                <div class="os-selector">
                    <button class="os-btn ${iosItem?'active':''}" onclick="toggleOS('${catName}', 'iOS')">iOS</button>
                    <button class="os-btn ${andItem?'active':''}" onclick="toggleOS('${catName}', 'Android')">ANDROID</button>
                </div>
            </div>`;
        } else {
            html += `
            <div class="category-card" onclick="openCategory('${catName}')">
                <div class="cat-icon-wrapper"><img src="${p.iconUrl || ''}"></div>
                <div style="font-size:13px; font-weight:bold;">${catName}</div>
            </div>`;
        }
    }
    grid.innerHTML = html || `<div style="grid-column:1/-1; color:gray;">ไม่มีสินค้าในแท็บนี้</div>`;
}

function toggleOS(catName, os) {
    const item = products.find(p => p.cat === catName && p.tab === currentTab);
    const idx = cart.findIndex(c => c.cat === catName && c.os === os);
    if (idx > -1) { cart.splice(idx, 1); } 
    else { cart.push({ ...item, os: os, id: catName + os }); }
    updateCartUI();
    renderCategories();
}

function confirmCheckout() {
    let total = cart.reduce((sum, item) => sum + Number(item.price), 0);
    let itemsList = cart.map(c => `🍃 ݂  ${c.cat} ${c.os ? `[${c.os}]` : ''} 𓈒`).join('\n');
    let finalText = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*
---------------------------
✿  𓈒  รวมยอด    ꒰  ${total}฿  ꒱   ݂🎐♡
${itemsList}
---------------------------
รบกวนแม่ค้าสรุปยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ 🙏`;
    navigator.clipboard.writeText(finalText).then(() => {
        alert("คัดลอกรายการสั่งซื้อเรียบร้อย!");
        window.open('https://line.me/ti/p/~@997pfoig', '_blank');
    });
}

function updateCartUI() {
    const bar = document.getElementById('bottomBar');
    if (cart.length > 0) {
        bar.classList.add('active');
        document.getElementById('cartTotal').textContent = cart.reduce((s, c) => s + Number(c.price), 0);
    } else { bar.classList.remove('active'); }
}

function switchMainTab(target, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = target;
    renderCategories();
}

window.onload = () => {
    // โหลดข้อมูล Tab และ Render เริ่มต้น
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = tabs.map(t => `<button class="tab-btn ${t===currentTab?'active':''}" onclick="switchMainTab('${t}', this)">${t}</button>`).join('');
    renderCategories();
};
</script>
</body>
</html>
