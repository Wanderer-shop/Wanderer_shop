<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- Design System (คงเดิมจากไฟล์เก่า) --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f39c12; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.08) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }

.hero { max-width: 1200px; margin: 0 auto 40px auto; background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; user-select: none; }

.tab-container { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border-radius: 30px; padding: 5px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-width: 280px; max-width: 90%; }
.tab-btn { flex: 1; padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

.content { max-width: 800px; margin: 0 auto; padding: 0 20px; }
.product-item { background: white; border-radius: 15px; padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 2px solid transparent; }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

/* Admin UI */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
.modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
.admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
.admin-tab-switcher { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; }
.a-tab-sm { padding: 6px 15px; border-radius: 20px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; font-size: 12px; white-space: nowrap; }
.a-tab-sm.active { background: var(--primary); color: white; border-color: var(--primary); }

.bottom-bar { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 1200px; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translate(-50%, 100%); transition: 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translate(-50%, 0); }
</style>
</head>
<body>
<div class="bg-glow-1"></div><div class="bg-glow-2"></div>

<div class="hero">
  <div class="logo"><img id="shopLogoImg" src="https://via.placeholder.com/150"></div>
  <h1 class="hero-title" onclick="handleAdminTap()">Wanderer Shop</h1>
  <div class="tab-container" id="tabBar"></div>
</div>

<div class="content">
  <div id="categoriesView">
    <div id="categoryGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px;"></div>
  </div>
  <div id="productsView" style="display:none; margin-top: 20px;">
    <button onclick="showCategories()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; margin-bottom:15px;">← กลับ</button>
    <h2 id="currentCategoryTitle"></h2>
    <div id="productGrid" style="margin-top:15px;"></div>
  </div>
</div>

<div id="passwordModal" class="modal-overlay">
  <div class="modal-content" style="max-width:300px; text-align:center;">
    <h3>ใส่รหัสผ่านแอดมิน</h3><br>
    <input type="password" id="adminPasswordInput" class="admin-input" placeholder="รหัสผ่าน...">
    <button onclick="verifyAdmin()" style="width:100%; padding:10px; border-radius:8px; border:none; background:var(--primary); color:white;">ยืนยัน</button>
  </div>
</div>

<div id="adminModal" class="modal-overlay">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3>จัดการหลังบ้าน</h3>
        <button onclick="closeAdminModal()" style="border:none; background:none; font-size:20px;">&times;</button>
    </div>
    <form id="adminForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="editId">
        <select id="pTabTarget" class="admin-input"></select>
        <input type="text" id="pCat" class="admin-input" placeholder="หมวดหมู่ (เช่น Netflix)" required>
        <input type="text" id="pName" class="admin-input" placeholder="ชื่อแพ็กเกจหลัก" required>
        <input type="text" id="pPackDesc" class="admin-input" placeholder="ชื่อแพ็กเกจย่อย (ถ้ามี)">
        
        <select id="pStatus" class="admin-input">
            <option value="ready">🟢 พร้อมส่ง</option>
            <option value="empty">🔴 ไม่พร้อม</option>
            <option value="waiting">🟠 รอแก้ราคา</option>
        </select>
        
        <input type="number" id="pPrice" class="admin-input" placeholder="ราคา" required>
        <input type="text" id="pIconUrl" class="admin-input" placeholder="ลิงก์รูปไอคอน">
        <button type="submit" style="width:100%; padding:12px; border-radius:8px; border:none; background:var(--primary); color:white; font-weight:bold;">บันทึก</button>
    </form>

    <div style="margin-top:25px; border-top:1px solid #eee; padding-top:15px;">
        <h4>รายการแยกตามแท็บ</h4>
        <div id="adminTabSwitcher" class="admin-tab-switcher"></div>
        <div id="adminProductList"></div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
    <div style="font-size:14px;">เลือก <span id="cartCount">0</span> รายการ</div>
    <div style="font-size:18px; font-weight:bold;">฿<span id="cartTotal">0</span></div>
    <button onclick="confirmCheckout()" style="padding:10px 20px; border-radius:10px; border:none; background:var(--primary); color:white; font-weight:bold;">สั่งซื้อ</button>
</div>

<script>
// --- Data Structure (คงเดิมจากไฟล์คุณ) ---
let tabs = JSON.parse(localStorage.getItem('wandererTabs')) || ["สินค้า", "เติมเกม"];
let products = JSON.parse(localStorage.getItem('wandererProducts')) || [];
let shopInfo = JSON.parse(localStorage.getItem('wandererShopInfo')) || { line: '@997pfoig' };
let currentTab = tabs[0];
let adminActiveTab = tabs[0];
let adminTapCount = 0;
let cart = [];

window.onload = () => { renderAll(); };

function renderAll() {
    renderTabs();
    renderCategories();
}

// ระบบกด 5 ครั้ง (New)
function handleAdminTap() {
    adminTapCount++;
    if (adminTapCount >= 5) {
        document.getElementById('passwordModal').style.display = 'flex';
        adminTapCount = 0;
    }
    setTimeout(() => { adminTapCount = 0; }, 2000);
}

// รหัสผ่าน 170647 (New)
function verifyAdmin() {
    if (document.getElementById('adminPasswordInput').value === '170647') {
        document.getElementById('passwordModal').style.display = 'none';
        openAdminModal();
    } else { alert('รหัสผิด'); }
}

function renderTabs() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = '';
    tabs.forEach(t => {
        bar.innerHTML += `<button class="tab-btn ${currentTab === t ? 'active' : ''}" onclick="switchTab('${t}')">${t}</button>`;
    });
}

function switchTab(t) {
    currentTab = t;
    renderTabs();
    showCategories();
    renderCategories();
}

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    const filtered = products.filter(p => p.tab === currentTab);
    const categories = [...new Set(filtered.map(p => p.cat))];
    categories.forEach(cat => {
        const first = filtered.find(p => p.cat === cat);
        grid.innerHTML += `
            <div onclick="showProducts('${cat}')" style="background:white; padding:15px; border-radius:15px; text-align:center; cursor:pointer;">
                <img src="${first.icon || ''}" style="width:60px; height:60px; border-radius:10px; margin-bottom:8px;">
                <div style="font-weight:600; font-size:14px;">${cat}</div>
            </div>`;
    });
}

function showProducts(catName) {
    document.getElementById('categoriesView').style.display = 'none';
    document.getElementById('productsView').style.display = 'block';
    document.getElementById('currentCategoryTitle').innerText = catName;
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    const catProds = products.filter(p => p.tab === currentTab && p.cat === catName);
    catProds.forEach(p => {
        // Logic จุดสีสถานะ (New)
        let color = p.status === 'ready' ? '#10b981' : (p.status === 'empty' ? '#ef4444' : '#f39c12');
        let statusHtml = currentTab === "เติมเกม" ? `<span class="status-dot" style="background:${color};"></span>` : "";

        const isSelected = cart.some(c => c.id === p.id);
        grid.innerHTML += `
            <div class="product-item" onclick="toggleCart('${p.id}')" style="${isSelected ? 'border-color:var(--primary); background:#faf5ff;' : ''}">
                <div>
                    <div style="font-weight:600;">${statusHtml}${p.name}</div>
                    <div style="font-size:12px; color:gray;">${p.packDesc || ''}</div>
                </div>
                <div style="font-weight:bold; color:var(--primary);">฿${p.price}</div>
            </div>`;
    });
}

function showCategories() {
    document.getElementById('categoriesView').style.display = 'block';
    document.getElementById('productsView').style.display = 'none';
}

// --- Admin Section (เพิ่ม Tab Switcher ด้านล่าง) ---
function openAdminModal() {
    document.getElementById('adminModal').style.display = 'flex';
    const select = document.getElementById('pTabTarget');
    select.innerHTML = '';
    tabs.forEach(t => { select.innerHTML += `<option value="${t}">${t}</option>`; });
    renderAdminTabSwitcher();
    renderAdminProductList();
}

function renderAdminTabSwitcher() {
    const sw = document.getElementById('adminTabSwitcher');
    sw.innerHTML = '';
    tabs.forEach(t => {
        sw.innerHTML += `<button class="a-tab-sm ${adminActiveTab === t ? 'active' : ''}" onclick="setAdminActiveTab('${t}')">${t}</button>`;
    });
}

function setAdminActiveTab(t) {
    adminActiveTab = t;
    renderAdminTabSwitcher();
    renderAdminProductList();
}

function renderAdminProductList() {
    const list = document.getElementById('adminProductList');
    list.innerHTML = '';
    const filtered = products.filter(p => p.tab === adminActiveTab);
    filtered.forEach(p => {
        list.innerHTML += `
            <div style="display:flex; justify-content:space-between; background:#f9f9f9; padding:10px; margin-bottom:5px; border-radius:8px; font-size:13px;">
                <span><b>${p.cat}</b>: ${p.name}</span>
                <div>
                    <button onclick="editProduct('${p.id}')" style="color:blue; border:none; background:none; cursor:pointer;">แก้ไข</button>
                    <button onclick="deleteProduct('${p.id}')" style="color:red; border:none; background:none; cursor:pointer; margin-left:10px;">ลบ</button>
                </div>
            </div>`;
    });
}

function saveProduct(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value || Date.now().toString();
    const newP = {
        id: id,
        tab: document.getElementById('pTabTarget').value,
        cat: document.getElementById('pCat').value,
        name: document.getElementById('pName').value,
        packDesc: document.getElementById('pPackDesc').value,
        status: document.getElementById('pStatus').value,
        price: document.getElementById('pPrice').value,
        icon: document.getElementById('pIconUrl').value
    };
    const idx = products.findIndex(x => x.id === id);
    if(idx > -1) products[idx] = newP; else products.push(newP);
    localStorage.setItem('wandererProducts', JSON.stringify(products));
    document.getElementById('adminForm').reset();
    document.getElementById('editId').value = '';
    renderAdminProductList();
    renderAll();
}

function editProduct(id) {
    const p = products.find(x => x.id === id);
    document.getElementById('editId').value = p.id;
    document.getElementById('pTabTarget').value = p.tab;
    document.getElementById('pCat').value = p.cat;
    document.getElementById('pName').value = p.name;
    document.getElementById('pPackDesc').value = p.packDesc || '';
    document.getElementById('pStatus').value = p.status;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pIconUrl').value = p.icon || '';
}

function deleteProduct(id) {
    if(confirm('ลบไหม?')) {
        products = products.filter(x => x.id !== id);
        localStorage.setItem('wandererProducts', JSON.stringify(products));
        renderAdminProductList();
        renderAll();
    }
}

function toggleCart(id) {
    const idx = cart.findIndex(c => c.id === id);
    if(idx > -1) cart.splice(idx, 1);
    else cart.push(products.find(p => p.id === id));
    
    const bar = document.getElementById('bottomBar');
    if(cart.length > 0) bar.classList.add('active'); else bar.classList.remove('active');
    
    document.getElementById('cartCount').innerText = cart.length;
    document.getElementById('cartTotal').innerText = cart.reduce((s, c) => s + Number(c.price), 0);
    showProducts(document.getElementById('currentCategoryTitle').innerText);
}

// --- Logic คัดลอกไป LINE (คงโครงเดิมจากไฟล์ 002.txt) ---
function confirmCheckout() {
    let text = `🛒 *รายการสั่งซื้อ Wanderer Shop*\n---------------------------\n`;
    cart.forEach((c, i) => {
        text += `${i+1}. ${c.cat}\n   แพ็กเกจ: ${c.name} ${c.packDesc ? `(${c.packDesc})` : ''}\n   ราคา: ${c.price} บาท\n`;
    });
    text += `---------------------------\n💰 *ยอดรวมทั้งสิ้น: ${document.getElementById('cartTotal').innerText} บาท*`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert('คัดลอกรายการสั่งซื้อแล้ว! กำลังพาไปที่ LINE');
        window.location.href = "https://line.me/ti/p/~" + shopInfo.line.replace('@','');
    });
}

function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
</script>
</body>
</html>
