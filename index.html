<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer_Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #3B96F5;
  --secondary: #FF4B7E;
  --bg-main: #0A1D3A;
  --bg-card: #E1E8EE;
  --border-color: #C49646;
  --text-muted: #666; 
}
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-main); color: #fff;
  overflow-x: hidden;
  padding-bottom: 110px;
}

/* Background Particles & Glow */
.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; }
@keyframes ptUp { 0% { transform: translateY(105vh); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

/* Shop Status Pill */
.status { position: fixed; top: 12px; left: 12px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #fff; z-index: 999; animation: pulse 1.5s infinite; }
.status.open { background: #00c853; }
.status.closed { background: #ff1744; }
.status.slow { background: #ffea00; color: #000; }
.status.pause { background: #ff9100; }
@keyframes pulse { 0% { transform: scale(1); opacity:1;} 50% { transform: scale(1.05); opacity:0.8;} 100% { transform: scale(1); opacity:1;} }

/* HERO */
.hero { background: linear-gradient(135deg, rgba(10,29,58,0.9) 0%, rgba(59,150,245,0.2) 100%); padding: 50px 20px 40px; text-align: center; border-bottom: 2px solid var(--border-color); position: relative; z-index: 2; margin-bottom: 30px; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(59,150,245,0.6); margin-bottom: 5px; cursor: pointer; }
.hero-sub { font-size: 14px; color: #ddd; }

/* Tabs Navigation */
.tab-nav { display: flex; overflow-x: auto; gap: 10px; padding: 0 20px 15px; justify-content: center; scrollbar-width: none; position: relative; z-index: 10; margin-top: -20px; }
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 20px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border-color: transparent; }

/* Content & Grid */
.content { max-width: 600px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 5; }
.grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }

/* Sorting */
.sort-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.sort-title { font-size: 16px; font-weight: 600; color: #fff; }
.sort-dropdown { background: var(--bg-card); color: #000; border: 1px solid var(--primary); border-radius: 8px; padding: 4px 8px; font-family: inherit; font-size: 12px; outline: none; }

/* Product Cards */
.item-card { background: var(--bg-card); border: 2px solid transparent; border-radius: 16px; padding: 15px; position: relative; cursor: pointer; transition: 0.2s; color: #000; display: flex; flex-direction: column; }
.os-card { width: 160px; height: 175px; margin: 0 auto; justify-content: space-between; }
.item-card:active { transform: scale(0.96); }
.item-card.selected { border-color: var(--primary); box-shadow: 0 0 15px rgba(59,150,245,0.4); }

.check-circle { position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; background: #fff; }
.item-card.selected .check-circle { background: var(--primary); border-color: var(--primary); }
.check-circle::after { content: '✓'; color: #fff; font-size: 12px; font-weight: bold; opacity: 0; transform: scale(0.5); transition: 0.2s; }
.item-card.selected .check-circle::after { opacity: 1; transform: scale(1); }

.item-status { position: absolute; top: 10px; right: 10px; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: bold; color: #fff; }
.status-instock { background: #00c853; }
.status-outstock { background: #ff1744; }
.status-preorder { background: #ff9100; }

.card-img-wrapper { text-align: center; margin-bottom: 10px; }
.card-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.3; margin-bottom: 10px; flex-grow: 1; }
.card-price { background: rgba(59,150,245,0.15); color: var(--primary); font-weight: 700; font-size: 13px; padding: 4px 10px; border-radius: 8px; align-self: flex-start; }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 29, 58, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--primary); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: #fff; }
.bb-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-weight: 600; cursor: pointer; }

/* Admin Button & Modal */
#adminBtn { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #C49646; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
.admin-box { background: #fff; color: #000; padding: 20px; width: 100%; max-width: 400px; border-radius: 15px; }
.admin-box input, .admin-box select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
.admin-box button { width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 6px; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; }
.admin-box button.btn-close { background: #ccc; color: #333; }

/* Contacts Info Tab */
.info-card { background: var(--bg-card); color:#000; border-radius: 16px; padding: 20px; text-align:center; }
.copy-btn { background: var(--primary); color:#fff; border:none; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<div class="bg-glow-1"></div><div class="bg-glow-2"></div><div id="pts"></div>

<div id="shopStatus" class="status open">OPEN</div>

<div class="hero">
  <div class="hero-title" onclick="checkAdminLogin()">Wanderer_Shop</div>
  <div class="hero-sub" id="welcomeMsg">ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ</div>
</div>

<div class="tab-nav" id="tab-navigation"></div>

<div class="content" id="main-content">
  </div>
<div class="content">
  <div class="sort-container" id="sortContainer">
    <div class="sort-title" id="currentTabTitle">รายการสินค้า</div>
    <select class="sort-dropdown" id="sortSelect" onchange="renderProducts()">
      <option value="name">เรียงตามอักษร</option>
      <option value="price">เรียงตามราคา</option>
    </select>
  </div>
  <div class="grid-container" id="productGrid"></div>
  <div id="infoGrid" style="display:none;"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div>
    <div style="font-size:12px; color:#ccc;" id="cartCount">เลือก 0 รายการ</div>
    <div class="bb-total" id="cartTotal">0฿</div>
  </div>
  <button class="bb-btn" onclick="checkout()">สั่งซื้อสินค้า</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwecFmlAfDtVWDG0crvZ9y8fvAa5Sk403tvOekBRacV8yEvIKOkAqciPARQdPVIU2IQ/exec"; 
let products = [];
let storeInfo = { status: 'open', welcome: 'ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ', line: '@wanderer' };
let cart = [];
let currentTab = "IOS-ANDROID";
let adminMode = false;
let tapCount = 0;

// Particles
const P = document.getElementById('pts');
['🎐','🍃','🌌'].forEach(e => {
  for (let j = 0; j < 5; j++) {
    const d = document.createElement('div');
    d.className = 'pt'; d.textContent = e;
    d.style.cssText = `left:${Math.random()*100}vw; font-size:${12+Math.random()*15}px; animation-duration:${10+Math.random()*15}s; animation-delay:${-Math.random()*20}s;`;
    P.appendChild(d);
  }
});

/* --- App List & iOS Card Styles --- */
.app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
.app-card { background: var(--bg-card); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; color: #000; border: 2px solid transparent; }
.app-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.app-card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
.app-card h4 { font-size: 16px; margin-bottom: 5px; }
.app-card .app-desc { font-size: 12px; color: var(--text-muted); line-height: 1.3; }

/* สำหรับปุ่ม OS หน้าการ์ด iOS/Android */
.os-btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.os-btn { background: #fff; border: 1px solid var(--primary); color: var(--primary); padding: 6px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; }
.os-btn.outstock { background: #eee; border-color: #ccc; color: #999; cursor: not-allowed; }
.os-btn:hover:not(.outstock) { background: var(--primary); color: #fff; }

.back-btn { background: var(--text-muted); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
.package-group-title { background: #2a3d59; color: #fff; padding: 8px 15px; border-radius: 8px; margin: 20px 0 10px 0; font-size: 15px; }

let currentTabList = []; // เก็บแท็บที่ดึงมาจากชีต

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  products = data.products;
  storeInfo = data.storeInfo;
  currentTabList = data.tabs;
  
  renderTabsNav(); // สร้างปุ่มแท็บ
  switchMainTab('ข้อมูลร้าน'); // บังคับให้หน้าแรกเป็นข้อมูลร้าน
}

function renderTabsNav() {
  const tabNav = document.getElementById('tab-navigation'); // ต้องมี <div id="tab-navigation"></div> ใน HTML
  let html = `<button class="tab-btn active" id="btn_tab_ข้อมูลร้าน" onclick="switchMainTab('ข้อมูลร้าน')">ข้อมูลร้าน</button>`;
  
  // เรียงแท็บตามที่ต้องการ (ถ้ามี)
  const priorityTabs = ["แอพพรีเมี่ยม", "เติมเกม", "แอพ-เกม iOS/Android"];
  
  priorityTabs.forEach(t => {
    if(currentTabList.includes(t)) {
      html += `<button class="tab-btn" id="btn_tab_${t}" onclick="switchMainTab('${t}')">${t}</button>`;
    }
  });

  // แท็บอื่นๆ ที่แอดมินสร้างใหม่
  currentTabList.forEach(t => {
    if(!priorityTabs.includes(t)) {
      html += `<button class="tab-btn" id="btn_tab_${t}" onclick="switchMainTab('${t}')">${t}</button>`;
    }
  });
  
  tabNav.innerHTML = html;
}
function applyStoreInfo() {
  const st = document.getElementById('shopStatus');
  st.className = `status ${storeInfo.status}`;
  st.innerText = storeInfo.status.toUpperCase();
  document.getElementById('welcomeMsg').innerText = storeInfo.welcome || "ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ";
}

function switchMainTab(tabName) {
  currentTab = tabName;
  // เปลี่ยนสีปุ่ม
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn_tab_' + tabName).classList.add('active');


  const contentArea = document.getElementById('main-content'); // พื้นที่แสดงผลหลัก
  
 if (tabName === 'ข้อมูลร้าน') {
    contentArea.innerHTML = `<div style="text-align:center; padding: 40px;">
      <img src="${storeInfo.logo}" style="width:100px; border-radius:50%; margin-bottom:15px;">
      <h2>ยินดีต้อนรับสู่ร้าน!</h2>
      <p>สถานะ: ${storeInfo.status}</p>
      <p>ติดต่อ: ${storeInfo.line} | เวลาทำการ: ${storeInfo.hours}</p>
      
      ${isAdmin ? `<br><button onclick="openAdmin()" style="background:var(--primary); color:#fff; padding:8px 15px; border:none; border-radius:5px; margin-top:15px; cursor:pointer;">⚙️ จัดการร้านค้า</button>` : ''}
    </div>`;
  }
  else if (tabName === 'แอพ-เกม iOS/Android') {
    // โหมดการ์ดที่มีปุ่ม OS เลย (ไม่ต้องเข้าแพ็กเกจย่อย)
    let apps = {};
    products.filter(p => p.tab === tabName).forEach(p => {
      if(!apps[p.name]) apps[p.name] = { icon: p.icon, desc: p.desc, osList: [] };
      apps[p.name].osList.push(p);
    });

    let html = `<div class="app-grid">`;
    for(let appName in apps) {
      const app = apps[appName];
      html += `
        <div class="app-card">
          <img src="${app.icon || 'https://via.placeholder.com/70'}" alt="icon">
          <h4>${appName}</h4>
          <p class="app-desc">${app.desc}</p>
          <div class="os-btn-group">`;
            app.osList.forEach(pkg => {
              const outstock = pkg.status === 'outstock' ? 'outstock' : '';
              html += `<button class="os-btn ${outstock}" onclick="${outstock ? '' : `addToCart('${pkg.id}')`}">${pkg.os} - ${pkg.price}฿</button>`;
            });
      html += `</div></div>`;
    }
    html += `</div>`;
    contentArea.innerHTML = html;
  } 
  else {
    // โหมดปกติ (พรีเมี่ยม/เติมเกม/แท็บสร้างใหม่) -> โชว์ไอคอน พอกดแล้วค่อยเข้าแพ็กเกจย่อย
    let apps = {};
    products.filter(p => p.tab === tabName).forEach(p => {
      if(!apps[p.cat]) apps[p.cat] = { icon: p.icon, desc: p.appDesc };
    });

    let html = `<div class="app-grid">`;
    for(let cat in apps) {
      html += `
        <div class="app-card" onclick="openPackageView('${tabName}', '${cat}')">
          <img src="${apps[cat].icon || 'https://via.placeholder.com/70'}" alt="icon">
          <h4>${cat}</h4>
          <p class="app-desc">${apps[cat].desc}</p>
        </div>`;
    }
    html += `</div>`;
    contentArea.innerHTML = html;
  }
}

// หน้าแสดงแพ็กเกจย่อยหลังจากคลิกการ์ด
function openPackageView(tabName, catName) {
  const contentArea = document.getElementById('main-content');
  const appProducts = products.filter(p => p.tab === tabName && p.cat === catName);
  
  // จัดกลุ่มตาม ตัวเลือกแพ็กเกจ (subCat)
  let subCats = {};
  appProducts.forEach(p => {
    let sCat = p.subCat || 'แพ็กเกจทั่วไป';
    if(!subCats[sCat]) subCats[sCat] = [];
    subCats[sCat].push(p);
  });

  let html = `<button class="back-btn" onclick="switchMainTab('${tabName}')">⬅ กลับหน้ารวมแอป</button>`;
  html += `<h2 style="color:var(--primary);">${catName}</h2>`;

  for(let sub in subCats) {
    html += `<div class="package-group-title">${sub}</div>`;
    subCats[sub].forEach(item => {
      // ใส่ HTML โครงสร้างสินค้าของคุณตรงนี้
      html += `<div style="background:#fff; color:#000; padding:10px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <strong>${item.name}</strong><br>
          <small style="color:#666;">${item.desc}</small>
        </div>
        <button onclick="addToCart('${item.id}')" style="background:var(--primary); color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer;">${item.price}฿</button>
      </div>`;
    });
  }
  contentArea.innerHTML = html;
}


function renderInfo() {
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <h3 style="color:var(--primary); margin-bottom:15px;">ติดต่อเรา</h3>
      <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:10px;">
        <span>Line: ${storeInfo.line}</span>
        <button class="copy-btn" onclick="copyText('${storeInfo.line}')">คัดลอก</button>
      </div>
      <div style="font-size:14px; text-align:left; line-height:1.6; color:#555;">
        เวลาทำการ: 11:00 - 00:00 น.<br>
        การรับประกัน: ตามแพ็กเกจที่เลือก
      </div>
    </div>
  `;
}

function copyText(txt) {
  navigator.clipboard.writeText(txt);
  alert("คัดลอกแล้ว!");
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  
  if(product.status === 'outstock') return alert('สินค้านี้หมดชั่วคราวค่ะ');

  // ตรวจสอบว่าสินค้ามีในตะกร้าหรือยัง
  const index = cart.findIndex(item => item.id === id);
  if (index > -1) { 
    cart.splice(index, 1); // ถ้ามีแล้วให้เอาออก
    alert(`นำ ${product.name} ออกจากตะกร้าแล้ว`);
  } else { 
    cart.push(product); // ถ้ายังไม่มีให้ใส่ตะกร้า
    alert(`เพิ่ม ${product.name} ลงตะกร้าแล้ว`);
  }
  
  updateBottomBar();
}
function calculateTotal() {
  if(cart.length === 0) return 0;
  
  // โปรโมชั่นสำหรับ IOS-ANDROID (ราคา 20-25฿)
  let promoItems = cart.filter(i => i.price >= 20 && i.price <= 25 && i.tab === 'IOS-ANDROID');
  let otherItems = cart.filter(i => !(i.price >= 20 && i.price <= 25 && i.tab === 'IOS-ANDROID'));
  
  let count = promoItems.length;
  let promoTotal = 0;

  if (count >= 30) promoTotal = 360;
  else if (count >= 15) promoTotal = 210;
  else if (count >= 8) promoTotal = 80;
  else if (count >= 3) promoTotal = 45;
  else if (count === 2 && promoItems.every(i => i.price === 25)) promoTotal = 45;
  else promoTotal = promoItems.reduce((sum, i) => sum + i.price, 0);

  let othersTotal = otherItems.reduce((sum, i) => sum + i.price, 0);
  return promoTotal + othersTotal;
}

function updateBottomBar() {
  const bar = document.getElementById('bottomBar');
  if (cart.length > 0) {
    bar.classList.add('active');
    document.getElementById('cartCount').innerText = `เลือก ${cart.length} รายการ`;
    document.getElementById('cartTotal').innerText = calculateTotal() + "฿";
  } else {
    bar.classList.remove('active');
  }
}

async function checkout() {
  if (cart.length === 0) return;
  let total = calculateTotal();
  let text = "";

  if (currentTab === "เติมเกม") {
    text = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*\n---------------------------\n`;
    cart.forEach((i, idx) => { text += `${idx + 1}. ${i.name}\n   แพ็กเกจ: ${i.desc || '-'}\n   ราคา: ${i.price} บาท\n`; });
    text += `---------------------------\n*ยอดรวมทั้งสิ้น: ${total} บาท*\n---------------------------\n*แจ้งไอดี ได้เลยค่ะ*`;
  } else if (currentTab === "แอพพรีเมี่ยม") {
    text = `🛒 รายการสั่งซื้อ (Wanderer Shop)\n---------------------------\n`;
    cart.forEach((i, idx) => { text += `${idx + 1}. ${i.name}\n   แพ็กเกจ: ${i.desc || '-'}\n   ราคา: ${i.price} บาท\n`; });
    text += `---------------------------\n*ยอดรวมทั้งสิ้น: ${total} บาท*\n---------------------------\nรบกวนรอแอดมินตอบก่อนค่อยโอนนะคะ`;
  } else {
    text = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*\n---------------------------\n`;
    text += `✿  𓈒  รวมยอด    ꒰  ${total}฿  ꒱  ݂🎐\n`;
    cart.forEach(i => { text += `♡ 🍃 ݂  ${i.name} 𓈒\n`; });
    text += `---------------------------\nรบกวนรอแม่ค้าเช็คเมล-ยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ 🙏`;
  }

  // ส่ง Order เข้า Sheet
  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: "add_order", items: text, total: total })
  });

  const tempInput = document.createElement("textarea");
  tempInput.value = text;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);
  
  window.location.href = "https://lin.ee/" + storeInfo.line.replace('@', ''); // เปลี่ยนเป็นลิงก์ Line จริง
}

// --- ระบบ Admin ---
function checkAdminLogin() {
  if(adminMode) return;
  tapCount++;
  if(tapCount >= 5) {
    let pass = prompt("รหัสแอดมิน:");
    if(pass === "170647") {
      adminMode = true;
      document.body.insertAdjacentHTML("beforeend", `<div id="adminBtn" onclick="openAdmin()">+</div>`);
      alert("เข้าสู่โหมดแอดมิน");
    }
    tapCount = 0;
  }
}

// --- นำไปแทนที่ในส่วนของ <script> หน้าเว็บ HTML ---

function openAdmin() {
  // 1. สร้างตัวเลือกแท็บอัตโนมัติจากข้อมูลที่มีในระบบ (ยกเว้นแท็บที่ไม่ใช่สินค้า)
  let tabOptions = "";
  currentTabList.forEach(t => {
    if (t !== "ข้อมูลร้าน" && t !== "StoreInfo" && t !== "Orders") {
      // แปลงชื่อแท็บ iOS-Android ให้ตรงกับที่ระบบหลังบ้านรอรับ
      let val = (t === "แอพ-เกม iOS/Android") ? "IOS-ANDROID" : t;
      tabOptions += `<option value="${val}">${t}</option>`;
    }
  });

  // 2. นำ tabOptions ไปแทรกใน HTML
  document.body.insertAdjacentHTML("beforeend", `
    <div id="adminPanel" class="admin-panel">
      <div class="admin-box">
        <h3 style="margin-bottom:15px; color:var(--primary);">เพิ่ม/จัดการสินค้า</h3>
        
        <div class="form-group" style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
          <label>➕ สร้างแท็บหมวดหมู่ใหม่:</label>
          <div style="display:flex; gap:10px;">
            <input id="new_tab_input" placeholder="ชื่อแท็บใหม่">
            <button class="btn-save" style="margin-top:0; width:auto;" onclick="adminAddTab()">สร้าง</button>
          </div>
        </div>
        
        <select id="a_tab" onchange="toggleAdminForm(); renderAdminProductList();">
          ${tabOptions}
        </select>
        
        <div id="form_ios" style="display:none;">
          <input id="ios_name" placeholder="ชื่อแอป">
          <input id="ios_desc" placeholder="รายละเอียดแอป (เว้นได้)">
          <input id="ios_os" placeholder="ระบบ (เช่น iOS, Android, ทั้งสอง)">
          <select id="ios_status">
            <option value="ready">สถานะ: พร้อมส่ง (ready)</option>
            <option value="not_ready">สถานะ: สินค้าหมด (not_ready)</option>
          </select>
          <input id="ios_price" type="number" placeholder="ราคา (บาท)">
          <input id="ios_icon" placeholder="ลิงก์รูปภาพ หรือ อิโมจิ">
        </div>

        <div id="form_other">
          <input id="o_cat" placeholder="หมวดหมู่หลัก (ชื่อแอป)">
          <input id="o_appDesc" placeholder="รายละเอียดแอป (เว้นได้)">
          <input id="o_subCat" placeholder="ตัวเลือกแพ็กเกจ (เว้นได้)">
          <input id="o_name" placeholder="ชื่อแพ็กเกจย่อย">
          <input id="o_desc" placeholder="รายละเอียดย่อย (เว้นได้)">
          <input id="o_price" type="number" placeholder="ราคา (บาท)">
          <input id="o_icon" placeholder="ลิงก์รูปภาพ หรือ อิโมจิ">
        </div>
        
        <button onclick="addProduct(event)" style="width: 100%; padding: 10px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; margin-top: 15px; cursor: pointer;">เพิ่มสินค้าใหม่</button>
        
        <hr style="margin:20px 0 15px 0; border: 1px dashed #ccc;">
        <h4 style="margin-bottom:10px; color:#333; font-size:15px;">📦 สินค้าที่มีในแท็บนี้</h4>
        
        <div id="admin_product_list" style="max-height: 250px; overflow-y: auto; background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
          </div>

        <hr style="margin:15px 0;">
        <button class="btn-close" onclick="document.getElementById('adminPanel').remove()">ปิดหน้าต่าง</button>
      </div>
    </div>
  `);
  
  // เรียกใช้ฟังก์ชันตอนเปิดแอดมิน เพื่อให้ฟอร์มและรายการสินค้าตรงกับแท็บที่ถูกเลือกตอนแรก
  toggleAdminForm(); 
  renderAdminProductList();
}
// ย้ายออกมาข้างนอกตรงนี้
async function adminAddTab() {
  const tabName = document.getElementById('new_tab_input').value;
  if(!tabName) return alert("กรุณาใส่ชื่อแท็บ");
  
  await fetch(API_URL, { method: "POST", body: JSON.stringify({action: "add_tab", tabName: tabName}) });
  alert("สร้างแท็บสำเร็จ!");
  loadData();
}

// ฟังก์ชันดึงรายการสินค้ามาแสดงในหน้าแอดมิน
function renderAdminProductList() {
  const container = document.getElementById('admin_product_list');
  if (!container) return; // ถ้าไม่มีกล่องให้ข้ามไปเลย
  
  const tab = document.getElementById('a_tab').value;
  
  // กรองสินค้าเฉพาะแท็บที่เลือก
  let filteredProducts = products.filter(p => p.tab === tab);
  
  if (filteredProducts.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#999; font-size:13px; margin: 10px 0;">ยังไม่มีสินค้าในหมวดหมู่นี้</p>';
    return;
  }

  let html = '';
  filteredProducts.forEach(p => {
    // จัดรูปแบบชื่อที่จะแสดงให้ดูง่ายๆ
    let title = (tab === 'IOS-ANDROID') ? `${p.name} (${p.os})` : `${p.cat} - ${p.name}`;
    let statusColor = p.status === 'outstock' ? '#ff4b7e' : '#333';
    let statusText = p.status === 'outstock' ? '(หมด)' : '';
    
    html += `
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e0e0e0; padding:8px 0; font-size:13px;">
        <div style="color:${statusColor};">
          <strong>${title}</strong> <span style="font-size:11px; color:#ff4b7e;">${statusText}</span><br>
          <span style="color:#666; font-size:11px;">${p.desc || p.appDesc || ''}</span>
        </div>
        <div style="color:var(--primary); font-weight:bold; white-space:nowrap;">
          ${p.price} ฿
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}


// ฟังก์ชันส่งข้อมูลไปยัง Apps Script
// ฟังก์ชันสำหรับสลับช่องกรอกตามแท็บที่เลือก
function toggleAdminForm() {
  const tab = document.getElementById('a_tab').value;
  if(tab === 'IOS-ANDROID') {
    document.getElementById('form_ios').style.display = 'block';
    document.getElementById('form_other').style.display = 'none';
  } else {
    document.getElementById('form_ios').style.display = 'none';
    document.getElementById('form_other').style.display = 'block';
  }
}
// ฟังก์ชันสำหรับส่งข้อมูลไปยัง Google Apps Script
async function addProduct(e) {
  const btn = event.target; 
  btn.innerText = "กำลังบันทึก...";
  
  const tab = document.getElementById('a_tab').value;
  let payload = { action: "add", tab: tab };

  if (tab === "IOS-ANDROID") {
    payload.name = document.getElementById('ios_name').value;
    payload.desc = document.getElementById('ios_desc').value;
    payload.os = document.getElementById('ios_os').value;
    payload.status = document.getElementById('ios_status').value;
    payload.price = document.getElementById('ios_price').value;
    payload.icon = document.getElementById('ios_icon').value;
  } else {
    payload.cat = document.getElementById('o_cat').value;
    payload.appDesc = document.getElementById('o_appDesc').value;
    payload.subCat = document.getElementById('o_subCat').value;
    payload.name = document.getElementById('o_name').value;
    payload.desc = document.getElementById('o_desc').value;
    payload.price = document.getElementById('o_price').value;
    payload.icon = document.getElementById('o_icon').value;
  }

  // ช่วงท้ายของฟังก์ชัน addProduct()
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  
  await loadData(); // รอให้ดึงข้อมูลใหม่จากชีตให้เสร็จก่อน
  
  alert("เพิ่มสำเร็จ! ข้อมูลอัปเดตแล้ว");
  document.getElementById('adminPanel').remove(); // ค่อยปิดหน้าต่าง
}

loadData();
</script>
