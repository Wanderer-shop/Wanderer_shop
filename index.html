<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer_Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #3B96F5;
  --secondary: #FF4B7E;
  --bg-main: #0A1D3A;
  --bg-card: #E1E8EE;
  --border-color: #C49646;
  --text-muted: #666; 
}
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-main); color: #fff;
  overflow-x: hidden;
  padding-bottom: 110px;
}

/* Background Particles & Glow */
.bg-glow-1 { position: fixed; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
.bg-glow-2 { position: fixed; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; pointer-events: none; }
#pts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.pt { position: absolute; animation: ptUp linear infinite; opacity: 0; }
@keyframes ptUp { 0% { transform: translateY(105vh); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

/* Shop Status Pill */
.status { position: fixed; top: 12px; left: 12px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #fff; z-index: 999; animation: pulse 1.5s infinite; }
.status.open { background: #00c853; }
.status.closed { background: #ff1744; }
.status.slow { background: #ffea00; color: #000; }
.status.pause { background: #ff9100; }
@keyframes pulse { 0% { transform: scale(1); opacity:1;} 50% { transform: scale(1.05); opacity:0.8;} 100% { transform: scale(1); opacity:1;} }

/* HERO */
.hero { display: flex; flex-direction: column; align-items: center; gap: 15px; background: linear-gradient(135deg, rgba(10,29,58,0.9) 0%, rgba(59,150,245,0.2) 100%); padding: 60px 20px 40px; text-align: center; border-bottom: 2px solid var(--border-color); position: relative; z-index: 2; margin-bottom: 30px; }
.hero-logo-container { margin-top: -20px; }
.hero-logo-frame { width: 180px; height: 180px; background: var(--bg-card); border: 4px solid var(--border-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(59,150,245,0.4); overflow: hidden; position: relative; z-index: 2; }
.hero-logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.hero-title-container { text-align: center; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(59,150,245,0.6); margin-bottom: 5px; cursor: pointer; }
.hero-sub { font-size: 14px; color: #ddd; margin-top: 5px; }

/* Tabs Navigation */
.tab-nav { display: flex; overflow-x: auto; gap: 10px; padding: 0 20px 15px; justify-content: center; scrollbar-width: none; position: relative; z-index: 10; margin-top: -15px; }
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 20px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border-color: transparent; }

/* Content & Grid */
.content { max-width: 600px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 5; }
.app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
.app-card { background: var(--bg-card); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; color: #000; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; position: relative; }
.app-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.app-card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
.app-card h4 { font-size: 16px; margin-bottom: 5px; }
.app-card .app-desc { font-size: 12px; color: var(--text-muted); line-height: 1.3; }

/* Product Status Badge (เฉพาะ iOS) */
.app-badge { position: absolute; top: 8px; right: 8px; font-size: 10px; padding: 3px 8px; border-radius: 12px; color: #fff; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5; }
.app-badge.ready { background: #00c853; }
.app-badge.not-ready { background: #ff1744; }

/* OS Buttons */
.os-btn-group { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; width: 100%; }
.os-btn { background: #fff; border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; width: fit-content; }
.os-btn.outstock { background: #eee; border-color: #ccc; color: #999; cursor: not-allowed; }
.os-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
.os-btn:hover:not(.outstock) { background: var(--primary); color: #fff; }

.back-btn { background: var(--text-muted); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
.package-group-title { background: #2a3d59; color: #fff; padding: 8px 15px; border-radius: 8px; margin: 20px 0 10px 0; font-size: 15px; }

/* Cart Details Panel */
.cart-panel { position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%) translateY(150%); width: 90%; max-width: 500px; background: #fff; color: #000; border: 2px solid var(--border-color); border-radius: 12px; z-index: 999; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; max-height: 50vh; box-shadow: 0 -5px 25px rgba(0,0,0,0.4); visibility: hidden; }
.cart-panel.open { transform: translateX(-50%) translateY(0); visibility: visible; }
.cart-panel-header { background: var(--border-color); color: #fff; padding: 10px; text-align: center; font-weight: bold; border-radius: 9px 9px 0 0; }
.cart-panel-list { padding: 5px 15px; overflow-y: auto; }
.cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ddd; align-items: center; }
.cart-item:last-child { border-bottom: none; }
.cart-item-remove { background: #ff4b7e; color: #fff; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 29, 58, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--primary); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translateY(0); }
.bb-total { font-size: 20px; font-weight: 700; color: #fff; }
.bb-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; border-radius: 25px; padding: 10px 24px; font-weight: 600; cursor: pointer; }

/* Contacts Info Tab */
.info-card { background: var(--bg-card); color:#000; border-radius: 16px; padding: 20px; text-align:center; margin-bottom: 15px; }
.copy-btn { background: var(--primary); color:#fff; border:none; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; }

/* Checkout Modal */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
.modal-box { background: #fff; color: #000; padding: 24px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.modal-details { text-align: left; background: #f0f5fa; padding: 15px; border-radius: 8px; max-height: 250px; overflow-y: auto; font-size: 14px; margin: 15px 0; white-space: pre-wrap; line-height: 1.6; border: 1px solid #dce4ec; color: #333; }
.btn-confirm { background: #00c853; color: #fff; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
.btn-cancel { background: #f5f5f5; color: #555; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }

/* Admin Panel */
#adminBtn { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #C49646; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
.admin-box { background: #fff; color: #000; padding: 20px; width: 100%; max-width: 450px; border-radius: 15px; position: relative; max-height: 90vh; overflow-y: auto; }
.admin-box input[type="text"], .admin-box input[type="number"], .admin-box select, .admin-box textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
.admin-nav { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px; position: sticky; top: 0; background: #fff; z-index: 10; padding-top: 10px; }
.admin-nav-btn { flex: 1; padding: 10px; border: none; background: #f0f0f0; border-radius: 8px; font-weight: bold; cursor: pointer; color: #555; font-family: inherit; font-size: 14px; transition: 0.2s; }
.admin-nav-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(59,150,245,0.3); }
.admin-group-title { background: #eef5ff; color: var(--primary); padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-top: 15px; margin-bottom: 5px; font-size: 14px; border-left: 4px solid var(--primary); }
</style>
</head>
<body>

<div class="bg-glow-1"></div><div class="bg-glow-2"></div><div id="pts"></div>

<div id="shopStatus" class="status open">OPEN</div>

<div class="hero">
  <div class="hero-logo-container">
    <div class="hero-logo-frame">
      <img src="https://via.placeholder.com/180" alt="Shop Logo" class="hero-logo-img">
    </div>
  </div>
  
  <div class="hero-title-container">
    <h1 class="hero-title" onclick="checkAdminLogin()">Wanderer_Shop</h1>
    <p id="welcomeMsg" class="hero-sub">ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ</p>
  </div>
</div>

<div class="tab-nav" id="tab-navigation"></div>

<div class="content" id="main-content"></div>

<div id="cartPanel" class="cart-panel">
  <div class="cart-panel-header">🛒 รายการที่เลือก (กดซ้ำเพื่อเอาออก)</div>
  <div id="cartPanelList" class="cart-panel-list"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div style="cursor: pointer; flex: 1;" onclick="toggleCartPanel()">
    <div style="font-size:12px; color:#ccc;" id="cartCount">เลือก 0 รายการ <span style="font-size:10px; margin-left:5px; color:#fff;">▲</span></div>
    <div class="bb-total" id="cartTotal">0฿</div>
  </div>
  <button class="bb-btn" onclick="openCheckoutModal()">สั่งซื้อสินค้า</button>
</div>

<div id="checkoutModal" class="modal-overlay">
  <div class="modal-box">
    <h3 style="color:var(--primary); font-size:20px;">🛒 สรุปรายการสั่งซื้อ</h3>
    <div id="modalOrderDetails" class="modal-details"></div>
    <button class="btn-confirm" onclick="confirmCheckout()">คัดลอกและไปที่ไลน์</button>
    <button class="btn-cancel" onclick="closeCheckoutModal()">ยกเลิก</button>
  </div>
</div>

<script>
// ใส่ลิงก์ API ของ Google Apps Script ของคุณตรงนี้
const API_URL = "https://script.google.com/macros/s/AKfycbxnnymzqYG0ElcMrGgEc70yyhbeuFSViYu_9dDATChzp2jLeLdtfzVNvJksbTT58kXx/exec"; 

let products = [];
let storeInfo = { status: 'open', welcome: 'ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ', line: '@wanderer', customCards: [] };
let cart = [];
let currentTab = "IOS-ANDROID";
let adminMode = false;
let tapCount = 0;
let currentTabList = []; 
let orderTextToCopy = ""; 
let tempCustomCards = []; 
let editingProductId = null; // ตัวแปรเก็บ ID สินค้าที่กำลังแก้ไข

const hiddenSystemTabs = ["Products", "ตั้งค่าร้าน", "ออเดอร์", "Database", "StoreInfo", "Orders"];

const P = document.getElementById('pts');
['🎐','🍃','🌌'].forEach(e => {
  for (let j = 0; j < 5; j++) {
    const d = document.createElement('div');
    d.className = 'pt'; d.textContent = e;
    d.style.cssText = `left:${Math.random()*100}vw; font-size:${12+Math.random()*15}px; animation-duration:${10+Math.random()*15}s; animation-delay:${-Math.random()*20}s;`;
    if(P) P.appendChild(d);
  }
});

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    products = data.products || [];
    storeInfo = data.storeInfo || storeInfo;
    if(!storeInfo.customCards) storeInfo.customCards = [];
    currentTabList = data.tabs || [];
    
    applyStoreInfo();
    renderTabsNav(); 
    switchMainTab('ข้อมูลร้าน'); 
  } catch (err) {
    console.error("โหลดข้อมูลล้มเหลว:", err);
  }
}

function applyStoreInfo() {
  const st = document.getElementById('shopStatus');
  st.className = `status ${storeInfo.status || 'open'}`;
  st.innerText = (storeInfo.status || 'open').toUpperCase();
  
  if(storeInfo.logo) {
    document.querySelector('.hero-logo-img').src = storeInfo.logo;
  }
  
  const welcomeEl = document.getElementById('welcomeMsg');
  if(welcomeEl) {
    welcomeEl.innerText = storeInfo.welcome || "ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ";
  }
}

function renderTabsNav() {
  const tabNav = document.getElementById('tab-navigation'); 
  let html = `<button class="tab-btn active" id="btn_tab_ข้อมูลร้าน" onclick="switchMainTab('ข้อมูลร้าน')">ข้อมูลร้าน</button>`;
  
  const priorityTabs = ["แอพพรีเมี่ยม", "เติมเกม", "แอพ-เกม iOS/Android"];
  
  priorityTabs.forEach(t => {
    html += `<button class="tab-btn" id="btn_tab_${t}" onclick="switchMainTab('${t}')">${t}</button>`;
  });

  currentTabList.forEach(t => {
    if(!priorityTabs.includes(t) && t !== "ข้อมูลร้าน" && !hiddenSystemTabs.includes(t)) {
      html += `<button class="tab-btn" id="btn_tab_${t}" onclick="switchMainTab('${t}')">${t}</button>`;
    }
  });
  
  tabNav.innerHTML = html;
}

function switchMainTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  let activeBtn = document.getElementById('btn_tab_' + tabName);
  if(activeBtn) activeBtn.classList.add('active');

  const contentArea = document.getElementById('main-content'); 
  
  if (tabName === 'ข้อมูลร้าน') {
    let html = `
      <div class="info-card">
        <h3 style="color:var(--primary); margin-bottom:15px;">ติดต่อเรา</h3>
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:10px;">
          <span>Line: ${storeInfo.line || '@wanderer'}</span>
          <button class="copy-btn" onclick="copyText('${storeInfo.line || '@wanderer'}')">คัดลอก</button>
        </div>
        <div style="font-size:14px; text-align:left; line-height:1.6; color:#555;">
          เวลาทำการ: ${storeInfo.hours || '11:00 - 00:00 น.'}<br>
          การรับประกัน: ตามแพ็กเกจที่เลือก
        </div>
      </div>
    `;

    if(storeInfo.mediaLink && storeInfo.mediaLink.trim() !== '') {
      let mediaHtml = '';
      let link = storeInfo.mediaLink;
      if(link.includes('youtube') || link.includes('youtu.be')){
          let ytid = link.split('v=')[1] || link.split('/').pop();
          if(ytid && ytid.includes('&')) ytid = ytid.split('&')[0];
          mediaHtml = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${ytid}" frameborder="0" allowfullscreen style="border-radius:12px; margin-bottom:10px;"></iframe>`;
      } else if (link.match(/\.(mp4|mov)$/i)) {
          mediaHtml = `<video width="100%" controls style="border-radius:12px; margin-bottom:10px;"><source src="${link}" type="video/mp4"></video>`;
      } else {
          mediaHtml = `<img src="${link}" style="width:100%; border-radius:12px; margin-bottom:10px; object-fit:cover;">`;
      }
      
      html += `
        <div class="info-card" style="padding:15px;">
          ${mediaHtml}
          ${storeInfo.mediaText ? `<div style="font-size:14px; text-align:left; color:#333; white-space:pre-wrap; line-height:1.5;">${storeInfo.mediaText}</div>` : ''}
        </div>
      `;
    }

    if(storeInfo.customCards && storeInfo.customCards.length > 0) {
      storeInfo.customCards.forEach(card => {
        html += `
          <div class="info-card" style="display:flex; align-items:flex-start; gap:15px; text-align:left; padding:15px;">
            ${card.icon ? `<img src="${card.icon}" style="width:40px; height:40px; border-radius:8px; object-fit:cover; flex-shrink:0;">` : ''}
            <div>
              <h4 style="color:var(--primary); margin-bottom:5px;">${card.title}</h4>
              <div style="font-size:13px; color:#555; white-space:pre-wrap; line-height:1.5;">${card.desc}</div>
            </div>
          </div>
        `;
      });
    }
    contentArea.innerHTML = html;
  }
  else if (tabName === 'แอพ-เกม iOS/Android') {
    let apps = {};
    products.filter(p => p.tab === tabName).forEach(p => {
      if(!apps[p.name]) apps[p.name] = { icon: p.icon, desc: p.desc, osList: [] };
      apps[p.name].osList.push(p);
    });

    let html = `<div class="app-grid">`;
    for(let appName in apps) {
      const app = apps[appName];
      let isReady = app.osList.some(p => p.status !== 'outstock' && p.status !== 'not_ready');
      let badgeHtml = isReady ? `<div class="app-badge ready">พร้อมส่ง</div>` : `<div class="app-badge not-ready">เมลไม่พร้อม</div>`;

      html += `
        <div class="app-card">
          ${badgeHtml}
          <img src="${app.icon || 'https://via.placeholder.com/70'}" alt="icon">
          <h4>${appName}</h4>
          <p class="app-desc">${app.desc}</p>
          <div class="os-btn-group">`;
            app.osList.forEach(pkg => {
              const outstock = pkg.status === 'outstock' ? 'outstock' : '';
              const inCart = cart.some(c => c.id === pkg.id) ? 'selected' : '';
              html += `<button id="btn_${pkg.id}" class="os-btn ${outstock} ${inCart}" onclick="${outstock ? '' : `addToCart('${pkg.id}')`}">${pkg.os} - ${pkg.price}฿</button>`;
            });
      html += `</div></div>`;
    }
    html += `</div>`;
    if(Object.keys(apps).length === 0) contentArea.innerHTML = `<p style="text-align:center; margin-top:30px;">ยังไม่มีสินค้าในหมวดนี้</p>`;
    else contentArea.innerHTML = html;
  } 
  else {
    let apps = {};
    products.filter(p => p.tab === tabName).forEach(p => {
      if(!apps[p.cat]) apps[p.cat] = { icon: p.icon, desc: p.appDesc };
    });

    let html = `<div class="app-grid">`;
    for(let cat in apps) {
      html += `
        <div class="app-card" onclick="openPackageView('${tabName}', '${cat}')">
          <img src="${apps[cat].icon || 'https://via.placeholder.com/70'}" alt="icon">
          <h4>${cat}</h4>
          <p class="app-desc">${apps[cat].desc}</p>
        </div>`;
    }
    html += `</div>`;
    if(Object.keys(apps).length === 0) contentArea.innerHTML = `<p style="text-align:center; margin-top:30px;">ยังไม่มีสินค้าในหมวดนี้</p>`;
    else contentArea.innerHTML = html;
  }
}

function openPackageView(tabName, catName) {
  const contentArea = document.getElementById('main-content');
  const appProducts = products.filter(p => p.tab === tabName && p.cat === catName);
  
  let subCats = {};
  appProducts.forEach(p => {
    let sCat = p.subCat || 'แพ็กเกจทั่วไป';
    if(!subCats[sCat]) subCats[sCat] = [];
    subCats[sCat].push(p);
  });

  let html = `<button class="back-btn" onclick="switchMainTab('${tabName}')">⬅ กลับหน้ารวมแอป</button>`;
  html += `<h2 style="color:var(--primary); margin-bottom:10px;">${catName}</h2>`;

  for(let sub in subCats) {
    html += `<div class="package-group-title">${sub}</div>`;
    subCats[sub].forEach(item => {
      const isOutstock = item.status === 'outstock';
      const inCart = cart.some(c => c.id === item.id) ? 'background:#FF4B7E;' : (isOutstock ? 'background:#ccc; cursor:not-allowed;' : 'background:var(--primary);');
      const btnText = isOutstock ? 'หมด' : (cart.some(c => c.id === item.id) ? 'ลบออก' : `${item.price} ฿`);

      html += `
      <div style="background:#fff; color:#000; padding:10px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;">
        <div>
          <strong>${item.name}</strong><br>
          <small style="color:#666;">${item.desc}</small>
        </div>
        <button id="btn_${item.id}" onclick="${isOutstock ? '' : `addToCart('${item.id}')`}" style="${inCart} color:#fff; border:none; padding:8px 12px; border-radius:6px; font-weight:bold; transition:0.2s;">${btnText}</button>
      </div>`;
    });
  }
  contentArea.innerHTML = html;
}

function copyText(txt) {
  navigator.clipboard.writeText(txt);
  alert("คัดลอกแล้ว!");
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  if(product.status === 'outstock') return alert('สินค้านี้หมดชั่วคราวค่ะ');

  const index = cart.findIndex(item => item.id === id);
  if (index > -1) { 
    cart.splice(index, 1); 
  } else { 
    cart.push(product); 
  }
  updateBottomBar();
  updateButtonUI(id);
}

function updateButtonUI(id) {
  const btn = document.getElementById(`btn_${id}`);
  if(btn) {
    if(currentTab === 'แอพ-เกม iOS/Android') {
      if(cart.some(c => c.id === id)) btn.classList.add('selected');
      else btn.classList.remove('selected');
    } else {
      const inCart = cart.some(c => c.id === id);
      btn.style.background = inCart ? '#FF4B7E' : 'var(--primary)';
      const product = products.find(p => p.id === id);
      btn.innerText = inCart ? 'ลบออก' : `${product.price} ฿`;
    }
  }
}

function calculateTotal() {
  if(cart.length === 0) return 0;
  let promoItems = cart.filter(i => i.price >= 20 && i.price <= 25 && i.tab === 'แอพ-เกม iOS/Android');
  let otherItems = cart.filter(i => !(i.price >= 20 && i.price <= 25 && i.tab === 'แอพ-เกม iOS/Android'));
  
  let count = promoItems.length;
  let promoTotal = 0;
  if (count >= 30) promoTotal = 360;
  else if (count >= 15) promoTotal = 210;
  else if (count >= 8) promoTotal = 80;
  else if (count >= 3) promoTotal = 45;
  else if (count === 2 && promoItems.every(i => i.price === 25)) promoTotal = 45;
  else promoTotal = promoItems.reduce((sum, i) => sum + i.price, 0);

  let othersTotal = otherItems.reduce((sum, i) => sum + i.price, 0);
  return promoTotal + othersTotal;
}

function updateBottomBar() {
  const bar = document.getElementById('bottomBar');
  if (cart.length > 0) {
    bar.classList.add('active');
    document.getElementById('cartCount').innerHTML = `เลือก ${cart.length} รายการ <span style="font-size:10px; margin-left:5px; color:#fff;">▲</span>`;
    document.getElementById('cartTotal').innerText = calculateTotal() + "฿";
  } else {
    bar.classList.remove('active');
    document.getElementById('cartPanel').classList.remove('open'); 
  }
  updateCartPanel();
}

function toggleCartPanel() {
  const panel = document.getElementById('cartPanel');
  if(panel.classList.contains('open')) {
    panel.classList.remove('open');
  } else {
    if(cart.length > 0) panel.classList.add('open');
  }
}

function updateCartPanel() {
  const list = document.getElementById('cartPanelList');
  if(cart.length === 0) {
    list.innerHTML = '';
    return;
  }
  let html = '';
  cart.forEach(item => {
    html += `
      <div class="cart-item">
        <div style="font-size:14px; line-height:1.3;">
          <strong>${item.name}</strong> <span style="color:#666; font-size:12px;">${item.os || item.desc || ''}</span><br>
          <span style="color:var(--primary); font-weight:bold;">${item.price} ฿</span>
        </div>
        <button class="cart-item-remove" onclick="addToCart('${item.id}')">ลบออก</button>
      </div>
    `;
  });
  list.innerHTML = html;
}

function openCheckoutModal() {

  document.getElementById('cartPanel').classList.remove('open'); 
  
  let total = calculateTotal();
  orderTextToCopy = "";

  if (currentTab === "เติมเกม") {

    cart.forEach((i, idx) => { orderTextToCopy += `${idx + 1}. ${i.name}\n   แพ็กเกจ: ${i.os || i.desc || '-'}\n   ราคา: ${i.price} บาท\n`; });
    orderTextToCopy += `---------------------------\n*ยอดรวมทั้งสิ้น: ${total} บาท*\n---------------------------\n*แจ้งไอดี ได้เลยค่ะ*`;
  } else if (currentTab === "แอพพรีเมี่ยม") {
    orderTextToCopy = `🛒 รายการสั่งซื้อ (Wanderer Shop)\n---------------------------\n`;
    cart.forEach((i, idx) => { orderTextToCopy += `${idx + 1}. ${i.name}\n   แพ็กเกจ: ${i.os || i.desc || '-'}\n   ราคา: ${i.price} บาท\n`; });
    orderTextToCopy += `---------------------------\n*ยอดรวมทั้งสิ้น: ${total} บาท*\n---------------------------\nรบกวนรอแอดมินตอบก่อนค่อยโอนนะคะ`;
  } else {
    orderTextToCopy = `🛒 *รายการสั่งซื้อ (Wanderer Shop)*\n---------------------------\n`;
    orderTextToCopy += `✿  𓈒  รวมยอด    ꒰  ${total}฿  ꒱  ݂🎐\n`;
    cart.forEach(i => { orderTextToCopy += `♡ 🍃 ݂  ${i.name} (${i.os || ''}) 𓈒\n`; });

  }

  document.getElementById('modalOrderDetails').innerText = orderTextToCopy;
  document.getElementById('checkoutModal').style.display = 'flex';

function closeCheckoutModal() {

async function confirmCheckout() {
  let total = calculateTotal();
  fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "add_order", items: orderTextToCopy, total: total }) });

  const tempInput = document.createElement("textarea");
  tempInput.value = orderTextToCopy;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);
  
  closeCheckoutModal();
  window.location.href = "https://lin.ee/twgRJSxV";
}

function renderAdminProductList() {
  const container = document.getElementById('admin_product_list');
  if (!container) return; 
  
  const tab = document.getElementById('a_tab').value;
  let targetTabName = tab === "IOS-ANDROID" ? "แอพ-เกม iOS/Android" : tab;
  let filteredProducts = products.filter(p => p.tab === targetTabName);
  
  if (filteredProducts.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#999; font-size:13px; margin: 20px 0;">ยังไม่มีสินค้าในหมวดหมู่นี้</p>';
    return;
  }

  let groups = {};
  filteredProducts.forEach(p => {
    let groupName = (targetTabName === 'แอพ-เกม iOS/Android') ? p.name : p.cat;
    if(!groupName) groupName = "ไม่มีหมวดหมู่";
    if(!groups[groupName]) groups[groupName] = [];
    groups[groupName].push(p);
  });

  let html = '';
  for(let gName in groups) {
    let gStatus = '';
    if (targetTabName !== 'แอพ-เกม iOS/Android') {
      let hasNotReady = groups[gName].some(p => p.status === 'not_ready');
      let allOut = groups[gName].every(p => p.status === 'outstock');
      if (hasNotReady) gStatus = `<span style="color:#ff1744; font-size:12px; font-weight:normal; margin-left:8px;">(เมลไม่พร้อม)</span>`;
      else if (allOut) gStatus = `<span style="color:#ff4b7e; font-size:12px; font-weight:normal; margin-left:8px;">(หมด)</span>`;
    }

    html += `<div class="admin-group-title">${gName}${gStatus}</div>`;
    
    groups[gName].forEach(p => {
      let subName = (targetTabName === 'แอพ-เกม iOS/Android') ? p.os : p.name;
      let statusColor = p.status === 'outstock' ? '#ff4b7e' : (p.status === 'not_ready' ? '#ff1744' : '#333');
      let statusText = p.status === 'outstock' ? '(หมด)' : (p.status === 'not_ready' ? '(เมลไม่พร้อม)' : '');
      
      html += `
        <div class="admin-item" style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="flex:1; color:${statusColor};">
            <strong>- ${subName}</strong> <span style="font-size:11px; color:${statusColor};">${statusText}</span><br>
            <span style="color:#888; font-size:11px; margin-left:10px;">${p.desc || p.appDesc || 'ไม่มีรายละเอียด'}</span>

          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px; min-width:80px;">

            </div>

        </div>
      `;
    });
  }
  container.innerHTML = html;
}

function editProduct(id) {

  if(!p) return;
  
  editingProductId = id;
  document.querySelector('.admin-box').scrollTop = 0;

  if (p.tab === "แอพ-เกม iOS/Android") {
    document.getElementById('a_tab').value = "IOS-ANDROID";
    toggleAdminForm();
    document.getElementById('ios_name').value = p.name;
    document.getElementById('ios_desc').value = p.desc;
    document.getElementById('ios_status').value = p.status;
    document.getElementById('ios_price').value = p.price;
    document.getElementById('ios_icon').value = p.icon;
    document.getElementById('cb_ios').checked = p.os.toLowerCase().includes("ios");
    document.getElementById('cb_android').checked = p.os.toLowerCase().includes("android");
  } else {
    document.getElementById('a_tab').value = p.tab;
    toggleAdminForm();
    document.getElementById('o_cat').value = p.cat;
    document.getElementById('o_appDesc').value = p.appDesc;
    document.getElementById('o_subCat').value = p.subCat;
    document.getElementById('o_name').value = p.name;
    document.getElementById('o_desc').value = p.desc;
    document.getElementById('o_status').value = p.status;
    document.getElementById('o_price').value = p.price;
    document.getElementById('o_icon').value = p.icon;
  }

  const submitBtn = document.getElementById('admin_submit_btn');
  if(submitBtn) {
    submitBtn.innerText = "💾 บันทึกการแก้ไข";
    submitBtn.style.background = "#ffc107";
    submitBtn.style.color = "#000";
    
    if(!document.getElementById('cancel_edit_btn')) {
      const cancelBtn = document.createElement('button');
      cancelBtn.id = 'cancel_edit_btn';
      cancelBtn.innerText = "❌ ยกเลิกแก้ไข";
      cancelBtn.style.cssText = "width: 100%; padding: 10px; background: #eee; color:#333; border: none; border-radius: 8px; font-size: 14px; margin-top: 10px; font-weight:bold; cursor: pointer;";
      cancelBtn.onclick = cancelEdit;
      submitBtn.parentNode.insertBefore(cancelBtn, submitBtn.nextSibling);
    }
  }
}

function cancelEdit() {
  editingProductId = null;
  document.querySelectorAll('#form_ios input, #form_other input').forEach(inp => inp.value = "");
  document.getElementById('cb_ios').checked = true;
  document.getElementById('cb_android').checked = true;

  const submitBtn = document.getElementById('admin_submit_btn');
  if(submitBtn) {
    submitBtn.innerText = "เพิ่มสินค้าเข้าหมวดนี้";
    submitBtn.style.background = "var(--primary)";
    submitBtn.style.color = "#fff";
  }
  const cancelBtn = document.getElementById('cancel_edit_btn');
  if(cancelBtn) cancelBtn.remove();
}

async function deleteProduct(id) {
  if(!confirm("ยืนยันการลบสินค้านี้? (ลบแล้วกู้คืนไม่ได้นะ)")) return;
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "delete_product", id: id }) });
  await loadData(); 
  renderAdminProductList(); 
  alert("ลบสินค้าเรียบร้อย!");
}

function adminAddCustomCard() {
  const title = document.getElementById('cc_title').value;
  const desc = document.getElementById('cc_desc').value;
  const icon = document.getElementById('cc_icon').value;
  if(!title) return alert("กรุณาใส่ชื่อหัวข้อการ์ด");
  
  tempCustomCards.push({ title: title, desc: desc, icon: icon });
  document.getElementById('cc_title').value = '';
  document.getElementById('cc_desc').value = '';
  document.getElementById('cc_icon').value = '';
  renderAdminCustomCards();
}

function adminRemoveCustomCard(index) {
  tempCustomCards.splice(index, 1);
  renderAdminCustomCards();
}

function renderAdminCustomCards() {
  const list = document.getElementById('admin_cards_list');
  let html = '';
  tempCustomCards.forEach((c, i) => {
    html += `
      <div style="background:#fff; border:1px solid #ccc; padding:8px; border-radius:6px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <strong style="color:var(--primary); font-size:13px;">${c.title}</strong>
        </div>
        <button onclick="adminRemoveCustomCard(${i})" style="background:#ff4b7e; color:#fff; border:none; padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer;">ลบ</button>
      </div>
    `;
  });
  list.innerHTML = html;
}

async function saveStoreInfo(e) {
  const btn = e.target;
  const oldText = btn.innerText;
  btn.innerText = "กำลังบันทึก...";

  let payload = {
    action: "save_store",
    status: document.getElementById('st_status').value,
    welcome: document.getElementById('st_welcome').value,
    line: document.getElementById('st_line').value,
    hours: document.getElementById('st_hours').value,
    logo: document.getElementById('st_logo').value,
    mediaLink: document.getElementById('st_mediaLink').value,
    mediaText: document.getElementById('st_mediaText').value,
    customCards: tempCustomCards
  };

  await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
  await loadData(); 
  btn.innerText = oldText;
  alert("บันทึกข้อมูลร้านค้าเรียบร้อย!");
}

async function adminAddTab() {
  const tabName = document.getElementById('new_tab_input').value;
  if(!tabName) return alert("กรุณาใส่ชื่อแท็บ");
  
  await fetch(API_URL, { method: "POST", body: JSON.stringify({action: "add_tab", tabName: tabName}) });
  alert("สร้างแท็บสำเร็จ!");
  document.getElementById('adminPanel').remove();
  loadData();
}

function toggleAdminForm() {
  const tab = document.getElementById('a_tab').value;
  if(tab === 'IOS-ANDROID') {
    document.getElementById('form_ios').style.display = 'block';
    document.getElementById('form_other').style.display = 'none';
  } else {
    document.getElementById('form_ios').style.display = 'none';
    document.getElementById('form_other').style.display = 'block';
  }
}

async function addProduct(e) {
  const btn = e.target; 
  btn.innerText = "กำลังบันทึก...";
  btn.disabled = true;
  
  const tab = document.getElementById('a_tab').value;
  let osSelected = [];
  if(document.getElementById('cb_ios').checked) osSelected.push("iOS");
  if(document.getElementById('cb_android').checked) osSelected.push("Android");

  if (editingProductId) {
    let payload = { action: "edit_product", id: editingProductId, tab: tab };
    if (tab === "IOS-ANDROID") {
      payload.name = document.getElementById('ios_name').value;
      payload.desc = document.getElementById('ios_desc').value;
      payload.os = osSelected.join(" / ");
      payload.status = document.getElementById('ios_status').value;
      payload.price = document.getElementById('ios_price').value;
      payload.icon = document.getElementById('ios_icon').value;
    } else {
      payload.cat = document.getElementById('o_cat').value;
      payload.appDesc = document.getElementById('o_appDesc').value;
      payload.subCat = document.getElementById('o_subCat').value;
      payload.name = document.getElementById('o_name').value;
      payload.desc = document.getElementById('o_desc').value;
      payload.status = document.getElementById('o_status').value; 
      payload.price = document.getElementById('o_price').value;
      payload.icon = document.getElementById('o_icon').value;
    }
    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    alert("อัปเดตข้อมูลสำเร็จ!");
    cancelEdit();
  } else {
    if (tab === "IOS-ANDROID") {
      if(osSelected.length === 0) {
        alert("กรุณาเลือกระบบปฏิบัติการอย่างน้อย 1 อย่าง");
        btn.innerText = "เพิ่มสินค้าเข้าหมวดนี้";
        btn.disabled = false;
        return;
      }
      for(let osName of osSelected) {
        let payload = {
          action: "add", tab: tab, os: osName,
          name: document.getElementById('ios_name').value,
          desc: document.getElementById('ios_desc').value,
          status: document.getElementById('ios_status').value,
          price: document.getElementById('ios_price').value,
          icon: document.getElementById('ios_icon').value
        };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      }
    } else {
      let payload = { action: "add", tab: tab };
      payload.cat = document.getElementById('o_cat').value;
      payload.appDesc = document.getElementById('o_appDesc').value;
      payload.subCat = document.getElementById('o_subCat').value;
      payload.name = document.getElementById('o_name').value;
      payload.desc = document.getElementById('o_desc').value;
      payload.status = document.getElementById('o_status').value; 
      payload.price = document.getElementById('o_price').value;
      payload.icon = document.getElementById('o_icon').value;
      await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    }
    alert("เพิ่มสำเร็จ! ข้อมูลอัปเดตแล้ว");
    document.querySelectorAll('#form_ios input, #form_other input').forEach(inp => inp.value = ""); 
  }

  await loadData(); 
  renderAdminProductList(); 
  btn.disabled = false;
  if (!editingProductId) btn.innerText = "เพิ่มสินค้าเข้าหมวดนี้";
}

loadData();
</script>
</body>
</html>
