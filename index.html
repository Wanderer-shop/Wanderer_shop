<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* --- Design System --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f39c12; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; padding-bottom: 110px; }

/* 1. การแสดงผลรูปภาพและไอคอน (UI/UX) */
.category-card { 
    background: var(--bg-card); 
    border-radius: 20px; /* มุมโค้ง 20px */
    padding: 18px; /* Padding 18px */
    text-align: center; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
    position: relative; 
    border: 2px solid transparent; 
    transition: 0.3s;
    width: 100%;
    cursor: pointer;
}

/* ขนาดรูปภาพ 50x70px ทรงแนวตั้ง */
.cat-icon-wrapper {
    width: 50px;
    height: 70px;
    margin: 0 auto 10px;
    border-radius: 10px;
    overflow: hidden;
    background: #eee;
}
.cat-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

/* การตัดคำ (Ellipsis) */
.app-name-label {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
    width: 100%;
}

/* สัญลักษณ์การเลือก (กรอบม่วง + ติ๊กถูก) */
.category-card.selected {
    border-color: var(--primary);
    background: #fdf8ff;
}
.select-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    width: 20px;
    height: 20px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: none; /* ซ่อนไว้ก่อน */
    align-items: center;
    justify-content: center;
    font-size: 12px;
}
.category-card.selected .select-badge { display: flex; }

/* 2. ระบบ Logic iOS/ANDROID */
.os-selector { display: flex; gap: 8px; margin-top: 10px; }
.os-btn { 
    flex: 1; 
    padding: 6px 0; 
    border: 1px solid #ddd; 
    border-radius: 8px; 
    background: #fff; 
    font-size: 12px; 
    font-weight: bold;
    cursor: pointer;
}
.os-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

/* 3. การจัดวาง Layout */
.section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 15px; }
.sort-select { padding: 5px 10px; border-radius: 15px; border: 1px solid #ddd; font-family: 'Kanit'; font-size: 12px; }

/* อื่นๆ */
.hero { background: linear-gradient(135deg, #b026ff 0%, #00d2ff 100%); padding: 40px 20px; text-align: center; color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
.logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; margin-bottom: 10px; }
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 10px; }
.product-list { display: flex; flex-direction: column; gap: 10px; }
.package-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
.bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
</style>
</head>
<body>

<div class="hero">
    <img src="https://via.placeholder.com/80" class="logo-img" id="shopLogo">
    <h2 id="shopWelcome">ยินดีต้อนรับสู่ร้าน Wanderer_Shop รับอะไรดีคะ</h2>
</div>

<div class="container" style="max-width: 600px; margin: 0 auto; padding: 15px;">
    <div id="categoriesView">
        <div class="section-header">
            <h3 id="catTitle">รายการสินค้า</h3>
            <select class="sort-select" id="sortDropdown" onchange="renderCategories()">
                <option value="name">เรียงตามอักษร</option>
                <option value="price">เรียงตามราคา</option>
            </select>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div id="productsView" style="display:none;">
        <button onclick="goBack()" style="background:none; border:none; color:var(--primary); font-weight:bold; margin-bottom:15px; cursor:pointer;">← ย้อนกลับ</button>
        <h3 id="selectedAppName" style="margin-bottom:15px;"></h3>
        <div class="product-list" id="productList"></div>
    </div>
</div>

<div class="bottom-bar" id="bottomBar" style="display:none;">
    <div>
        <div style="font-size: 12px; color: #666;">ยอดชำระทั้งหมด</div>
        <div style="font-size: 20px; font-weight: bold; color: var(--primary);" id="totalPrice">0฿</div>
    </div>
    <button onclick="checkout()" style="background:var(--primary); color:white; border:none; padding: 10px 25px; border-radius:25px; font-weight:bold;">สั่งซื้อเลย</button>
</div>

<script>
let products = [];
let shopInfo = {};
let selectedApp = null;
let currentOS = null;
const GOOGLE_SHEET_API_URL = 'YOUR_GOOGLE_SHEET_WEB_APP_URL';

// 5. การซิงค์ข้อมูล (Real-time Sync & No-Cache)
async function fetchData() {
    const timestamp = new Date().getTime(); 
    try {
        const response = await fetch(`${GOOGLE_SHEET_API_URL}?t=${timestamp}`);
        const data = await response.json();
        products = data.products;
        shopInfo = data.shopInfo;
        renderCategories();
        
        // 4. ข้อมูลติดต่อ: เซ็ตลิงก์ให้แอปเปิดโดยตรง
        if(shopInfo.contactUrl) {
            window.adminContact = shopInfo.contactUrl;
        }
    } catch (e) { console.error("Sync Error", e); }
}

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    
    // ดึงรายชื่อแอปแบบ Unique
    const uniqueApps = [...new Set(products.map(p => p.category))];
    
    uniqueApps.forEach(appName => {
        const appData = products.find(p => p.category === appName);
        const card = document.createElement('div');
        card.className = `category-card ${selectedApp === appName ? 'selected' : ''}`;
        
        // 1. UI: แสดงไอคอนเฉพาะหน้าหมวดหมู่
        card.innerHTML = `
            <div class="select-badge">✓</div>
            <div class="cat-icon-wrapper">
                <img src="${appData.image}" alt="">
            </div>
            <span class="app-name-label">${appName.replace(/[^\u0E00-\u0E7Fa-zA-Z0-9 ]/g, '')}</span>
        `;
        
        card.onclick = () => selectApp(appName);
        grid.appendChild(card);
    });
}

function selectApp(appName) {
    selectedApp = appName;
    document.getElementById('categoriesView').style.display = 'none';
    document.getElementById('productsView').style.display = 'block';
    document.getElementById('selectedAppName').innerText = appName;
    renderProductList();
}

function renderProductList() {
    const list = document.getElementById('productList');
    list.innerHTML = '';
    
    // ฟิลเตอร์เฉพาะแอปที่เลือก
    const appPackages = products.filter(p => p.category === selectedApp);
    
    // 2. Logic iOS/ANDROID
    const osSelector = `
        <div class="os-selector">
            <button class="os-btn ${currentOS === 'iOS' ? 'active' : ''}" onclick="setOS('iOS')">iOS</button>
            <button class="os-btn ${currentOS === 'Android' ? 'active' : ''}" onclick="setOS('Android')">Android</button>
        </div>
    `;
    list.innerHTML = osSelector;

    appPackages.forEach(item => {
        const div = document.createElement('div');
        div.className = 'package-item';
        // 3. จัดกลุ่มแพ็กเกจ (เพิ่มสัญลักษณ์ |) และแก้รูปแบบราคา (75฿)
        div.innerHTML = `
            <div>
                <span style="font-weight:bold; color:var(--primary);">|</span> ${item.name}
            </div>
            <div style="font-weight:bold;">${item.price}฿</div>
        `;
        list.appendChild(div);
    });
}

function setOS(os) {
    // หากกดซ้ำที่เดิม ให้ยกเลิก (เอาออกจากตะกร้า/เคลียร์สถานะ)
    if (currentOS === os) {
        currentOS = null;
        document.getElementById('bottomBar').style.display = 'none';
    } else {
        currentOS = os;
        document.getElementById('bottomBar').style.display = 'flex';
        // คำนวณราคาสินค้าที่เลือก (ตัวอย่าง)
        const price = products.find(p => p.category === selectedApp && (p.os === os || !p.os))?.price || 0;
        document.getElementById('totalPrice').innerText = price + '฿';
    }
    renderProductList();
}

function goBack() {
    selectedApp = null;
    currentOS = null;
    document.getElementById('categoriesView').style.display = 'block';
    document.getElementById('productsView').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    renderCategories();
}

// โหลดข้อมูลครั้งแรก
fetchData();
</script>
</body>
</html>
