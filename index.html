<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* --- Design System --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f39c12; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); overflow-x: hidden; }

/* --- Header --- */
.header { background: linear-gradient(135deg, #111827, #374151); color: var(--white); padding: 25px 20px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
.header h1 { font-family: 'Mitr', sans-serif; font-size: 28px; font-weight: 700; cursor: pointer; }
.header p { font-size: 14px; color: #d1d5db; }

/* --- Navigation --- */
.nav-tabs { display: flex; overflow-x: auto; background: var(--white); padding: 15px 20px 0; border-bottom: 1px solid #e5e7eb; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; border: none; background: none; font-family: 'Mitr', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; position: relative; transition: color 0.3s; }
.tab-btn.active { color: var(--primary); }
.tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 3px 3px 0 0; }

/* --- Container --- */
.container { padding: 20px; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 200px); }
.view-section { display: none; animation: fadeIn 0.4s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- 🌟 Cards System (150x200px & ตัดคำ 1 บรรทัด) --- */
.categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.os-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; justify-items: center; }

.os-card, .category-card {
    background: var(--bg-card); 
    border-radius: 20px; 
    padding: 15px; 
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    border: 1px solid #f3f4f6;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    cursor: pointer;
    overflow: hidden; 
}
.os-card { width: 150px; height: 200px; }

.os-card img, .category-card img {
    object-fit: contain;
    max-height: 80px; 
    max-width: 100%;
    margin-bottom: 8px;
}

/* ชื่อแอป 1 บรรทัด */
.card-title {
    font-size: 16px;
    font-weight: bold;
    color: var(--text-dark);
    line-height: 1.4;
    width: 100%;
    text-align: center;
    white-space: nowrap; 
    overflow: hidden;
    text-overflow: ellipsis; 
    margin-top: 5px;
}

.card-price {
    color: var(--primary);
    font-weight: 700;
    font-size: 14px;
    position: absolute;
    bottom: 30px; 
    width: 100%;
    text-align: center;
}

/* ป้ายระบบ iOS / Android */
.os-badges { position: absolute; bottom: 8px; width: 100%; display: flex; justify-content: center; gap: 4px; }
.os-badge { padding: 3px 6px; border-radius: 20px; font-size: 9px; font-weight: 600; display: flex; align-items: center; gap: 2px; }
.badge-ios { background: #e0f2fe; color: #0284c7; }
.badge-android { background: #dcfce7; color: #16a34a; }

/* --- Products View --- */
.back-btn { background: none; border: none; color: var(--primary); font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; cursor: pointer; }
.category-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.category-header img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
.category-header h2 { font-size: 20px; font-weight: 700; color: var(--text-dark); }
.category-header p { font-size: 14px; color: var(--text-muted); }

/* --- 🌟 แพ็กเกจ & ขีดจัดกลุ่ม | หนาๆ --- */
.variant-group { margin-bottom: 15px; }
.package-group-title {
    font-weight: bold;
    color: var(--text-dark);
    display: block;
    border-left: 4px solid #6b7280; 
    padding-left: 10px;
    margin-bottom: 10px;
    font-size: 15px;
}

.product-item { 
    background: var(--white); border-radius: 12px; padding: 15px; margin-bottom: 12px; 
    display: flex; justify-content: space-between; align-items: center; 
    box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 2px solid transparent; cursor: pointer; transition: 0.2s;
    position: relative; 
}
.product-item.selected { border-color: var(--primary); background: #fdfa8ff; }
.product-info { flex: 1; }
.product-info strong { display: block; font-size: 16px; color: var(--text-dark); margin-bottom: 4px; }
.product-info p { font-size: 13px; color: var(--text-muted); line-height: 1.4; margin-bottom: 4px; }
.product-price { font-weight: 700; color: var(--primary); font-size: 16px; margin-top: 15px; } 

/* สถานะลอยมุมขวาบน */
.status-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255, 255, 255, 0.95);
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    box-shadow: 0 2px 5px rgba(0,0,0,0.08);
}
.status-ready { color: #10b981; }
.status-empty { color: #ef4444; }
.status-pre { color: #f39c12; }

/* --- Action Bar & Info --- */
.action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--white); padding: 15px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-top-left-radius: 20px; border-top-right-radius: 20px; }
.total-price { display: flex; flex-direction: column; }
.total-price span { font-size: 12px; color: var(--text-muted); }
.total-price strong { font-size: 22px; color: var(--primary); font-weight: 700; }
.btn-order { background: linear-gradient(135deg, var(--primary), #d946ef); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-family: 'Kanit', sans-serif; font-size: 16px; font-weight: 600; box-shadow: 0 4px 15px var(--glow); cursor: pointer; }
.btn-order:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }

.info-card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.contact-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-bottom: 10px; color: white; }
.btn-line { background: #00B900; }
.btn-fb { background: #1877F2; }

/* Loader */
#loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* --- Admin Panel --- */
#adminView { display: none; padding: 20px; background: white; min-height: 100vh; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; overflow-y: auto; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f3f4f6; }
.admin-header h2 { color: var(--primary); font-family: 'Mitr', sans-serif; }
.close-admin { background: #f3f4f6; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; color: var(--text-dark); }
.admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.admin-tab { padding: 8px 15px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; font-family: 'Kanit', sans-serif; }
.admin-tab.active { background: var(--primary); color: white; }
.admin-section { display: none; }
.admin-section.active { display: block; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-family: 'Kanit', sans-serif; font-size: 14px; }
.btn-save { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 16px; }
.btn-add-product { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: 600; }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:10px; color:var(--text-muted); font-weight:500;">กำลังโหลดข้อมูล...</p></div>

<header class="header">
    <h1 id="display-shop-name" onclick="handleAdminClick()">Wanderer Shop</h1>
    <p>ระบบร้านค้าอัตโนมัติ</p>
</header>

<nav class="nav-tabs" id="main-nav"></nav>

<main class="container">
    <div id="categoriesView" class="view-section active">
        <div id="categories-container" class="categories-grid"></div>
    </div>

    <div id="productsView" class="view-section">
        <button class="back-btn" onclick="showCategories()">← ย้อนกลับ</button>
        <div class="category-header" id="cat-header"></div>
        <div id="products-container"></div>
    </div>

    <div id="infoView" class="view-section">
        <div class="info-card">
            <h3 style="margin-bottom:10px;">ติดต่อร้านค้า / สั่งซื้อ</h3>
            <a href="#" id="link-line" class="contact-btn btn-line" target="_blank">💬 สั่งซื้อผ่าน Line OA</a>
            <a href="#" id="link-fb" class="contact-btn btn-fb" target="_blank">📘 ติดต่อผ่าน Facebook</a>
        </div>
    </div>
</main>

<div class="action-bar" id="actionBar" style="display: none;">
    <div class="total-price">
        <span>ยอดชำระทั้งหมด</span>
        <strong id="display-total">0฿</strong>
    </div>
    <button class="btn-order" id="btn-order" onclick="proceedToOrder()" disabled>สั่งซื้อสินค้า</button>
</div>

<div id="adminView">
    <div class="admin-header">
        <h2>จัดการระบบร้านค้า</h2>
        <button class="close-admin" onclick="closeAdmin()">ปิด</button>
    </div>
    <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('general')">ข้อมูลทั่วไป</button>
        <button class="admin-tab" onclick="switchAdminTab('tabs')">จัดการแท็บ</button>
        <button class="admin-tab" onclick="switchAdminTab('products')">จัดการสินค้า</button>
    </div>
    <div id="admin-general" class="admin-section active">
        <div class="form-group"><label>ชื่อร้าน</label><input type="text" id="admin-shop-name"></div>
        <div class="form-group"><label>ลิงก์ Line OA</label><input type="text" id="admin-shop-line"></div>
        <div class="form-group"><label>ลิงก์ Facebook</label><input type="text" id="admin-shop-fb"></div>
        <button class="btn-save" onclick="saveGeneralInfo()">บันทึกข้อมูลทั่วไป</button>
    </div>
    <div id="admin-tabs" class="admin-section">
        <div class="form-group"><label>รายชื่อแท็บ (คั่นด้วยลูกน้ำ ,)</label><textarea id="admin-tabs-input" rows="3"></textarea></div>
        <button class="btn-save" onclick="saveTabs()">บันทึกแท็บ</button>
    </div>
    <div id="admin-products" class="admin-section">
        <div class="form-group"><label>เลือกแท็บที่จะจัดการ</label><select id="admin-select-tab" onchange="renderAdminProducts()"></select></div>
        <button class="btn-add-product" onclick="openProductModal()">+ เพิ่มสินค้าใหม่</button>
        <div id="admin-product-list"></div>
    </div>
</div>

<div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; width:90%; max-width:500px; max-height:90vh; overflow-y:auto; border-radius:12px; padding:20px; position:relative;">
        <h3 id="modal-title" style="margin-bottom:15px; color:var(--primary);">เพิ่มสินค้า</h3>
        <input type="hidden" id="p-id">
        <div class="form-group"><label>หมวดหมู่แอป</label><input type="text" id="p-cat"></div>
        <div class="form-group"><label>รายละเอียดใต้ชื่อแอป</label><input type="text" id="p-appDesc"></div>
        <div class="form-group"><label>ลิงก์รูปไอคอนแอป</label><input type="text" id="p-icon"></div>
        <hr style="margin:15px 0; border:0; border-top:1px solid #e5e7eb;">
        <div class="form-group"><label style="color:var(--primary); font-weight:600;">ตัวเลือกแพ็กเกจ (เพื่อจัดกลุ่ม)</label><input type="text" id="p-variant"></div>
        <div class="form-group"><label>ชื่อแพ็กเกจย่อย</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>รายละเอียดย่อย</label><input type="text" id="p-subDesc"></div>
        <div class="form-group"><label>ราคา (บาท)</label><input type="number" id="p-price"></div>
        <div class="form-group">
            <label>สถานะสินค้า</label>
            <select id="p-status"><option value="ready">พร้อมขาย</option><option value="empty">สินค้าหมด</option><option value="pre">พรีออเดอร์</option></select>
        </div>
        <hr style="margin:15px 0; border:0; border-top:1px solid #e5e7eb;">
        <div style="display:flex; gap:10px; margin-bottom:10px;"><input type="checkbox" id="p-ios"><label>รองรับ iOS</label><input type="text" id="p-ios-text" placeholder="ข้อความ iOS" style="flex:1; padding:5px; border:1px solid #ccc; border-radius:4px;"></div>
        <div style="display:flex; gap:10px; margin-bottom:15px;"><input type="checkbox" id="p-android"><label>รองรับ Android</label><input type="text" id="p-android-text" placeholder="ข้อความ Android" style="flex:1; padding:5px; border:1px solid #ccc; border-radius:4px;"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-save" style="margin-top:0;" onclick="saveProduct()">บันทึก</button>
            <button class="btn-save" style="margin-top:0; background:#9ca3af;" onclick="document.getElementById('productModal').style.display='none'">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 🔗 วางลิงก์ Web App (API URL) ของคุณตรงนี้
// ==========================================
const GOOGLE_SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwYecn342cqN_ODU0QamtuD0qloAlvhfC8_bTuNVl3lWk0FoyKzM5cWtSE9CLPEqoviMw/exec'; 

let shopInfo = { name: "Wanderer Shop", line: "", fb: "" };
let tabs = ["แอพพรีเมี่ยม", "เติมเกม", "แอพ/เกม IOS-ANDROID"];
let products = [];
let currentTab = "";
let selectedCategory = null;
let selectedProduct = null;
let adminClickCount = 0;
let adminClickTimer;

// 🌟 ฟังก์ชันลบอีโมจิ
function removeEmoji(str) {
    if(!str) return '';
    return str.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').trim();
}

async function loadData() {
    if(localStorage.getItem('shopInfo')) shopInfo = JSON.parse(localStorage.getItem('shopInfo'));
    if(localStorage.getItem('tabs')) tabs = JSON.parse(localStorage.getItem('tabs'));
    if(localStorage.getItem('products')) products = JSON.parse(localStorage.getItem('products'));
    
    renderShopInfo();
    renderTabs();
    if(tabs.length > 0) switchMainTab(tabs[0], document.querySelector('.tab-btn'));

    if(GOOGLE_SHEET_API_URL && GOOGLE_SHEET_API_URL !== '') {
        try {
            // 🌟 กันแคชด้วย ?t= ทำให้ดึงข้อมูลใหม่สุดเสมอ
            let res = await fetch(GOOGLE_SHEET_API_URL + "?t=" + new Date().getTime());
            let data = await res.json();
            if(data) {
                shopInfo = data.shopInfo || shopInfo;
                tabs = data.tabs || tabs;
                products = data.products || products;
                localStorage.setItem('shopInfo', JSON.stringify(shopInfo));
                localStorage.setItem('tabs', JSON.stringify(tabs));
                localStorage.setItem('products', JSON.stringify(products));
                
                renderShopInfo();
                renderTabs();
                if(document.getElementById('productsView').style.display === 'block') { renderProductList(); } 
                else { showCategories(); }
            }
        } catch(e) { console.error("Error fetching sheet:", e); }
    }
    document.getElementById('loader').style.display = 'none';
}

function renderShopInfo() {
    document.getElementById('display-shop-name').innerText = shopInfo.name || 'Wanderer Shop';
    document.getElementById('link-line').href = shopInfo.line || '#';
    document.getElementById('link-fb').href = shopInfo.fb || '#';
}

function renderTabs() {
    const nav = document.getElementById('main-nav');
    let html = '';
    tabs.forEach((t, index) => {
        html += `<button class="tab-btn ${index===0?'active':''}" onclick="switchMainTab('${t}', this)">${t}</button>`;
    });
    html += `<button class="tab-btn" onclick="showInfoView(this)">ข้อมูลร้าน</button>`;
    nav.innerHTML = html;
}

function switchMainTab(tabName, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    currentTab = tabName;
    selectedCategory = null;
    selectedProduct = null;
    updateActionBar();
    
    document.getElementById('infoView').classList.remove('active');
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('categoriesView').classList.add('active');
    showCategories();
}

function showInfoView(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    document.getElementById('categoriesView').classList.remove('active');
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('infoView').classList.add('active');
    document.getElementById('actionBar').style.display = 'none';
}

function showCategories() {
    document.getElementById('productsView').classList.remove('active');
    document.getElementById('categoriesView').classList.add('active');
    document.getElementById('actionBar').style.display = 'none';
    const container = document.getElementById('categories-container');
    
    let tabProducts = products.filter(p => p.tab === currentTab);
    let cats = {};
    tabProducts.forEach(p => {
        if(!cats[p.cat]) cats[p.cat] = { name: p.cat, icon: p.iconUrl, price: p.price, desc: p.appDesc, ios: p.supportIOS, iosText: p.textIOS, and: p.supportAndroid, andText: p.textAndroid };
        if(p.price < cats[p.cat].price) cats[p.cat].price = p.price;
    });

    let html = '';
    let isOsTab = currentTab.toUpperCase().includes('IOS') || currentTab.toUpperCase().includes('ANDROID');

    if (isOsTab) {
        container.className = 'os-grid';
        for(let key in cats) {
            let c = cats[key];
            let badgeHtml = '';
            if(c.ios) badgeHtml += `<div class="os-badge badge-ios">🍏 iOS ${c.iosText||''}</div>`;
            if(c.and) badgeHtml += `<div class="os-badge badge-android">🤖 Android ${c.andText||''}</div>`;
            
            html += `
            <div class="os-card" onclick="openCategory('${key}')">
                ${c.icon ? `<img src="${c.icon}">` : ''}
                <div class="card-title">${removeEmoji(c.name)}</div>
                <div class="card-price">เริ่มต้น ${c.price}฿</div>
                <div class="os-badges">${badgeHtml}</div>
            </div>`;
        }
    } else {
        container.className = 'categories-grid';
        for(let key in cats) {
            let c = cats[key];
            html += `
            <div class="category-card" onclick="openCategory('${key}')">
                ${c.icon ? `<img src="${c.icon}">` : ''}
                <div class="card-title">${removeEmoji(c.name)}</div>
                <div style="color:var(--primary); font-weight:700; margin-top:8px; font-size:14px;">เริ่มต้น ${c.price}฿</div>
            </div>`;
        }
    }
    container.innerHTML = html;
}

function openCategory(catName) {
    selectedCategory = catName;
    selectedProduct = null;
    document.getElementById('categoriesView').classList.remove('active');
    document.getElementById('productsView').classList.add('active');
    updateActionBar();
    
    let catProducts = products.filter(p => p.tab === currentTab && p.cat === catName);
    let icon = catProducts.length > 0 ? catProducts[0].iconUrl : '';
    let desc = catProducts.length > 0 ? catProducts[0].appDesc : '';
    
    document.getElementById('cat-header').innerHTML = `
        ${icon ? `<img src="${icon}">` : ''}
        <div><h2>${removeEmoji(catName)}</h2><p>${desc}</p></div>
    `;
    renderProductList();
}

function renderProductList() {
    let catProducts = products.filter(p => p.tab === currentTab && p.cat === selectedCategory);
    let grouped = {};
    catProducts.forEach(p => {
        let v = p.variant || 'ทั่วไป';
        if(!grouped[v]) grouped[v] = [];
        grouped[v].push(p);
    });

    let html = '';
    for(let variant in grouped) {
        html += `<div class="variant-group">
                    <span class="package-group-title">${variant}</span>`;
        grouped[variant].forEach(p => {
            let isSel = selectedProduct && selectedProduct.id === p.id ? 'selected' : '';
            
            // สถานะจุดสีลอยมุมขวาบน
            let sDot = '';
            if(p.status === 'ready') sDot = '<div class="status-badge status-ready">● พร้อมส่ง</div>';
            else if(p.status === 'empty') sDot = '<div class="status-badge status-empty">● สินค้าหมด</div>';
            else sDot = '<div class="status-badge status-pre">● พรีออเดอร์</div>';
            
            html += `
            <div class="product-item ${isSel}" onclick="selectProduct('${p.id}', '${p.status}')">
                ${sDot}
                <div class="product-info">
                    <strong>${removeEmoji(p.name) || '-'}</strong>
                    <p>${p.subDesc || ''}</p>
                    <div class="product-price">${p.price}฿</div>
                </div>
            </div>`;
        });
        html += `</div>`;
    }
    document.getElementById('products-container').innerHTML = html;
}

function selectProduct(id, status) {
    if(status === 'empty') {
        Swal.fire({ icon: 'error', title: 'สินค้าหมด', text: 'สินค้ารายการนี้หมดชั่วคราว', confirmButtonColor: '#b026ff', confirmButtonText: 'ตกลง' });
        return;
    }
    let p = products.find(x => x.id === id);
    if(p) {
        selectedProduct = p;
        renderProductList();
        updateActionBar();
    }
}

function updateActionBar() {
    const bar = document.getElementById('actionBar');
    if(selectedProduct) {
        bar.style.display = 'flex';
        document.getElementById('display-total').innerText = selectedProduct.price + '฿';
        document.getElementById('btn-order').disabled = false;
    } else {
        bar.style.display = 'none';
    }
}

// 🌟 ระบบสั่งซื้อ & สร้างฟอร์มข้อความ 3 รูปแบบ
function proceedToOrder() {
    if(!selectedProduct) return;
    
    Swal.fire({
        title: 'ยืนยันการสั่งซื้อ?',
        html: `<b>${removeEmoji(selectedCategory)}</b><br>${removeEmoji(selectedProduct.name)} - ${selectedProduct.price}฿`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#b026ff',
        cancelButtonColor: '#6b7280',
        confirmButtonText: 'สั่งซื้อเลย',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            let shopName = shopInfo.name || "Wanderer Shop";
            let message = "";
            let pName = removeEmoji(selectedProduct.name);
            let catName = removeEmoji(selectedCategory);
            let subDesc = selectedProduct.subDesc ? `(${selectedProduct.subDesc})` : "";
            let isOsTab = currentTab.toUpperCase().includes('IOS') || currentTab.toUpperCase().includes('ANDROID');
            let isGameTab = currentTab.includes('เกม') && !isOsTab;

            // 1. ฟอร์มสำหรับ แอพ/เกม IOS-ANDROID
            if (isOsTab) {
                message = `*รายการสั่งซื้อ (${shopName})*\n`;
                message += `---------------------------\n`;
                message += `✿  𓈒  รวมยอด  ꒰  ${selectedProduct.price}฿  ꒱  ݂♡\n`;
                message += ` ݂  ${catName} [${pName}] 𓈒\n`;
                message += `---------------------------\n`;
                message += `รบกวนแม่ค้าสรุปยอดและส่งเลขบัญชีให้ทีครับ/ค่ะ`;
            } 
            // 2. ฟอร์มสำหรับ เติมเกม
            else if (isGameTab) {
                message = `*รายการสั่งซื้อ (${shopName})*\n`;
                message += `---------------------------\n`;
                message += `1. ${catName}\n`;
                message += `   แพ็กเกจ: ${pName}\n`;
                message += `   ราคา: ${selectedProduct.price} บาท\n`;
                message += `---------------------------\n`;
                message += `*ยอดรวมทั้งสิ้น: ${selectedProduct.price} บาท*\n`;
                message += `---------------------------\n`;
                message += `*แจ้งไอดี ได้เลยค่ะ*`;
            } 
            // 3. ฟอร์มสำหรับ แอพพรีเมี่ยม
            else {
                message = `*รายการสั่งซื้อ (${shopName})*\n`;
                message += `---------------------------\n`;
                message += `1. ${catName}\n`;
                message += `   แพ็กเกจ: ${pName} ${subDesc}\n`;
                message += `   ราคา: ${selectedProduct.price} บาท\n`;
                message += `---------------------------\n`;
                message += `*ยอดรวมทั้งสิ้น: ${selectedProduct.price} บาท*\n`;
                message += `---------------------------\n`;
                message += `รบกวนรอแอดมินตอบก่อนค่อยโอนนะคะ`;
            }

            let lineUrl = shopInfo.line ? shopInfo.line : '#';
            
            // ก๊อปปี้ข้อความและเปิด Line
            navigator.clipboard.writeText(message).then(() => {
                Swal.fire({
                    title: 'คัดลอกข้อความแล้ว!',
                    text: 'ระบบกำลังพาไปที่แชท กรุณากด "วาง" ข้อความเพื่อสั่งซื้อ',
                    icon: 'success',
                    timer: 2500,
                    showConfirmButton: false
                }).then(() => {
                    if(lineUrl !== '#') window.open(lineUrl, '_blank');
                });
            }).catch(err => {
                // ถ้าเบราว์เซอร์ไม่รองรับ Copy ให้เด้งไปเลย
                if(lineUrl !== '#') window.open(lineUrl, '_blank');
            });
        }
    })
}

function handleAdminClick() {
    adminClickCount++;
    clearTimeout(adminClickTimer);
    adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
    if(adminClickCount >= 5) {
        adminClickCount = 0;
        Swal.fire({
            title: 'เข้าสู่ระบบหลังบ้าน',
            input: 'password',
            inputPlaceholder: 'ใส่รหัสผ่าน...',
            showCancelButton: true,
            confirmButtonColor: '#b026ff'
        }).then((result) => {
            if(result.isConfirmed && result.value === '1234') { openAdmin(); } 
            else if(result.isConfirmed) { Swal.fire('รหัสผิด', '', 'error'); }
        });
    }
}

function openAdmin() {
    document.getElementById('adminView').style.display = 'block';
    document.getElementById('admin-shop-name').value = shopInfo.name || '';
    document.getElementById('admin-shop-line').value = shopInfo.line || '';
    document.getElementById('admin-shop-fb').value = shopInfo.fb || '';
    document.getElementById('admin-tabs-input').value = tabs.join(', ');
    
    let sel = document.getElementById('admin-select-tab');
    sel.innerHTML = '';
    tabs.forEach(t => { sel.innerHTML += `<option value="${t}">${t}</option>`; });
    renderAdminProducts();
}
function closeAdmin() {
    document.getElementById('adminView').style.display = 'none';
    renderShopInfo();
    renderTabs();
    if(tabs.length > 0) switchMainTab(tabs[0], document.querySelector('.tab-btn'));
}
function switchAdminTab(section) {
    document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('admin-' + section).classList.add('active');
}

function saveGeneralInfo() {
    shopInfo.name = document.getElementById('admin-shop-name').value;
    shopInfo.line = document.getElementById('admin-shop-line').value;
    shopInfo.fb = document.getElementById('admin-shop-fb').value;
    saveToSheet();
    Swal.fire('บันทึกสำเร็จ', '', 'success');
}
function saveTabs() {
    let tStr = document.getElementById('admin-tabs-input').value;
    tabs = tStr.split(',').map(x => x.trim()).filter(x => x !== '');
    let sel = document.getElementById('admin-select-tab');
    sel.innerHTML = '';
    tabs.forEach(t => { sel.innerHTML += `<option value="${t}">${t}</option>`; });
    saveToSheet();
    Swal.fire('บันทึกสำเร็จ', '', 'success');
}

function renderAdminProducts() {
    let selTab = document.getElementById('admin-select-tab').value;
    let list = document.getElementById('admin-product-list');
    let tabProds = products.filter(p => p.tab === selTab);
    
    let groupedAdmin = {};
    tabProds.forEach(p => {
        if (!groupedAdmin[p.cat]) groupedAdmin[p.cat] = [];
        groupedAdmin[p.cat].push(p);
    });

    let html = '';
    for(let cat in groupedAdmin) {
        html += `<div style="background:#f9fafb; padding:8px 10px; font-weight:bold; color:var(--primary); border-radius:6px; margin-top:10px; border-left:3px solid var(--primary);">📦 ${cat}</div>`;
        groupedAdmin[cat].forEach(p => {
            let sDot = p.status === 'ready' ? '🟢' : (p.status === 'empty' ? '🔴' : '🟠');
            html += `<div style="font-size:13px; border-bottom:1px solid #f3f4f6; padding:12px 5px 12px 15px; display:flex; justify-content:space-between; align-items:center;">
                <div>${sDot} ${p.name || '-'}<br><small style="color:gray;">${p.variant ? `[${p.variant}]` : ''} - ${p.price}฿</small></div>
                <div><button type="button" onclick="editProduct('${p.id}')" style="color:#2563eb; border:none; background:none; font-weight:600; cursor:pointer; margin-right:10px;">แก้ไข</button><button type="button" onclick="deleteProduct('${p.id}')" style="color:#ef4444; border:none; background:none; font-weight:600; cursor:pointer;">ลบ</button></div>
            </div>`;
        });
    }
    list.innerHTML = html;
}

function openProductModal() {
    document.getElementById('productModal').style.display = 'flex';
    document.getElementById('p-id').value = 'P_' + Date.now();
    document.getElementById('p-cat').value = '';
    document.getElementById('p-appDesc').value = '';
    document.getElementById('p-icon').value = '';
    document.getElementById('p-variant').value = '';
    document.getElementById('p-name').value = '';
    document.getElementById('p-subDesc').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-status').value = 'ready';
    document.getElementById('p-ios').checked = false;
    document.getElementById('p-ios-text').value = '';
    document.getElementById('p-android').checked = false;
    document.getElementById('p-android-text').value = '';
}

function editProduct(id) {
    let p = products.find(x => x.id === id);
    if(p) {
        document.getElementById('productModal').style.display = 'flex';
        document.getElementById('p-id').value = p.id;
        document.getElementById('p-cat').value = p.cat || '';
        document.getElementById('p-appDesc').value = p.appDesc || '';
        document.getElementById('p-icon').value = p.iconUrl || '';
        document.getElementById('p-variant').value = p.variant || '';
        document.getElementById('p-name').value = p.name || '';
        document.getElementById('p-subDesc').value = p.subDesc || '';
        document.getElementById('p-price').value = p.price || '';
        document.getElementById('p-status').value = p.status || 'ready';
        document.getElementById('p-ios').checked = p.supportIOS;
        document.getElementById('p-ios-text').value = p.textIOS || '';
        document.getElementById('p-android').checked = p.supportAndroid;
        document.getElementById('p-android-text').value = p.textAndroid || '';
    }
}

function saveProduct() {
    let id = document.getElementById('p-id').value;
    let selTab = document.getElementById('admin-select-tab').value;
    let pObj = {
        id: id,
        tab: selTab,
        cat: document.getElementById('p-cat').value,
        appDesc: document.getElementById('p-appDesc').value,
        iconUrl: document.getElementById('p-icon').value,
        variant: document.getElementById('p-variant').value,
        name: document.getElementById('p-name').value,
        subDesc: document.getElementById('p-subDesc').value,
        price: parseFloat(document.getElementById('p-price').value) || 0,
        status: document.getElementById('p-status').value,
        supportIOS: document.getElementById('p-ios').checked,
        textIOS: document.getElementById('p-ios-text').value,
        supportAndroid: document.getElementById('p-android').checked,
        textAndroid: document.getElementById('p-android-text').value
    };
    let idx = products.findIndex(x => x.id === id);
    if(idx >= 0) { products[idx] = pObj; } else { products.push(pObj); }
    
    document.getElementById('productModal').style.display = 'none';
    renderAdminProducts();
    saveToSheet();
    Swal.fire('บันทึกสินค้าสำเร็จ', '', 'success');
}

function deleteProduct(id) {
    Swal.fire({ title: 'ลบสินค้านี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' })
    .then((res) => {
        if(res.isConfirmed) {
            products = products.filter(x => x.id !== id);
            renderAdminProducts();
            saveToSheet();
        }
    });
}

async function saveToSheet() {
    localStorage.setItem('shopInfo', JSON.stringify(shopInfo));
    localStorage.setItem('tabs', JSON.stringify(tabs));
    localStorage.setItem('products', JSON.stringify(products));
    
    if(!GOOGLE_SHEET_API_URL || GOOGLE_SHEET_API_URL === '') return;
    try {
        await fetch(GOOGLE_SHEET_API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'sync_data', payload: { shopInfo: shopInfo, tabs: tabs, products: products } })
        });
    } catch(e) { console.log(e); }
}

window.onload = loadData;

// 🌟 ระบบ Auto-Sync ทำงานเบื้องหลัง ทุกๆ 5 วินาที
window.addEventListener('load', function() {
    setInterval(async () => {
        if(typeof GOOGLE_SHEET_API_URL !== 'undefined' && GOOGLE_SHEET_API_URL !== '') {
            try {
                let res = await fetch(GOOGLE_SHEET_API_URL + "?t=" + new Date().getTime());
                let data = await res.json();
                if(data) {
                    let isUpdated = false;
                    if(data.shopInfo && JSON.stringify(data.shopInfo) !== localStorage.getItem('shopInfo')) {
                        shopInfo = data.shopInfo; 
                        localStorage.setItem('shopInfo', JSON.stringify(shopInfo));
                        isUpdated = true;
                    }
                    if(data.products && JSON.stringify(data.products) !== localStorage.getItem('products')) {
                        products = data.products; 
                        localStorage.setItem('products', JSON.stringify(products));
                        isUpdated = true;
                    }
                    if(isUpdated) {
                        if(typeof renderShopInfo === 'function') renderShopInfo();
                        const catView = document.getElementById('categoriesView');
                        const prodView = document.getElementById('productsView');
                        if(catView && catView.style.display !== 'none' && typeof showCategories === 'function') {
                            showCategories();
                        } else if(prodView && prodView.style.display !== 'none' && typeof renderProductList === 'function') {
                            renderProductList();
                        }
                    }
                }
            } catch(error) { console.log("Offline Mode: Sync Error", error); }
        }
    }, 5000); 
});
